                                <div className="border-l-4 border-emerald-500 bg-white p-4 rounded-r-lg shadow-sm">
                                  <h4 className="font-bold text-slate-800 text-md mb-1">H. influenzae Requirements</h4>
                                  <p className="text-slate-600 text-sm">Needs X and V (10 and 5): "Heme is <strong>X</strong> (10), NAD is <strong>V</strong> (5)."</p>
                                </div>
                                <div className="border-l-4 border-blue-500 bg-white p-4 rounded-r-lg shadow-sm">
                                  <h4 className="font-bold text-slate-800 text-md mb-1">Listeria's Cold Growth</h4>
                                  <p className="text-slate-600 text-sm">"Listeria Loves the Low temps" (Grows at 4°C in the fridge).</p>
                                </div>
                                <div className="border-l-4 border-rose-500 bg-white p-4 rounded-r-lg shadow-sm">
                                  <h4 className="font-bold text-slate-800 text-md mb-1">Pneumococci Appearance</h4>
                                  <p className="text-slate-600 text-sm">Pneumococci are Pairs of Pointed (lanceolate) cocci.</p>
                                </div>
                              </div>
                            </div>
                          </div>

                        </div>
                      ) : topic === 'fungal_meningitis' ? (
                        <div className="space-y-8">
                          
                          {/* Golden Buzzwords */}
                          <div>
                            <h3 className="text-xl font-bold text-slate-800 mb-4 bg-slate-100 p-2 rounded-md inline-flex items-center gap-2">
                              <i className="fa-solid fa-bolt text-purple-600"></i> Golden Buzzwords
                            </h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                              {[
                                { term: 'Pigeon Droppings', def: 'Cryptococcus neoformans.' },
                                { term: 'Diabetic Ketoacidosis (DKA)', def: 'Mucor and Rhizopus.' },
                                { term: 'Blue-green Colonies', def: 'Aspergillus fumigatus.' },
                                { term: 'Mucoid Colonies', def: 'Cryptococcus neoformans.' },
                                { term: 'Thrombosis and Infarction', def: 'Pathogenesis of Mucormycosis.' },
                                { term: 'Voriconazole', def: 'Specific treatment for Aspergillus.' },
                              ].map((item, idx) => (
                                <div key={idx} className="bg-white border border-slate-200 p-4 rounded-lg shadow-sm hover:border-purple-300 hover:shadow-md transition-all">
                                  <strong className="text-purple-800 block mb-1 text-lg">{item.term}</strong>
                                  <p className="text-slate-600 text-sm">{item.def}</p>
                                </div>
                              ))}
                            </div>
                          </div>

                          <div className="grid md:grid-cols-2 gap-8 pt-4 border-t border-slate-200">
                            {/* Mnemonics */}
                            <div className="bg-purple-50 rounded-xl p-6 border border-purple-200 shadow-sm space-y-6">
                              <div>
                                <h3 className="text-xl font-bold text-purple-900 mb-3 flex items-center gap-2">
                                  <i className="fa-solid fa-brain"></i> Mnemonics for Mastery
                                </h3>
                                <div className="space-y-4">
                                  <div className="bg-white p-4 rounded shadow-sm border border-purple-100">
                                    <strong className="text-purple-800 block mb-1">The Three S’s of Aspergillus:</strong>
                                    <p className="text-slate-700 text-sm"><strong>S</strong>oils/Plants, <strong>S</strong>eptate Hyphae, <strong>S</strong>ubarachnoid Hemorrhage (via mycotic aneurysm).</p>
                                  </div>
                                  <div className="bg-white p-4 rounded shadow-sm border border-purple-100">
                                    <strong className="text-purple-800 block mb-1">The M.D. for Mucor:</strong>
                                    <p className="text-slate-700 text-sm"><strong>M</strong>etabolic Acidosis / <strong>D</strong>iabetic Ketoacidosis.</p>
                                  </div>
                                  <div className="bg-white p-4 rounded shadow-sm border border-purple-100">
                                    <strong className="text-purple-800 block mb-1">The C.C.C. for Cryptococcus:</strong>
                                    <p className="text-slate-700 text-sm"><strong>C</strong>apsulated, <strong>C</strong>onfirmed by CrAg, <strong>C</strong>hronic Meningitis.</p>
                                  </div>
                                </div>
                              </div>
                            </div>

                            {/* Additional Hooks / Key Terms */}
                            <div className="space-y-6">
                              <h3 className="text-xl font-bold text-slate-800 mb-2 bg-slate-100 p-2 rounded-md inline-flex items-center gap-2">
                                <i className="fa-solid fa-list text-slate-600"></i> Key Terms and "Hooks"
                              </h3>
                              <div className="flex flex-col gap-3">
                                {[
                                  { term: 'Saprophytic', def: 'Organisms that live on decaying organic matter; common to Aspergillus, Mucor, and Rhizopus.' },
                                  { term: 'Septate Hyphae', def: 'Hyphae with cross-walls; a hallmark of Aspergillus.' },
                                  { term: 'Aseptate Hyphae', def: 'Broad hyphae without cross-walls; a hallmark of Mucor and Rhizopus.' },
                                  { term: 'India Ink', def: 'A diagnostic stain used specifically to visualize the capsule of Cryptococcus neoformans.' },
                                  { term: 'Galactomannan', def: 'An antigen used in molecular and antigen testing for Aspergillus.' },
                                  { term: 'Mycotic Aneurysm', def: 'A weakening of the vessel wall caused by fungal invasion (Aspergillus), leading to potential hemorrhage.' },
                                  { term: 'Rhinocerebral', def: 'An acute, invasive infection of the sinuses and orbit extending to the brain; typical of Mucormycosis.' },
                                  { term: 'Opsonization', def: 'The process of marking a pathogen for ingestion by phagocytes; inhibited by Aspergillus mycotoxins.' },
                                ].map((item, idx) => (
                                  <div key={idx} className="border border-slate-200 p-3 rounded-lg bg-white hover:border-purple-300 transition-colors">
                                    <h4 className="font-bold text-purple-800 mb-1">{item.term}</h4>
                                    <p className="text-slate-600 text-sm">{item.def}</p>
                                  </div>
                                ))}
                              </div>
                            </div>
                          </div>

                        </div>
                      ) : (
                        <div className="bg-slate-50 p-6 rounded-xl border border-slate-200 text-center text-slate-500 italic">
                          Glossary content for <strong>{currentData.title}</strong> is coming soon!
                        </div>
                      )}
                    </div>
                  )}

                </div>
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
