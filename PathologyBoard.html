<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroPathology Hub</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load React, ReactDOM, and Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Load Icons (FontAwesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Custom Page Transition Animations */
        @keyframes slideInRight { 0% { transform: translateX(60px); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
        @keyframes slideInLeft { 0% { transform: translateX(-60px); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
        .slide-forward { animation: slideInRight 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .slide-backward { animation: slideInLeft 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* Tab Content & Section Enter Animation */
        @keyframes fadeSlideUp { 0% { opacity: 0; transform: translateY(15px); } 100% { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="bg-slate-50 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Main App Component ---
        function App() {
          const [currentView, setCurrentView] = useState('dashboard');
          const [direction, setDirection] = useState('forward');

          const navigateTo = (view) => {
            setDirection(view === 'dashboard' ? 'backward' : 'forward');
            setCurrentView(view);
          };

          // Routes back to the CNS Module in the Master Portal
          const backToPortal = () => {
              window.location.href = 'index.html#cns';
          };

          return (
            <>
              <div key={currentView} className={direction === 'forward' ? 'slide-forward' : 'slide-backward'}>
                {currentView === 'dashboard' ? (
                  <Dashboard onSelectGuide={() => navigateTo('module1')} onBackToPortal={backToPortal} />
                ) : (
                  <PathologyTopicGuide onBack={() => navigateTo('dashboard')} />
                )}
              </div>
              
              <div className="fixed bottom-2 right-3 text-right text-[10px] md:text-xs text-slate-400/50 font-medium pointer-events-none z-50 select-none">
                <div>Dr.Zeyad Robey</div>
                <div>Ain Shams University</div>
              </div>
            </>
          );
        }

        // --- Dashboard Component ---
        function Dashboard({ onSelectGuide, onBackToPortal }) {
          return (
            <div className="min-h-screen bg-slate-100 font-sans text-slate-800 p-6 md:p-12">
              <div className="max-w-6xl mx-auto space-y-8 animate-in">
                
                <button 
                  onClick={onBackToPortal}
                  className="group flex items-center gap-2 text-slate-500 hover:text-purple-600 font-bold transition-all"
                >
                  <i className="fa-solid fa-house group-hover:-translate-y-1 transition-transform"></i> 
                  <span className="text-sm uppercase tracking-wider">Back to CNS Module</span>
                </button>

                <header className="flex items-center justify-between pb-6 border-b border-slate-200">
                  <div className="flex items-center gap-4">
                    <div className="bg-purple-700 p-3 rounded-xl shadow-lg w-12 h-12 flex items-center justify-center text-white text-xl">
                      <i className="fa-solid fa-microscope"></i>
                    </div>
                    <div>
                      <h1 className="text-3xl md:text-4xl font-bold text-slate-900 tracking-tight">NeuroPathology Hub</h1>
                      <p className="text-slate-500 font-medium mt-1">Pathology Subject Dashboard</p>
                    </div>
                  </div>
                </header>

                <main>
                  <h2 className="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                    <i className="fa-solid fa-disease text-purple-600"></i>
                    Available Study Modules
                  </h2>
                  
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {/* Tumors Module Card */}
                    <div 
                      onClick={onSelectGuide}
                      className="relative overflow-hidden rounded-2xl border-2 p-6 transition-all duration-300 ease-out flex flex-col h-full transform cursor-pointer hover:shadow-2xl hover:-translate-y-2 hover:scale-[1.02] hover:border-purple-500 group bg-purple-50 border-purple-200"
                    >
                      <div className="bg-white w-16 h-16 rounded-2xl shadow-sm flex items-center justify-center mb-6 shrink-0 transition-transform duration-300 group-hover:scale-110 group-hover:rotate-3">
                        <i className="fa-solid fa-viruses text-2xl text-purple-600"></i>
                      </div>
                      <h3 className="text-xl font-bold mb-2 text-slate-900">Cerebellar Tumors</h3>
                      <p className="text-slate-600 mb-8 line-clamp-2 flex-1">
                        Comparative analysis of Medulloblastoma and Hemangioblastoma, including molecular genetics.
                      </p>
                      <button className="w-full py-3 px-4 bg-white/50 hover:bg-white text-slate-800 border border-slate-300 font-semibold rounded-xl transition-all duration-200 transform hover:scale-105 active:scale-95 flex items-center justify-center gap-2 mt-auto shadow-sm">
                         Open Review
                      </button>
                    </div>
                  </div>
                </main>
              </div>
            </div>
          );
        }

        // --- Study Guide Component (The Mobile-Responsive UI) ---
        function PathologyTopicGuide({ onBack }) {
          const [activeTab, setActiveTab] = useState('quiz');
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
          const [openShortIndex, setOpenShortIndex] = useState(null);
          const [openLongIndex, setOpenLongIndex] = useState(0);

          // The 3 required tabs
          const tabs = [
            { id: 'quiz', label: 'Short Answer Quiz', icon: <i className="fa-solid fa-list-check flex items-center justify-center"></i> },
            { id: 'long_essay', label: 'Essay Questions', icon: <i className="fa-solid fa-book-open flex items-center justify-center"></i> },
            { id: 'glossary', label: 'Glossary & Mnemonics', icon: <i className="fa-solid fa-bookmark flex items-center justify-center"></i> },
          ];

          return (
            <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row font-sans text-slate-800">
              
              {/* MOBILE HEADER (Hidden on Desktop) */}
              <div className="md:hidden bg-purple-900 text-white p-4 flex justify-between items-center shadow-md z-20">
                <div className="flex items-center gap-3">
                  <button onClick={onBack} className="p-1 hover:bg-purple-800 rounded transition-all duration-200 active:scale-90 w-8 h-8 flex items-center justify-center group">
                    <i className="fa-solid fa-arrow-left transition-transform duration-300 group-hover:-translate-x-1"></i>
                  </button>
                  <div className="flex items-center gap-2 font-bold text-lg">
                    <i className="fa-solid fa-microscope text-purple-300"></i>
                    <span>Pathology Review</span>
                  </div>
                </div>
                <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="w-8 h-8 flex items-center justify-center transition-transform duration-300 active:scale-90">
                  <div className={`transition-transform duration-300 ${isMobileMenuOpen ? 'rotate-90 scale-110' : 'rotate-0'}`}>
                    {isMobileMenuOpen ? <i className="fa-solid fa-xmark"></i> : <i className="fa-solid fa-bars"></i>}
                  </div>
                </button>
              </div>

              {/* SIDEBAR NAVIGATION */}
              <nav className={`
                ${isMobileMenuOpen ? 'flex' : 'hidden'} 
                md:flex flex-col w-full md:w-72 bg-purple-900 text-white shadow-xl
                fixed md:sticky top-0 h-screen overflow-y-auto z-10 transition-all duration-300
              `}>
                <div className="p-4 border-b border-purple-800 flex items-center justify-between">
                  <button 
                    onClick={onBack}
                    className="flex items-center gap-2 text-purple-300 hover:text-white hover:bg-purple-800 px-3 py-2 rounded-lg transition-all duration-200 transform hover:-translate-x-1 active:scale-95 text-sm font-semibold w-full group"
                  >
                    <i className="fa-solid fa-arrow-left transition-transform duration-300 group-hover:-translate-x-1"></i> Back to Dashboard
                  </button>
                </div>
                
                <div className="hidden md:flex items-center gap-3 p-6 border-b border-purple-800">
                  <i className="fa-solid fa-microscope text-2xl text-purple-300"></i>
                  <div>
                    <h1 className="font-bold text-xl leading-tight">NeuroPathology</h1>
                    <span className="text-purple-300 text-xs uppercase tracking-wider font-semibold">Study Guide</span>
                  </div>
                </div>
                
                <div className="p-4 flex-1">
                  <p className="text-purple-400 text-xs font-bold mb-4 uppercase tracking-wider px-2">Study Navigation</p>
                  <ul className="space-y-1">
                    {tabs.map((tab) => (
                      <li key={tab.id}>
                        <button
                          onClick={() => {
                            setActiveTab(tab.id);
                            setIsMobileMenuOpen(false); // Closes menu automatically on mobile
                          }}
                          className={`w-full flex items-center gap-3 px-3 py-3 rounded-lg transition-all duration-200 transform hover:translate-x-2 active:scale-95 text-left group
                            ${activeTab === tab.id 
                              ? 'bg-purple-600 text-white shadow-md' 
                              : 'text-purple-200 hover:bg-purple-800 hover:text-white'
                            }`}
                        >
                          <span className={`w-5 h-5 flex items-center justify-center transition-transform duration-300 ${activeTab === tab.id ? 'scale-110' : 'group-hover:scale-110'}`}>{tab.icon}</span>
                          <span className="font-medium">{tab.label}</span>
                        </button>
                      </li>
                    ))}
                  </ul>
                </div>
                
                <div className="p-4 border-t border-purple-800 text-xs text-purple-400 text-center">
                  Topic: Cerebellar Tumors
                </div>
              </nav>

              {/* MAIN CONTENT AREA */}
              <main className="flex-1 p-4 md:p-8 overflow-y-auto w-full max-w-5xl mx-auto">
                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-10 min-h-[80vh]">
                  
                  {activeTab === 'quiz' && (
                    <div className="space-y-6 animate-in">
                      <div className="border-b border-slate-200 pb-4">
                        <h2 className="text-3xl font-bold text-slate-800 flex items-center gap-3">
                          <i className="fa-solid fa-list-check text-purple-600"></i> Short Answer Quiz
                        </h2>
                        <p className="text-slate-600 mt-2">Targeted, 2-3 sentence high-yield written responses for Cerebellar Tumors.</p>
                      </div>
                      
                      <div className="space-y-3">
                        {[
                          { q: "What is the primary demographic for Medulloblastoma, and where does it typically originate?", a: "Medulloblastoma primarily presents in childhood. It is an embryonal neuroepithelial tumor that originates in the cerebellum or the dorsal brain stem." },
                          { q: "Describe the gross appearance of a Medulloblastoma located in the cerebellar vermis.", a: "In the cerebellar vermis, Medulloblastomas typically appear as pink or grey friable masses. These masses often grow to fill the fourth ventricle." },
                          { q: "What defines the microscopic structure known as a Homer-Wright rosette?", a: "This microscopic feature consists of primitive tumor cells arranged in a circular pattern. These cells surround a central area of neuropil." },
                          { q: "Identify the most common cytogenetic aberration found in Medulloblastoma.", a: "The most frequent aberration is the loss of the short arm of chromosome 17 (17p). This often results in an isochromosome 17q through the duplication of the long arm." },
                          { q: "Which molecular subtype of Medulloblastoma is associated with the best prognosis, and how is it identified?", a: "The WNT-activated subtype is the most favorable genetic variant, occurring in 10% of cases. It is identified by the presence of nuclear β-catenin." },
                          { q: "Compare the typical age of onset for Medulloblastoma versus Hemangioblastoma.", a: "Medulloblastoma is a childhood tumor, whereas Hemangioblastoma typically occurs in adults. Both are frequently found in the cerebellum." },
                          { q: "Explain the relationship between Hemangioblastoma and von Hippel-Lindau (VHL) disease.", a: "Approximately 30% of Hemangioblastomas are associated with inherited von Hippel-Lindau disease. This involve the inactivation of the VHL tumor suppressor gene." },
                          { q: "Why might a Hemangioblastoma appear yellow during a gross examination?", a: "The yellow coloration of a Hemangioblastoma is due to its rich lipid content. This is reflected microscopically by the presence of vacuolated stromal cells." },
                          { q: "What are the two main microscopic components of a Hemangioblastoma?", a: "The tumor is composed of neoplastic stromal cells, which are large and vacuolated, and abundant vascular cells. Numerous thin-walled vessels are a prominent feature." },
                          { q: "How does a Hemangioblastoma typically appear on an MRI?", a: "On an MRI, a Hemangioblastoma usually presents as a cyst with an enhancing mural nodule. The nodule typically abuts a pial surface." }
                        ].map((item, idx) => (
                          <div key={idx} className="border border-slate-200 rounded-xl overflow-hidden shadow-sm hover:border-purple-300 transition-all duration-300">
                            <button
                              onClick={() => setOpenShortIndex(openShortIndex === idx ? null : idx)}
                              className="w-full text-left p-4 bg-white hover:bg-slate-50 flex justify-between items-center focus:outline-none"
                            >
                              <span className="font-semibold text-slate-800 pr-4">Q{idx + 1}: {item.q}</span>
                              <i className={`fa-solid fa-chevron-down transition-transform duration-300 ${openShortIndex === idx ? 'rotate-180 text-purple-600' : 'text-slate-400'}`}></i>
                            </button>
                            
                            <div className={`grid transition-all duration-300 ease-in-out ${openShortIndex === idx ? 'grid-rows-[1fr] opacity-100' : 'grid-rows-[0fr] opacity-0'}`}>
                              <div className="overflow-hidden">
                                <div className="p-4 bg-purple-50 border-t border-purple-100 text-slate-700">
                                  <strong className="text-purple-800 block mb-1">Answer:</strong>
                                  {item.a}
                                </div>
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {activeTab === 'long_essay' && (
                    <div className="space-y-6 animate-in">
                      <div className="border-b border-slate-200 pb-4">
                        <h2 className="text-3xl font-bold text-slate-800 flex items-center gap-3">
                          <i className="fa-solid fa-book-open text-purple-600"></i> Essay Questions
                        </h2>
                        <p className="text-slate-600 mt-2">Comprehensive, multi-part pathological discussions.</p>
                      </div>
                      
                      <div className="flex flex-col gap-4">
                        {[
                          { title: "Comparative Analysis: Medulloblastoma vs. Hemangioblastoma", question: "Compare and contrast Medulloblastoma and Hemangioblastoma in terms of WHO grading, age of onset, and typical gross presentation.", answer: "Medulloblastoma and Hemangioblastoma represent two distinct ends of the WHO grading spectrum for cerebellar tumors. Medulloblastoma is a Grade IV tumor, indicating a highly malignant embryonal neuroepithelial growth primarily affecting children. Grossly, it often appears as a friable pink or grey mass in the cerebellar vermis that fills the fourth ventricle, or a firm, circumscribed mass in the hemispheres. In contrast, Hemangioblastoma is a Grade I tumor, signifying a benign, slow-growing lesion typically found in adults. Its gross presentation is characterized by high vascularity and a cystic nature, often appearing as a yellow-tinted cyst with a solid vascular nodule abutting the pial surface." },
                          { title: "Molecular and Genetic Markers in Medulloblastoma", question: "Discuss the significance of genetic analysis in the diagnosis and prognosis of Medulloblastoma, highlighting specific aberrations and subtypes.", answer: "Genetic analysis has become integral to the diagnosis of Medulloblastoma, as molecular variants provide clinical utility beyond traditional morphology. The most common cytogenetic finding, occurring in up to 50% of cases, is the loss of the short arm of chromosome 17 (17p), leading to isochromosome 17q. Beyond these aberrations, the identification of the WNT-activated molecular subtype is crucial for prognosis; although it is the rarest subtype (10%), it is the most favorable. This subtype is specifically recognized by the presence of nuclear β-catenin, allowing clinicians to better categorize the tumor within the integrated WHO diagnosis framework." }
                        ].map((essay, idx) => (
                          <div key={idx} className={`border rounded-xl overflow-hidden transition-all duration-300 ${openLongIndex === idx ? 'border-purple-300 shadow-md ring-1 ring-purple-100' : 'border-slate-200 hover:border-purple-200 hover:shadow-md'}`}>
                            <button 
                              className={`w-full text-left p-5 flex justify-between items-start gap-4 transition-colors duration-200 active:bg-purple-100/50 ${openLongIndex === idx ? 'bg-purple-50' : 'bg-white hover:bg-slate-50'}`}
                              onClick={() => setOpenLongIndex(openLongIndex === idx ? null : idx)}
                            >
                              <div>
                                <h3 className={`font-bold text-lg leading-snug transition-colors duration-300 ${openLongIndex === idx ? 'text-purple-900' : 'text-slate-800'}`}>
                                  Essay {idx + 1}: {essay.title}
                                </h3>
                                <p className="text-slate-600 text-sm mt-1">{essay.question}</p>
                              </div>
                              <i className={`fa-solid fa-chevron-down mt-1 shrink-0 transition-transform duration-300 ${openLongIndex === idx ? 'rotate-180 text-purple-600' : 'text-slate-400'}`}></i>
                            </button>
                            
                            <div className={`grid transition-all duration-300 ease-in-out ${openLongIndex === idx ? 'grid-rows-[1fr] opacity-100' : 'grid-rows-[0fr] opacity-0'}`}>
                              <div className="overflow-hidden">
                                <div className="p-6 bg-white border-t border-purple-100 text-slate-700 leading-relaxed text-lg shadow-inner whitespace-pre-wrap">
                                  {essay.answer}
                                </div>
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {activeTab === 'glossary' && (
                    <div className="space-y-8 animate-in">
                      <div className="border-b border-slate-200 pb-4">
                        <h2 className="text-3xl font-bold text-slate-800 flex items-center gap-3">
                          <i className="fa-solid fa-bookmark text-purple-600"></i> Glossary & Mnemonics
                        </h2>
                        <p className="text-slate-600 mt-2">Key terms, golden buzzwords, and memory hooks.</p>
                      </div>

                      <div className="grid md:grid-cols-2 gap-8 pt-4">
                        {/* Mnemonics */}
                        <div className="bg-purple-50 rounded-xl p-6 border border-purple-200 shadow-sm">
                          <h3 className="text-xl font-bold text-purple-900 mb-4 flex items-center gap-2">
                            <i className="fa-solid fa-brain"></i> High-Yield Mnemonics
                          </h3>
                          <div className="space-y-4">
                            {[
                              { title: '"WNT is a WIN"', desc: 'To remember that the WNT-activated subtype is the most favorable (WIN) prognosis for Medulloblastoma.' },
                              { title: '"Children go Mid, Adults go High"', desc: 'Mid (Medulloblastoma) = Cerebellar Vermis (Middle), Childhood.\nHigh (Hemangioblastoma) = High vascularity, Adults.' },
                              { title: '"17p is Missing (Poor)"', desc: 'To remember that the loss of the short arm of chromosome 17 (p for "petite"/short) is a common aberration in the more aggressive Medulloblastoma.' },
                              { title: '"VHL: Very Highly Lipidized"', desc: 'To remember that Hemangioblastoma is associated with VHL disease and contains lipid-rich (yellow) vacuolated cells.' }
                            ].map((item, idx) => (
                              <div key={idx} className="bg-white p-4 rounded-lg shadow-sm border-l-4 border-purple-500">
                                <div className="font-bold text-purple-900 text-lg mb-1">{item.title}</div>
                                <p className="text-slate-700 text-sm whitespace-pre-line">{item.desc}</p>
                              </div>
                            ))}
                          </div>
                        </div>

                        {/* Key Terms */}
                        <div>
                          <h3 className="text-xl font-bold text-slate-800 mb-4 bg-slate-100 p-2 rounded-md inline-flex items-center gap-2">
                            <i className="fa-solid fa-list text-slate-600"></i> Key Terms and Buzzwords
                          </h3>
                          <div className="flex flex-col gap-3">
                            {[
                              { term: 'Homer-Wright Rosette', def: 'Classic microscopic marker for Medulloblastoma; cells surrounding neuropil.' },
                              { term: 'Isochromosome 17q', def: 'Common cytogenetic aberration in Medulloblastoma (loss of 17p, gain of 17q).' },
                              { term: 'Nuclear β-catenin', def: 'Diagnostic marker for the WNT-activated (most favorable) Medulloblastoma.' },
                              { term: 'Vacuolated Stromal Cells', def: 'Large, lipid-filled cells characteristic of Hemangioblastoma.' },
                              { term: 'Mural Nodule', def: 'The solid vascular component of a cystic Hemangioblastoma seen on MRI.' },
                              { term: 'Friable', def: 'Easily crumbled; describes the gross texture of vermis-based Medulloblastomas.' },
                              { term: 'VHL Gene', def: 'Tumor suppressor gene inactivated in Hemangioblastoma (sporadic and inherited).' }
                            ].map((item, idx) => (
                              <div key={idx} className="border border-slate-200 p-3 rounded-lg bg-white hover:border-purple-300 transition-colors">
                                <h4 className="font-bold text-purple-800 mb-1">{item.term}</h4>
                                <p className="text-slate-600 text-sm">{item.def}</p>
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    </div>
                  )}

                </div>
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
