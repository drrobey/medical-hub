            cerebellar_tumors: {
                title: "Cerebellar Tumors",
                shortQuiz: [
                    { q: "What is the primary demographic for Medulloblastoma, and where does it typically originate?", a: "Medulloblastoma primarily presents in childhood. It is an embryonal neuroepithelial tumor that originates in the cerebellum or the dorsal brain stem." },
                    { q: "Describe the gross appearance of a Medulloblastoma located in the cerebellar vermis.", a: "In the cerebellar vermis, Medulloblastomas typically appear as pink or grey friable masses. These masses often grow to fill the fourth ventricle." },
                    { q: "What defines the microscopic structure known as a Homer-Wright rosette?", a: "This microscopic feature consists of primitive tumor cells arranged in a circular pattern. These cells surround a central area of neuropil." },
                    { q: "Identify the most common cytogenetic aberration found in Medulloblastoma.", a: "The most frequent aberration is the loss of the short arm of chromosome 17 (17p). This often results in an isochromosome 17q through the duplication of the long arm." },
                    { q: "Which molecular subtype of Medulloblastoma is associated with the best prognosis, and how is it identified?", a: "The WNT-activated subtype is the most favorable genetic variant, occurring in 10% of cases. It is identified by the presence of nuclear β-catenin." },
                    { q: "Compare the typical age of onset for Medulloblastoma versus Hemangioblastoma.", a: "Medulloblastoma is a childhood tumor, whereas Hemangioblastoma typically occurs in adults. Both are frequently found in the cerebellum." },
                    { q: "Explain the relationship between Hemangioblastoma and von Hippel-Lindau (VHL) disease.", a: "Approximately 30% of Hemangioblastomas are associated with inherited von Hippel-Lindau disease. This involve the inactivation of the VHL tumor suppressor gene." },
                    { q: "Why might a Hemangioblastoma appear yellow during a gross examination?", a: "The yellow coloration of a Hemangioblastoma is due to its rich lipid content. This is reflected microscopically by the presence of vacuolated stromal cells." },
                    { q: "What are the two main microscopic components of a Hemangioblastoma?", a: "The tumor is composed of neoplastic stromal cells, which are large and vacuolated, and abundant vascular cells. Numerous thin-walled vessels are a prominent feature." },
                    { q: "How does a Hemangioblastoma typically appear on an MRI?", a: "On an MRI, a Hemangioblastoma usually presents as a cyst with an enhancing mural nodule. The nodule typically abuts a pial surface." }
                ],
                essays: [
                    { title: "Comparative Analysis: Medulloblastoma vs. Hemangioblastoma", question: "Compare and contrast Medulloblastoma and Hemangioblastoma in terms of WHO grading, age of onset, and typical gross presentation.", answer: "Medulloblastoma and Hemangioblastoma represent two distinct ends of the WHO grading spectrum for cerebellar tumors. Medulloblastoma is a Grade IV tumor, indicating a highly malignant embryonal neuroepithelial growth primarily affecting children. Grossly, it often appears as a friable pink or grey mass in the cerebellar vermis that fills the fourth ventricle, or a firm, circumscribed mass in the hemispheres. In contrast, Hemangioblastoma is a Grade I tumor, signifying a benign, slow-growing lesion typically found in adults. Its gross presentation is characterized by high vascularity and a cystic nature, often appearing as a yellow-tinted cyst with a solid vascular nodule abutting the pial surface." },
                    { title: "Molecular and Genetic Markers in Medulloblastoma", question: "Discuss the significance of genetic analysis in the diagnosis and prognosis of Medulloblastoma, highlighting specific aberrations and subtypes.", answer: "Genetic analysis has become integral to the diagnosis of Medulloblastoma, as molecular variants provide clinical utility beyond traditional morphology. The most common cytogenetic finding, occurring in up to 50% of cases, is the loss of the short arm of chromosome 17 (17p), leading to isochromosome 17q. Beyond these aberrations, the identification of the WNT-activated molecular subtype is crucial for prognosis; although it is the rarest subtype (10%), it is the most favorable. This subtype is specifically recognized by the presence of nuclear β-catenin, allowing clinicians to better categorize the tumor within the integrated WHO diagnosis framework." }

            meningeal_infections: {
                title: "Meningeal Infections",
                shortQuiz: [
                    { q: "What are the primary pathways through which infectious agents reach the nervous system?", a: "Infectious agents reach the CNS via the bloodstream, direct trauma, or peripheral nerves. They may also arrive through local extension from adjacent infections such as osteomyelitis, infected sinuses, or dental infections." },
                    { q: "Distinguish between the origins and typical causes of epidural abscesses and subdural empyema.", a: "Epidural abscesses typically arise from adjacent focal infections like sinusitis or osteomyelitis. Subdural empyema results from infections in the skull or air sinuses spreading to the subdural space, often involving bacterial or fungal agents." },
                    { q: "How can a large subdural empyema lead to brain infarction?", a: "A large subdural empyema can produce a mass effect on the brain. Additionally, it may cause thrombophlebitis in the bridging veins crossing the subdural space, leading to venous occlusion and subsequent brain infarction." },
                    { q: "Define meningitis and clarify when the term 'meningoencephalitis' is applied.", a: "Meningitis is an inflammatory process specifically involving the leptomeninges. If the inflammatory process or infection spreads further into the underlying brain parenchyma, it is classified as meningoencephalitis." },
                    { q: "Identify three non-infectious causes of meningitis listed in the pathological context.", a: "Beyond pathogens, meningitis can be caused by certain drugs and chemicals. It is also associated with systemic conditions such as Systemic Lupus Erythematosus (SLE) and neoplastic conditions like meningeal carcinomatosis." },
                    { q: "What are the characteristic 'gross' pathological findings in acute pyogenic meningitis?", a: "Pathological examination reveals a suppurative exudate (pus) over the surface of the brain within the leptomeninges. The meningeal vessels appear prominently engorged, and the cerebrospinal fluid (CSF) is visibly mixed with pus." },
                    { q: "Describe the microscopic environment of the subarachnoid space during bacterial meningitis.", a: "Microscopically, the meningeal vessels are dilated and congested. The subarachnoid space is filled with a dense collection of fibrin, neutrophils, pus cells, and histiocytes." },
                    { q: "How does meningeal fibrosis contribute to the development of hydrocephalus?", a: "Fibrosis of the meninges can obstruct the foramina of Luschka and Magendie. This blockage prevents the normal flow of CSF, leading to hydrocephalus in children and increased intracranial tension in adults." },
                    { q: "What is Waterhouse-Friderichsen Syndrome, and what is its clinical trigger?", a: "This is a severe general complication of meningitis where septicemia leads to acute adrenal insufficiency. It is often associated with the systemic spread of the infection and can lead to infective endocarditis." },
                    { q: "Where is the exudate typically located in tuberculous meningitis, and what are its physical characteristics?", a: "In tuberculous meningitis, the subarachnoid space contains a gelatinous or fibrinous exudate located primarily at the base of the brain. This exudate can obliterate the cisterns, encase cranial nerves, and may contain discrete white granules." }
                ],
                essays: [
                    { title: "Comparative Analysis of Acute Pyogenic and Viral (Aseptic) Meningitis", question: "Compare and contrast acute pyogenic meningitis and viral (aseptic) meningitis regarding their clinical course, macroscopic findings, and microscopic pathology.", answer: "Acute pyogenic meningitis and viral (aseptic) meningitis represent two distinct clinical and pathological entities. Clinically, pyogenic meningitis—usually bacterial in origin—is characterized by a fulminant course with severe symptoms including fever, headache, photophobia, neck stiffness, and altered mental status. In contrast, the clinical course of viral meningitis is generally less fulminant and less severe.\n\nMacroscopically, acute pyogenic meningitis presents with striking features, including a heavy suppurative exudate over the brain surface, engorged vessels, and pus-laden CSF. Viral meningitis, however, has no distinctive macroscopic characteristics other than occasional brain swelling.\n\nMicroscopically, the differences are equally pronounced. Pyogenic meningitis shows a subarachnoid space packed with neutrophils, fibrin, and histiocytes, accompanied by dilated vasculature. Viral meningitis shows either no recognizable microscopic abnormality or a mild to moderate lymphocytic infiltrate within the leptomeninges, highlighting the different cellular responses to bacterial versus viral pathogens." },
                    { title: "Local and Systemic Complications of CNS Infections", question: "Detail the potential local and systemic complications arising from CNS infections as described in the pathological context.", answer: "CNS infections can lead to a variety of devastating local and systemic complications. Locally, the most immediate concern is increased intracranial tension (ICT). If the infection leads to meningeal fibrosis, it can obstruct the foramina of Luschka and Magendie, resulting in hydrocephalus or further increases in ICT. This pressure and inflammation can damage cranial nerves III, IV, and VI, manifesting clinically as diplopia, squint, and ptosis. Other local complications include the development of encephalitis (inflammation of the brain tissue) and thrombosis of the blood vessels.\n\nSystemically, the spread of the infection into the bloodstream (septicemia) can lead to life-threatening conditions. These include infective endocarditis and Waterhouse-Friderichsen Syndrome, the latter characterized by acute adrenal insufficiency. In cases of chronic infections like tuberculous meningitis, the resulting arachnoid fibrosis serves as a persistent cause of hydrocephalus." }
                ],
                mnemonics: [

                    { title: 'Pyogenic = Pus', desc: 'The word "pyogenic" literally means pus-producing; look for neutrophils and fibrin on histology.' },
                    { title: 'The 3, 4, 6 Fix', desc: 'Damage to cranial nerves III, IV, and VI leads to the clinical triad of diplopia, squint, and ptosis.' }

                    { term: 'Leptomeninges', def: 'The inner two membranes (pia mater and arachnoid) surrounding the brain and spinal cord; the primary site of meningitis.' },

                    { term: 'Aseptic Meningitis', def: 'Meningitis with a clinical course less fulminant than pyogenic, usually viral.' }
                ]
            },
            parenchymal_infections: {
                title: "Parenchymal Infections",
                shortQuiz: [
                    { q: "Identify the three primary routes by which a brain abscess can arise.", a: "Brain abscesses typically originate from direct implantation due to trauma, local extension from adjacent infections like mastoiditis or otitis media, or hematogenous spread. Hematogenous dissemination often stems from systemic pyemia, such as acute bacterial endocarditis or suppurative lung diseases." },
                    { q: "Contrast the morphology of an acute brain abscess with that of a chronic brain abscess.", a: "An acute abscess is characterized by an irregular area of liquefactive necrosis surrounded by a zone of congestion. In contrast, a chronic abscess develops a smooth fibrous tissue capsule surrounded by a zone of reactive gliosis." },
                    { q: "What are the potential clinical consequences of a brain abscess rupture?", a: "If a brain abscess ruptures, it can lead to severe secondary complications including ventriculitis and meningitis. Additionally, it may result in venous sinus thrombosis, which further complicates the clinical picture." },
                    { q: "What are the characteristic histologic features of viral encephalitis?", a: "Viral encephalitis is characterized by perivascular and parenchymal mononuclear cell infiltrates. Other hallmark features include the presence of microglial nodules and the occurrence of neuronophagia." },
                    { q: "List the three patterns of direct brain injury caused by HIV-1.", a: "The direct effects of HIV-1 on the brain manifest as HIV-1 aseptic meningitis and HIV-1 meningoencephalitis, also known as AIDS dementia. Additionally, it can cause vacuolar myelopathy." },
                    { q: "Explain the pathogenesis and cellular targets of Progressive Multifocal Leukoencephalopathy (PML).", a: "PML is caused by the JC virus, a papovavirus that typically affects immunosuppressed patients. The virus specifically infects oligodendrocytes and astrocytes, leading to the irregular destruction of white matter through demyelination." },
                    { q: "Describe the typical localization and clinical presentation of HSV-1 encephalitis.", a: "HSV-1 encephalitis primarily affects the inferior and medial regions of the temporal lobes and the orbital gyri of the frontal lobes. This localization results in clinical alterations in memory, mood, and behavior." },
                    { q: "How does the presentation of HSV-2 infection differ between adults and neonates?", a: "In adults, HSV-2 typically presents as meningitis. However, in neonates born via vaginal delivery to mothers with active genital infections, it presents as a diffuse and serious encephalitis." },
                    { q: "Why is Aspergillus fumigatus particularly destructive to brain tissue?", a: "Aspergillus causes widespread septic hemorrhagic infarction. This occurs because the fungus invades the walls of blood vessels, leading to subsequent thrombosis and tissue death." },
                    { q: "What unique CSF finding is associated with CNS Cysticercosis?", a: "In cases of Cysticercosis, particularly those involving intraventricular or subarachnoid infection, the white blood cell count often shows a significant presence of eosinophils. This occurs in approximately 50% of these cases." }
                ],
                essays: [
                    { title: "Pathogenesis and Diagnostic Features of Brain Abscesses", question: "Discuss the etiology, morphological progression, and diagnostic imaging of brain abscesses as described in the text.", answer: "Brain abscesses are primarily bacterial in origin and develop through three distinct pathways: direct traumatic implantation, local extension from nearby suppurative infections (such as the middle ear or mastoid air cells), or hematogenous spread via the bloodstream. When spread hematogenously, infections often originate from the heart (acute bacterial endocarditis) or the lungs, reaching the brain through the vertebral system of veins.\n\nMorphologically, the abscess evolves from an acute to a chronic state. Initially, it presents as an irregular zone of liquefactive necrosis characterized by vascular congestion. Over time, the body attempts to wall off the infection, resulting in a chronic abscess with a smooth fibrous capsule and an outer layer of reactive gliosis. Clinically, this presents as progressive focal neurological deficits and signs of increased intracranial tension (ICT). On diagnostic imaging (CT or MRI), these abscesses characteristically appear as \"ring-enhancing lesions,\" a hallmark finding where the vascularized capsule takes up contrast material while the necrotic center remains dark." },
                    { title: "Viral CNS Infections in Immunocompromised and Specific Populations", question: "Compare and contrast the CNS manifestations of HIV-1, Progressive Multifocal Leukoencephalopathy (PML), and Herpes Simplex Virus (HSV).", answer: "HIV-1, PML, and HSV represent distinct viral challenges to the CNS. HIV-1 affects a high percentage of AIDS patients, with neuropathologic changes seen in up to 90% of cases. It causes direct injury (meningitis, dementia, and myelopathy) and predisposes patients to opportunistic infections and primary CNS lymphoma. PML is specifically an opportunistic infection caused by the JC papovavirus in immunosuppressed patients. Unlike the more diffuse involvement of HIV, PML targets the white matter by infecting oligodendrocytes and astrocytes, leading to demyelination and a poor prognosis.\n\nHSV encephalitis is categorized by virus type. HSV-1 is the most common cause of sporadic viral encephalitis in children and young adults, specifically targeting the temporal and frontal lobes. This leads to distinct behavioral and memory deficits. Pathologically, it is identified by Cowdry type A intranuclear inclusions in neurons and glia. Conversely, HSV-2 is generally associated with meningitis in adults but causes devastating diffuse encephalitis in neonates who acquire the virus during birth. While HIV and PML are often linked to immune status, HSV-1 can affect immunocompetent individuals but presents with highly localized destruction." },
                    { title: "Differential Diagnosis of Meningitis via CSF Analysis", question: "Using the provided data, analyze the differences in Cerebrospinal Fluid (CSF) findings between Acute Bacterial, Viral, and Tuberculous meningitis.", answer: "CSF analysis is critical for differentiating the etiology of meningitis. In Acute Bacterial Meningitis, the fluid appears turbid with a significantly elevated opening pressure. The white blood cell (WBC) count is high with a predominance of Polymorphonuclear leukocytes (PMNs). Protein levels are elevated, while glucose levels are characteristically low.\n\nViral Meningitis presents with a normal to moderately increased opening pressure and clear fluid. The WBC count is elevated, but the cell type is predominantly lymphocytes. Protein levels are normal to mildly increased, and glucose levels typically remain normal, which is a key differentiator from bacterial and tuberculous forms.\n\nTuberculous Meningitis often shows an increased opening pressure, though it may be low if a spinal block occurs. The fluid may show a \"cobweb formation.\" Like viral meningitis, the WBC increase is lymphocytic; however, it differs significantly from viral meningitis because the protein is increased and the glucose is decreased, similar to the bacterial profile. This combination of lymphocytic pleocytosis and low glucose is a hallmark of the tuberculous variety." }
                ],
                mnemonics: [
                    { title: 'HSV-1 "Three T\'s"', desc: 'Temporal Lobe, Thoughts (Mood/Memory changes), and Type A (Cowdry Type A inclusions).' },
                    { title: 'PML "The Three I\'s"', desc: 'Immunosuppressed patients, Infects oligodendrocytes, Irregular white matter destruction.' },
                    { title: 'CSF Glucose Rule', desc: '"Bacterial and Tubercular take the sugar" (Low Glucose). "Viral leaves the sugar" (Normal Glucose).' },
                    { title: 'Brain Abscess Origins', desc: 'Direct (Trauma), Local (Ear/Sinus), Hematogenous (Heart/Lung) — Think D-L-H (like the shipping company, delivering infection to the brain).' }
                ],
                terms: [
                    { term: 'Ring-enhancing lesion', def: 'Classic CT/MRI appearance of a brain abscess.' },
                    { term: 'Liquefactive necrosis', def: 'The type of tissue death found in the center of an acute brain abscess.' },
                    { term: 'Reactive gliosis', def: 'The cellular response surrounding the fibrous capsule of a chronic abscess.' },
                    { term: 'Neuronophagia', def: 'The destruction of nerve cells by phagocytes, seen in viral encephalitis.' },
                    { term: 'Microglial nodules', def: 'Small clusters of microglia found in the brain parenchyma during viral infection.' },
                    { term: 'Negri bodies', def: 'Characteristic cytoplasmic inclusion bodies found in Rabies.' },
                    { term: 'Cowdry type A', def: 'Eosinophilic intranuclear inclusion bodies found in HSV-1 (neurons and glia).' },
                    { term: 'JC Virus', def: 'The causative agent of Progressive Multifocal Leukoencephalopathy (PML).' },
                    { term: 'Demyelination', def: 'The destruction of the myelin sheath, specifically in the white matter during PML.' },
                    { term: 'Cobweb formation', def: 'A physical characteristic of CSF in Tuberculous meningitis.' }
                ]
            },
            parkinsonism: {
                title: "Alzheimer's & Parkinsonism",
                shortQuiz: [
                    { q: "How are neurodegenerative diseases defined in terms of neuronal loss?", a: "These diseases are characterized by the cellular degeneration of specific subsets of neurons that are related by function rather than location. They are frequently associated with the accumulation of abnormal proteins within the CNS." },
                    { q: "What is the difference between primary and secondary dementia?", a: "Primary dementia is caused by idiopathic or genetic neurodegenerative diseases like Alzheimer's. Secondary dementia results from external factors or other medical conditions such as vascular infarcts, alcoholism, or vitamin deficiencies." },
                    { q: "Identify the three enzymes involved in APP processing and specify which combination leads to Alzheimer's Disease.", a: "The three enzymes are α-secretase, β-secretase (BACE), and γ-secretase. Alzheimer’s is caused by the sequential cleavage of APP by β-secretase and γ-secretase, which creates the pathogenic Aβ peptide." },
                    { q: "How does the ApoE4 allele influence the risk of developing Alzheimer's?", a: "Each present ApoE4 allele increases the risk of Alzheimer's by approximately four-fold. Furthermore, the presence of this variant appears to lower the age of onset for the disease." },
                    { q: "What role does glutamate play in the death of neurons in AD?", a: "Amyloid deposits lead to increased glutamate levels, which over-activate NMDA receptors. This causes an influx of calcium into the neurons, leading to excitotoxicity and cell apoptosis." },
                    { q: "Describe the gross morphological changes in the sulci and ventricles of an AD patient.", a: "The brain undergoes cortical atrophy in the frontal, temporal, and parietal lobes, which results in the physical widening of the sulci. This loss of brain tissue also leads to compensatory enlargement of the ventricles." },
                    { q: "What are neurofibrillary tangles and what protein are they composed of?", a: "Neurofibrillary tangles are intracellular aggregates of hyper-phosphorylated tau protein. They appear as flame-shaped or globular structures within the neuronal cell bodies and contribute to cell death." },
                    { q: "What is \"hydrocephalus ex vacuo\"?", a: "This is a compensatory dilatation of the brain's ventricles. It occurs as a result of the severe loss of brain parenchyma (cortical atrophy) rather than increased intracranial pressure." },
                    { q: "List three reversible causes of dementia that must be ruled out during diagnosis.", a: "Physicians must exclude obstructive hydrocephalus, vitamin deficiency, and hypothyroidism. Other treatable causes include neurosyphilis and HIV encephalitis." },
                    { q: "Describe the microscopic appearance of a neuritic plaque.", a: "Neuritic plaques are extracellular, focal spherical structures. They consist of a central amyloid core surrounded by reactive astrocytes, microglia, and dystrophic neurites." }
                ],
                essays: [
                    { title: "The Pathogenesis of Alzheimer’s Disease", question: "Discuss the \"Amyloid Cascade Hypothesis\" and how it leads to the characteristic pathological hallmarks of Alzheimer's Disease.", answer: "The pathogenesis of Alzheimer’s Disease (AD) is centered on the accumulation of beta-amyloid (Aβ) peptide. This process begins with the transmembrane protein known as Amyloid Precursor Protein (APP). In a pathogenic state, APP is cleaved by β-amyloid converting enzyme (BACE) and γ-secretase, creating Aβ. When Aβ accumulates, it forms extracellular deposits that are toxic to neurons, disrupting neurotransmission and eventually causing neuronal death.\n\nThe presence of Aβ initiates several secondary cascades. First, it triggers the hyper-phosphorylation of tau, a microtubule-binding protein. Hyper-phosphorylated tau detaches from axons and aggregates into intracellular neurofibrillary tangles (NFTs) in the cell bodies and dendrites. Second, amyloid deposits increase glutamate levels, which over-stimulate NMDA receptors. This leads to a lethal influx of calcium (Ca2+) into the cell, a process known as excitotoxicity. Together, these processes result in the progressive loss of cholinergic neurons, leading to the clinical symptoms of dementia." },
                    { title: "Classification of Neurodegenerative Disorders", question: "Explain how neurodegenerative diseases are classified according to their clinical presentation and the specific regions of the nervous system they affect.", answer: "Neurodegenerative diseases are categorized by the functional systems they disrupt and the specific brain regions where neuronal loss occurs.\n\nCerebral Cortex: Damage to cortical neurons primarily results in dementia, characterized by the loss of memory, language, and planning. Key examples include Alzheimer’s Disease and Frontotemporal dementia.\nBasal Ganglia: Degeneration in this area leads to movement disorders. These can be \"hyperkinetic,\" such as Huntington’s chorea, or \"akinetic-rigid,\" such as Parkinson’s Disease and multiple system atrophy (affecting the substantia nigra).\nCerebellum: Disorders affecting the cerebellum result in ataxia, which is a loss of motor coordination. This is seen in conditions like Spinocerebellar ataxias and olivopontocerebellar atrophy.\nMotor Neurons: When upper and lower motor neuron pathways are affected, the result is muscle weakness. Examples include Amyotrophic lateral sclerosis (ALS) and spinal muscular atrophy." }
                ],
                mnemonics: [
                    { title: 'The "ABCD" of Neurodegenerative Classification', desc: "Ataxia → Cerebellum\nBasal Ganglia → Movement (Parkinson's/Huntington's)\nCortex → Dementia (Alzheimer's)\nDecreased Strength (Motor Neurons) → Weakness (ALS)" },
                    { title: 'Pathogenic Enzymes (The "B-γ" Rule)', desc: "B-secretase + γ-secretase = Bad (Alzheimer's Aβ formation).\nα-secretase + γ-secretase = Good (Non-pathogenic)." }
                ],
                terms: [
                    { term: 'ApoE4', def: 'The major genetic risk factor variant for sporadic AD.' },
                    { term: 'β-amyloid (Aβ)', def: 'The primary protein found in the core of neuritic plaques.' },
                    { term: 'Cerebral Amyloid Angiopathy', def: 'Deposition of amyloid in blood vessel walls; a common co-existing pathology in AD.' },
                    { term: 'Flame-shaped', def: 'The classic descriptive term for the microscopic appearance of neurofibrillary tangles.' },
                    { term: 'Gliosis', def: 'The scarring process in the CNS involving reactive astrocytes following neuronal loss.' },
                    { term: 'Hydrocephalus ex vacuo', def: 'Ventricular enlargement caused by brain shrinkage (atrophy).' },
                    { term: 'Tau Protein', def: 'A microtubule-associated protein that becomes hyper-phosphorylated in AD.' },
                    { term: 'Widened Sulci', def: 'A gross morphological hallmark of cortical atrophy.' }
                ]
            },
            multiple_sclerosis: {
                title: "Multiple Sclerosis",
                shortQuiz: [
                    { q: "How are demyelinating disorders defined and what is their primary physiological effect?", a: "Demyelinating disorders are diseases of the nervous system where the myelin sheath of neurons is damaged. This damage impairs the conduction of electrical signals along the affected nerves, leading to various neurological deficits." },
                    { q: "Distinguish between Myelinoclastic and Leukodystrophic (Dysmyelinating) diseases.", a: "Myelinoclastic diseases occur when normal, healthy myelin is destroyed by external factors like toxins or autoimmune responses, such as in Multiple Sclerosis. In contrast, Leukodystrophic diseases involve myelin that is not formed properly or has abnormal turnover kinetics due to genetic mutations." },
                    { q: "What is the specific role of oligodendrocytes in the central nervous system?", a: "Oligodendrocytes are specialized cells responsible for assembling the multiple layers of plasma membranes that form the myelin sheath. This sheath acts as an electrical insulator, allowing for the rapid propagation of neural impulses along axons." },
                    { q: "How is Multiple Sclerosis (MS) characterized in terms of its clinical episodes?", a: "MS is characterized by distinct episodes of neurologic deficits that are \"separated in time.\" These episodes are attributable to white matter lesions that are \"separated in space,\" meaning they occur in different locations within the central nervous system." },
                    { q: "What are the primary genetic factors and risk correlations associated with MS?", a: "Genetic risk is linked to the HLA-DR locus and genes encoding receptors for cytokines IL-2 and IL-7. The disease shows a 15-fold higher risk in first-degree relatives and a 25% concordance rate in monozygotic twins, which is significantly higher than in dizygotic twins." },
                    { q: "Which immune cells are implicated in the pathogenesis of MS?", a: "CD4+ T helper cells and CD8+ cytotoxic T cells play a central role by recognizing myelin as foreign and initiating an inflammatory attack. B cells are also involved, as evidenced by the presence of specific antibodies in the cerebrospinal fluid." },
                    { q: "Describe the gross morphological appearance of MS plaques.", a: "Grossly, MS is identified by multiple, well-circumscribed, and slightly depressed lesions called plaques. These are typically glassy-appearing, gray-tan in color, and irregularly shaped, commonly found near the ventricles or optic nerves." },
                    { q: "What characterizes an \"active plaque\" at the microscopic level?", a: "Active plaques show evidence of ongoing myelin breakdown with abundant macrophages containing myelin debris. These lesions are often centered on small veins and feature \"perivascular cuffs\" made of lymphocytes and macrophages." },
                    { q: "What findings are expected in the Cerebrospinal Fluid (CSF) of a patient with MS?", a: "The CSF typically shows a mildly elevated protein level and an increased proportion of immunoglobulins. Upon further examination, these immunoglobulins usually manifest as \"oligoclonal bands.\"" },
                    { q: "Where are MS lesions most frequently located within the central nervous system?", a: "Plaques are frequently found in the white matter, specifically near the ventricles, the optic nerves and chiasm, the brain stem, the cerebellum, the spinal cord, and both ascending and descending fiber tracts." }
                ],
                essays: [
                    { title: "Pathogenesis and Cellular Mechanisms of Multiple Sclerosis", question: "Discuss the pathogenesis of Multiple Sclerosis, detailing the roles of environmental factors, genetics, and specific immune cells in the destruction of myelin.", answer: "Multiple Sclerosis is an autoimmune demyelinating disorder resulting from a loss of tolerance to self-proteins, specifically myelin antigens. The pathogenesis is believed to be triggered by a combination of environmental factors—potentially an uncertain infectious agent—and genetic predispositions. Key genetic associations include the HLA-DR locus and polymorphisms in the IL-2 and IL-7 cytokine receptor genes, which govern the regulation of T cell-mediated immune responses.\n\nAt the cellular level, the immune system incorrectly identifies myelin as a foreign substance. CD4+ (T helper) and CD8+ (cytotoxic) T cells are the primary mediators of this inflammatory response. These cells, along with macrophages, exert toxic effects that lead to demyelination. While the process is characterized by demyelination occurring out of proportion to axonal loss, the secreted molecules from these lymphocytes can eventually cause axonal injury and neuronal death. Additionally, B cell involvement is confirmed by the presence of antibodies in the CSF, though their exact role in the progression of the disease remains under investigation." },
                    { title: "Clinical Presentation and Diagnostic Indicators of MS", question: "Explain the clinical course of Multiple Sclerosis, common symptoms, and the mandatory diagnostic tools used to confirm the condition.", answer: "The clinical course of MS is characteristically variable, most often following a relapsing-remitting pattern. Patients experience episodes of neurologic impairment followed by periods of remission; however, recovery during these remissions is typically incomplete, leading to a stepwise accumulation of neurologic deficits over time. In a subset of patients, the disease may manifest as a steady neurologic deterioration.\n\nSymptoms are diverse due to the varied locations of white matter plaques and include ocular paralysis, impaired vision, dysarthria (speech problems), and muscle weakness. Patients may also present with unsteady gait, spastic paraparesis, incontinence, and hypoesthesias (loss of sensation). For diagnosis, imaging studies—specifically an MRI of the brain—are mandatory to visualize plaques. Laboratory analysis of the CSF is also vital, looking for elevated protein levels and the signature presence of oligoclonal bands, which indicate abnormal immunoglobulin production within the central nervous system." }
                ],
                mnemonics: [
                    { title: 'The "S" of MS (Clinical Location)', desc: "Spinal Cord\nSpace (lesions separated in)\nSharp borders (microscopic)\nSpeech problems (Dysarthria)\nSensation loss" },
                    { title: 'The "M" of Myelin', desc: "Multiple layers (structure)\nMacrophages (contain myelin debris in active plaques)\nMandatory MRI (for diagnosis)\nMonozygotic twins (25% concordance)" }
                ],
                terms: [
                    { term: 'Demyelination', def: 'Damage to the myelin sheath that impairs nerve signal conduction.' },
                    { term: 'Myelinoclastic', def: 'Destruction of previously normal myelin (e.g., MS).' },
                    { term: 'Leukodystrophy', def: 'A dysmyelinating disease where myelin is abnormal or fails to form.' },
                    { term: 'Oligodendrocyte', def: 'The CNS cell responsible for assembling and maintaining myelin.' },
                    { term: 'Plaque', def: 'A well-circumscribed, glassy, gray-tan lesion characteristic of MS.' },
                    { term: 'Perivascular Cuffs', def: 'Clusters of lymphocytes and macrophages around small veins in MS lesions.' },
                    { term: 'Oligoclonal Bands', def: 'The hallmark immunoglobulin patterns found in the CSF of MS patients.' },
                    { term: 'White Matter', def: 'The area of the brain where myelinated axons are the dominant component.' },
                    { term: '"Separated in Time and Space"', def: 'The classic clinical definition of MS lesions and episodes.' },
                    { term: '"Glassy-appearing, gray-tan"', def: 'The specific gross description of MS plaques.' },
                    { term: '"HLA-DR"', def: 'The primary genetic locus associated with MS risk.' }
                ]
            }
        };

        // --- Main App Component ---
        function App() {
          const [currentView, setCurrentView] = useState('dashboard');
          const [direction, setDirection] = useState('forward');

          const navigateTo = (view) => {
            if (view === 'dashboard') {
                setDirection('backward');
            } else if ((view === 'cns_infections_menu' || view === 'neurodegen_menu') && currentView !== 'dashboard') {
                setDirection('backward'); // Going back to submenu from a topic
            } else {
                setDirection('forward');
            }
            setCurrentView(view);
          };

          const backToPortal = () => { window.location.href = 'index.html#cns'; };

          return (
            <>
              <div key={currentView} className={direction === 'forward' ? 'slide-forward' : 'slide-backward'}>
                
                {currentView === 'dashboard' && (
                  <Dashboard onSelectGuide={navigateTo} onBackToPortal={backToPortal} />
                )}

                {currentView === 'cns_infections_menu' && (
                  <InfectionsSubMenu onSelectGuide={navigateTo} onBack={() => navigateTo('dashboard')} />
                )}

                {currentView === 'neurodegen_menu' && (
                  <NeurodegenSubMenu onSelectGuide={navigateTo} onBack={() => navigateTo('dashboard')} />
                )}

                {(currentView === 'cerebellar_tumors' || currentView === 'meningeal_infections' || currentView === 'parenchymal_infections' || currentView === 'parkinsonism' || currentView === 'multiple_sclerosis') && (
                  <PathologyTopicGuide 
                    topicId={currentView} 
                    onBack={() => {
                        if(currentView === 'meningeal_infections' || currentView === 'parenchymal_infections') {
                            navigateTo('cns_infections_menu');
                        } else if(currentView === 'parkinsonism' || currentView === 'multiple_sclerosis') {
                            navigateTo('neurodegen_menu');
                        } else {
                            navigateTo('dashboard');
                        }
                    }} 
                  />
                )}

              </div>
              
              <div className="fixed bottom-2 right-3 text-right text-[10px] md:text-xs text-slate-400/50 font-medium pointer-events-none z-50 select-none">
                <div>Dr.Zeyad Robey</div>

                </div>
              </nav>

              {/* MAIN CONTENT AREA */}
              <main className="flex-1 p-4 md:p-8 overflow-y-auto w-full max-w-5xl mx-auto">
                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-10 min-h-[80vh]">
                  
                  {/* Empty State / Coming Soon */}
                  {(data.shortQuiz.length === 0 && data.essays.length === 0) && (
                      <div className="flex flex-col items-center justify-center h-full min-h-[50vh] text-center space-y-4 animate-in">
                          <i className={`fa-solid fa-person-digging text-6xl text-slate-300`}></i>
                          <h2 className="text-2xl font-bold text-slate-700">Content Coming Soon</h2>
                          <p className="text-slate-500 max-w-md">The study guide for <strong>{data.title}</strong> is currently being prepared. Check back later to review this material!</p>
                      </div>
                  )}

                  {/* Short Essay Tab (WITH GOOGLE STYLE PAGINATION) */}
                  {activeTab === 'quiz' && data.shortQuiz.length > 0 && (() => {
                    const itemsPerPage = 5;
                    const totalPages = Math.ceil(data.shortQuiz.length / itemsPerPage);
                    const startIndex = (currentPage - 1) * itemsPerPage;
                    const currentQuestions = data.shortQuiz.slice(startIndex, startIndex + itemsPerPage);

                    return (
                      <div className="space-y-6 animate-in">
                        <div className="border-b border-slate-200 pb-4">
                          <h2 className="text-3xl font-bold text-slate-800 flex items-center gap-3">
                            <i className={`fa-solid fa-list-check text-${themeColor}-600`}></i> Short Essay
                          </h2>
                          <p className="text-slate-600 mt-2">Targeted, 2-3 sentence high-yield written responses for {data.title}.</p>
                        </div>
                        
                        <div key={currentPage} className="space-y-3 animate-in min-h-[300px]">
                          {currentQuestions.map((item, idx) => {
                            const absoluteIndex = startIndex + idx;
                            return (
                              <div key={absoluteIndex} className={`border border-slate-200 rounded-xl overflow-hidden shadow-sm hover:border-${themeColor}-400 transition-all duration-300 hover:shadow-md`}>
                                <button
                                  onClick={() => setOpenShortIndex(openShortIndex === absoluteIndex ? null : absoluteIndex)}
                                  className="w-full text-left p-4 bg-white hover:bg-slate-50 flex justify-between items-center focus:outline-none transition-colors"
                                >
                                  <span className="font-semibold text-slate-800 pr-4">Q{absoluteIndex + 1}: {item.q}</span>
                                  <i className={`fa-solid fa-chevron-down transition-transform duration-300 ${openShortIndex === absoluteIndex ? `rotate-180 text-${themeColor}-600` : 'text-slate-400'}`}></i>
                                </button>
                                
                                <div className={`grid transition-all duration-300 ease-in-out ${openShortIndex === absoluteIndex ? 'grid-rows-[1fr] opacity-100' : 'grid-rows-[0fr] opacity-0'}`}>
                                  <div className="overflow-hidden">
                                    <div className={`p-4 bg-${themeColor}-50 border-t border-${themeColor}-100 text-slate-700`}>
                                      <strong className={`text-${themeColor}-800 block mb-1`}>Answer:</strong>
                                      {item.a}
                                    </div>
                                  </div>
                                </div>
                              </div>
                            );
                          })}
                        </div>

                        {/* Interactive Google-Style Sliding Pagination */}
                        {totalPages > 1 && (
                          <div className="flex justify-center items-center gap-4 mt-8 pt-6 border-t border-slate-200">
                            {/* Previous Arrow */}
                            <button 
                              onClick={() => { setCurrentPage(prev => Math.max(1, prev - 1)); setOpenShortIndex(null); }}
                              disabled={currentPage === 1}
                              className={`w-10 h-10 flex items-center justify-center rounded-full transition-all duration-300 ${currentPage === 1 ? 'opacity-40 cursor-not-allowed text-slate-400 bg-slate-100' : `text-${themeColor}-600 bg-white border border-slate-200 hover:bg-${themeColor}-50 hover:text-${themeColor}-700 hover:shadow-md hover:-translate-x-1 cursor-pointer`}`}
                            >
                              <i className="fa-solid fa-chevron-left"></i>
                            </button>

                            {/* Sliding Carousel Window */}
                            <div className="relative w-[232px] h-12 overflow-hidden flex items-center">
                              <div 
                                className="flex gap-2 absolute left-0 transition-transform duration-500 ease-out" 
                                style={{ transform: `translateX(${96 - (currentPage - 1) * 48}px)` }}
                              >
                                {[...Array(totalPages)].map((_, i) => {
                                  const pageNum = i + 1;
                                  const distance = Math.abs(currentPage - pageNum);
                                  
                                  let sizeClasses = "";
                                  if (distance === 0) {
                                      sizeClasses = `w-10 h-10 text-base bg-${themeColor}-600 text-white shadow-md ring-2 ring-${themeColor}-200 ring-offset-1 z-10 opacity-100`;
                                  } else if (distance === 1) {
                                      sizeClasses = `w-8 h-8 text-sm bg-white text-slate-600 border border-slate-200 hover:bg-${themeColor}-50 hover:text-${themeColor}-600 hover:border-${themeColor}-300 opacity-100 cursor-pointer hover:scale-110`;
                                  } else if (distance === 2) {
                                      sizeClasses = `w-6 h-6 text-xs bg-white text-slate-500 border border-slate-200 hover:bg-${themeColor}-50 hover:text-${themeColor}-600 hover:border-${themeColor}-300 opacity-50 cursor-pointer hover:scale-125`;
                                  } else {
                                      sizeClasses = "w-4 h-4 text-[0px] bg-white text-slate-400 border border-slate-200 opacity-0 pointer-events-none";
                                  }

                                  return (
                                    <div key={i} className="w-10 h-10 shrink-0 flex items-center justify-center">
                                      <button
                                        onClick={() => { setCurrentPage(pageNum); setOpenShortIndex(null); }}
                                        className={`rounded-full font-bold transition-all duration-300 flex items-center justify-center shrink-0 ${sizeClasses}`}
                                      >
                                        {pageNum}
                                      </button>
                                    </div>
                                  );
                                })}
                              </div>
                            </div>

                            {/* Next Arrow */}
                            <button 
                              onClick={() => { setCurrentPage(prev => Math.min(totalPages, prev + 1)); setOpenShortIndex(null); }}
                              disabled={currentPage === totalPages}
                              className={`w-10 h-10 flex items-center justify-center rounded-full transition-all duration-300 ${currentPage === totalPages ? 'opacity-40 cursor-not-allowed text-slate-400 bg-slate-100' : `text-${themeColor}-600 bg-white border border-slate-200 hover:bg-${themeColor}-50 hover:text-${themeColor}-700 hover:shadow-md hover:translate-x-1 cursor-pointer`}`}
                            >
                              <i className="fa-solid fa-chevron-right"></i>
                            </button>
                          </div>
                        )}
                      </div>
                    );
                  })()}

                  {/* Essays Tab */}
                  {(activeTab === 'long_essay' && data.essays.length > 0) && (
                    <div className="space-y-6 animate-in">
                      <div className="border-b border-slate-200 pb-4">
                        <h2 className="text-3xl font-bold text-slate-800 flex items-center gap-3">
                          <i className={`fa-solid fa-book-open text-${themeColor}-600`}></i> Essay Questions
                        </h2>
                        <p className="text-slate-600 mt-2">Comprehensive, multi-part pathological discussions.</p>
                      </div>
                      
                      <div className="flex flex-col gap-4">
                        {data.essays.map((essay, idx) => (
                          <div key={idx} className={`border rounded-xl overflow-hidden transition-all duration-300 ${openLongIndex === idx ? `border-${themeColor}-300 shadow-md ring-1 ring-${themeColor}-100` : `border-slate-200 hover:border-${themeColor}-200 hover:shadow-md`}`}>
                            <button 
                              className={`w-full text-left p-5 flex justify-between items-start gap-4 transition-colors duration-200 active:bg-${themeColor}-100/50 ${openLongIndex === idx ? `bg-${themeColor}-50` : 'bg-white hover:bg-slate-50'}`}
                              onClick={() => setOpenLongIndex(openLongIndex === idx ? null : idx)}
                            >
                              <div>
                                <h3 className={`font-bold text-lg leading-snug transition-colors duration-300 ${openLongIndex === idx ? `text-${themeColor}-900` : 'text-slate-800'}`}>
                                  Essay {idx + 1}: {essay.title}
                                </h3>
                                <p className="text-slate-600 text-sm mt-1">{essay.question}</p>
                              </div>
                              <i className={`fa-solid fa-chevron-down mt-1 shrink-0 transition-transform duration-300 ${openLongIndex === idx ? `rotate-180 text-${themeColor}-600` : 'text-slate-400'}`}></i>
                            </button>
                            
                            <div className={`grid transition-all duration-300 ease-in-out ${openLongIndex === idx ? 'grid-rows-[1fr] opacity-100' : 'grid-rows-[0fr] opacity-0'}`}>
                              <div className="overflow-hidden">
                                <div className={`p-6 bg-white border-t border-${themeColor}-100 text-slate-700 leading-relaxed text-lg shadow-inner whitespace-pre-wrap`}>
                                  {essay.answer}
                                </div>
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Glossary Tab */}
                  {(activeTab === 'glossary' && (data.mnemonics.length > 0 || data.terms.length > 0)) && (
                    <div className="space-y-8 animate-in">
                      <div className="border-b border-slate-200 pb-4">
                        <h2 className="text-3xl font-bold text-slate-800 flex items-center gap-3">
                          <i className={`fa-solid fa-bookmark text-${themeColor}-600`}></i> Glossary & Mnemonics
                        </h2>
                        <p className="text-slate-600 mt-2">Key terms, golden buzzwords, and memory hooks.</p>
                      </div>

                      <div className="grid md:grid-cols-2 gap-8 pt-4">
                        {/* Mnemonics */}
                        <div className={`bg-${themeColor}-50 rounded-xl p-6 border border-${themeColor}-200 shadow-sm`}>
                          <h3 className={`text-xl font-bold text-${themeColor}-900 mb-4 flex items-center gap-2`}>
                            <i className="fa-solid fa-brain"></i> High-Yield Mnemonics
                          </h3>
                          <div className="space-y-4">
                            {data.mnemonics.map((item, idx) => (
                              <div key={idx} className={`bg-white p-4 rounded-lg shadow-sm border-l-4 border-${themeColor}-500`}>
                                <div className={`font-bold text-${themeColor}-900 text-lg mb-1`}>{item.title}</div>
                                <p className="text-slate-700 text-sm whitespace-pre-line">{item.desc}</p>
                              </div>
                            ))}
                          </div>
                        </div>

                        {/* Key Terms */}
                        <div>
                          <h3 className="text-xl font-bold text-slate-800 mb-4 bg-slate-100 p-2 rounded-md inline-flex items-center gap-2">
                            <i className="fa-solid fa-list text-slate-600"></i> Key Terms and Buzzwords
                          </h3>
                          <div className="flex flex-col gap-3">
                            {data.terms.map((item, idx) => (
                              <div key={idx} className={`border border-slate-200 p-3 rounded-lg bg-white hover:border-${themeColor}-300 transition-colors`}>
                                <h4 className={`font-bold text-${themeColor}-800 mb-1`}>{item.term}</h4>
                                <p className="text-slate-600 text-sm">{item.def}</p>
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    </div>
                  )}

                </div>
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
