<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroPharm Hub</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load React, ReactDOM, and Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Load Icons (FontAwesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Custom Page Transition Animations */
        @keyframes slideInRight {
            0% { transform: translateX(60px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideInLeft {
            0% { transform: translateX(-60px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }
        .slide-forward {
            animation: slideInRight 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .slide-backward {
            animation: slideInLeft 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Tab Content & Section Enter Animation */
        @keyframes fadeSlideUp {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fadeSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="bg-slate-50 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Icon Component Wrappers (Replaces lucide-react) ---
        const BookOpen = ({className}) => <i className={`fa-solid fa-book-open flex items-center justify-center ${className}`}></i>;
        const List = ({className}) => <i className={`fa-solid fa-list-ul flex items-center justify-center ${className}`}></i>;
        const Activity = ({className}) => <i className={`fa-solid fa-chart-line flex items-center justify-center ${className}`}></i>;
        const Pill = ({className}) => <i className={`fa-solid fa-pills flex items-center justify-center ${className}`}></i>;
        const Shield = ({className}) => <i className={`fa-solid fa-shield-halved flex items-center justify-center ${className}`}></i>;
        const HelpCircle = ({className}) => <i className={`fa-solid fa-circle-question flex items-center justify-center ${className}`}></i>;
        const FileText = ({className}) => <i className={`fa-solid fa-file-lines flex items-center justify-center ${className}`}></i>;
        const Bookmark = ({className}) => <i className={`fa-solid fa-bookmark flex items-center justify-center ${className}`}></i>;
        const Menu = ({className}) => <i className={`fa-solid fa-bars flex items-center justify-center ${className}`}></i>;
        const X = ({className}) => <i className={`fa-solid fa-xmark flex items-center justify-center ${className}`}></i>;
        const ChevronDown = ({className}) => <i className={`fa-solid fa-chevron-down flex items-center justify-center ${className}`}></i>;
        const ChevronUp = ({className}) => <i className={`fa-solid fa-chevron-up flex items-center justify-center ${className}`}></i>;
        const Brain = ({className}) => <i className={`fa-solid fa-brain flex items-center justify-center ${className}`}></i>;
        const Zap = ({className}) => <i className={`fa-solid fa-bolt flex items-center justify-center ${className}`}></i>;
        const ArrowLeft = ({className}) => <i className={`fa-solid fa-arrow-left flex items-center justify-center ${className}`}></i>;
        const Library = ({className}) => <i className={`fa-solid fa-book-bookmark flex items-center justify-center ${className}`}></i>;
        const Clock = ({className}) => <i className={`fa-regular fa-clock flex items-center justify-center ${className}`}></i>;
        const Lock = ({className}) => <i className={`fa-solid fa-lock flex items-center justify-center ${className}`}></i>;
        const AlertTriangle = ({className}) => <i className={`fa-solid fa-triangle-exclamation flex items-center justify-center ${className}`}></i>;
        const CheckCircle = ({className}) => <i className={`fa-solid fa-circle-check flex items-center justify-center ${className}`}></i>;
        const HeartPulse = ({className}) => <i className={`fa-solid fa-heart-pulse flex items-center justify-center ${className}`}></i>;
        const Home = ({className}) => <i className={`fa-solid fa-house flex items-center justify-center ${className}`}></i>;

        // --- Main App Component ---
        function App() {
          const [currentView, setCurrentView] = useState('dashboard');
          const [direction, setDirection] = useState('forward');

          const navigateTo = (view) => {
            if (view === 'dashboard') {
              setDirection('backward');
            } else {
              setDirection('forward');
            }
            setCurrentView(view);
          };

          const backToPortal = () => {
              window.location.href = 'index.html#cns';
          };

          let content;
          if (currentView === 'anxiolytics') {
            content = <AnxiolyticsStudyGuide onBack={() => navigateTo('dashboard')} />;
          } else if (currentView === 'antidepressants') {
            content = <AntidepressantsStudyGuide onBack={() => navigateTo('dashboard')} />;
          } else if (currentView === 'epilepsy') {
            content = <EpilepsyStudyGuide onBack={() => navigateTo('dashboard')} />;
          } else {
            content = <Dashboard onSelectGuide={navigateTo} onBackToPortal={backToPortal} />;
          }

          return (
            <>
              <div key={currentView} className={direction === 'forward' ? 'slide-forward' : 'slide-backward'}>
                {content}
              </div>
              
              {/* Persistent Watermark */}
              <div className="fixed bottom-2 right-3 text-right text-[10px] md:text-xs text-slate-400/50 font-medium pointer-events-none z-50 select-none">
                <div>Dr.Zeyad Robey</div>
                <div>Ain Shams University</div>
              </div>
            </>
          );
        }

        function Dashboard({ onSelectGuide, onBackToPortal }) {
          const guides = [
            {
              id: 'anxiolytics',
              title: 'Anxiolytics & Sedative-Hypnotics',
              description: 'Pharmacology, classification, and clinical applications of CNS depressants.',
              status: 'active',
              icon: <Brain className="text-2xl text-blue-500" />,
              color: 'bg-blue-50 border-blue-200'
            },
            {
              id: 'antidepressants',
              title: 'Antidepressants & Mood Stabilizers',
              description: 'SSRIs, SNRIs, TCAs, MAOIs, mechanisms of action, and clinical guidelines.',
              status: 'active',
              icon: <Activity className="text-2xl text-emerald-500" />,
              color: 'bg-emerald-50 border-emerald-200'
            },
            {
              id: 'epilepsy',
              title: 'Epilepsy & Migraines',
              description: 'AED mechanisms, seizure classifications, status epilepticus, and migraine management.',
              status: 'active',
              icon: <Zap className="text-2xl text-purple-500" />,
              color: 'bg-purple-50 border-purple-200'
            }
          ];

          return (
            <div className="min-h-screen bg-slate-100 font-sans text-slate-800 p-6 md:p-12">
              <div className="max-w-6xl mx-auto space-y-8 animate-in fade-in duration-500">
                
                <button 
                  onClick={onBackToPortal}
                  className="group flex items-center gap-2 text-slate-500 hover:text-blue-600 font-bold transition-all"
                >
                  <Home className="group-hover:-translate-y-1 transition-transform" /> 
                  <span className="text-sm uppercase tracking-wider">Back to CNS Module</span>
                </button>

                <header className="flex items-center justify-between pb-6 border-b border-slate-200">
                  <div className="flex items-center gap-4">
                    <div className="bg-blue-600 p-3 rounded-xl shadow-lg w-12 h-12 flex items-center justify-center text-white text-xl">
                      <Library />
                    </div>
                    <div>
                      <h1 className="text-3xl md:text-4xl font-bold text-slate-900 tracking-tight">NeuroPharm Hub</h1>
                      <p className="text-slate-500 font-medium mt-1">Pharmacology Subject Dashboard</p>
                    </div>
                  </div>
                </header>

                <main>
                  <h2 className="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                    <BookOpen className="text-blue-600" />
                    Available Study Modules
                  </h2>
                  
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {guides.map((guide) => (
                      <div 
                        key={guide.id}
                        onClick={() => guide.status === 'active' && onSelectGuide(guide.id)}
                        className={`
                          relative overflow-hidden rounded-2xl border-2 p-6 transition-all duration-300 ease-out flex flex-col h-full transform
                          ${guide.color}
                          ${guide.status === 'active' 
                            ? 'cursor-pointer hover:shadow-2xl hover:-translate-y-2 hover:scale-[1.02] hover:border-current group' 
                            : 'opacity-75 grayscale-[0.5] cursor-not-allowed'}
                        `}
                      >
                        {guide.status === 'locked' && (
                          <div className="absolute top-4 right-4 bg-slate-200 p-2 rounded-full w-8 h-8 flex items-center justify-center">
                            <Lock className="text-sm text-slate-500" />
                          </div>
                        )}
                        
                        <div className={`bg-white w-16 h-16 rounded-2xl shadow-sm flex items-center justify-center mb-6 shrink-0 transition-transform duration-300 ${guide.status === 'active' ? 'group-hover:scale-110 group-hover:rotate-3' : ''}`}>
                          {guide.icon}
                        </div>
                        
                        <h3 className={`text-xl font-bold mb-2 ${guide.status === 'active' ? 'text-slate-900' : 'text-slate-600'}`}>
                          {guide.title}
                        </h3>
                        <p className="text-slate-600 mb-8 line-clamp-2 flex-1">
                          {guide.description}
                        </p>
                        
                        {guide.status === 'active' ? (
                          <button className="w-full py-3 px-4 bg-white/50 hover:bg-white text-slate-800 border border-slate-300 font-semibold rounded-xl transition-all duration-200 transform hover:scale-105 active:scale-95 flex items-center justify-center gap-2 mt-auto shadow-sm">
                            Open Review
                          </button>
                        ) : (
                          <div className="w-full py-3 px-4 bg-slate-200 text-slate-500 font-semibold rounded-xl flex items-center justify-center gap-2 mt-auto">
                            <Clock /> Coming Soon
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </main>
              </div>
            </div>
          );
        }

        // ==========================================
        // 1. ANXIOLYTICS & SEDATIVE-HYPNOTICS
        // ==========================================

        function AnxiolyticsStudyGuide({ onBack }) {
          const [activeTab, setActiveTab] = useState('classification');
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

          const tabs = [
            { id: 'classification', label: 'Classification', icon: <List /> },
            { id: 'receptor', label: 'GABA Receptor', icon: <Activity /> },
            { id: 'barbiturates', label: 'Barbiturates', icon: <Zap /> },
            { id: 'bzds', label: 'Benzodiazepines', icon: <Pill /> },
            { id: 'alternatives', label: 'Alternative Agents', icon: <Shield /> },
            { id: 'quiz', label: 'Flashcard Quiz', icon: <HelpCircle /> },
            { id: 'essays', label: 'Essay Review', icon: <FileText /> },
            { id: 'glossary', label: 'Glossary & Mnemonics', icon: <Bookmark /> },
          ];

          return (
            <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row font-sans text-slate-800">
              
              {/* Mobile Header */}
              <div className="md:hidden bg-blue-900 text-white p-4 flex justify-between items-center shadow-md z-20">
                <div className="flex items-center gap-3">
                  <button onClick={onBack} className="p-1 hover:bg-blue-800 rounded transition-all duration-200 active:scale-90 w-8 h-8 flex items-center justify-center group">
                    <ArrowLeft className="transition-transform duration-300 group-hover:-translate-x-1" />
                  </button>
                  <div className="flex items-center gap-2 font-bold text-lg">
                    <Brain className="text-blue-300" />
                    <span>NeuroPharm Review</span>
                  </div>
                </div>
                <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="w-8 h-8 flex items-center justify-center transition-transform duration-300 active:scale-90">
                  <div className={`transition-transform duration-300 ${isMobileMenuOpen ? 'rotate-90 scale-110' : 'rotate-0'}`}>
                    {isMobileMenuOpen ? <X /> : <Menu />}
                  </div>
                </button>
              </div>

              {/* Sidebar Navigation */}
              <nav className={`
                ${isMobileMenuOpen ? 'flex' : 'hidden'} 
                md:flex flex-col w-full md:w-72 bg-blue-900 text-white shadow-xl
                fixed md:sticky top-0 h-screen overflow-y-auto z-10 transition-all duration-300
              `}>
                <div className="p-4 border-b border-blue-800 flex items-center justify-between">
                  <button 
                    onClick={onBack}
                    className="flex items-center gap-2 text-blue-300 hover:text-white hover:bg-blue-800 px-3 py-2 rounded-lg transition-all duration-200 transform hover:-translate-x-1 active:scale-95 text-sm font-semibold w-full group"
                  >
                    <ArrowLeft className="transition-transform duration-300 group-hover:-translate-x-1" /> Back to Dashboard
                  </button>
                </div>
                <div className="hidden md:flex items-center gap-3 p-6 border-b border-blue-800">
                  <Brain className="text-2xl text-blue-300" />
                  <div>
                    <h1 className="font-bold text-xl leading-tight">NeuroPharm</h1>
                    <span className="text-blue-300 text-xs uppercase tracking-wider font-semibold">Study Guide</span>
                  </div>
                </div>
                
                <div className="p-4 flex-1">
                  <p className="text-blue-400 text-xs font-bold mb-4 uppercase tracking-wider px-2">Exam Modules</p>
                  <ul className="space-y-1">
                    {tabs.map((tab) => (
                      <li key={tab.id}>
                        <button
                          onClick={() => {
                            setActiveTab(tab.id);
                            setIsMobileMenuOpen(false);
                          }}
                          className={`w-full flex items-center gap-3 px-3 py-3 rounded-lg transition-all duration-200 transform hover:translate-x-2 active:scale-95 text-left group
                            ${activeTab === tab.id 
                              ? 'bg-blue-600 text-white shadow-md' 
                              : 'text-blue-200 hover:bg-blue-800 hover:text-white'
                            }`}
                        >
                          <span className={`w-5 h-5 flex items-center justify-center transition-transform duration-300 ${activeTab === tab.id ? 'scale-110' : 'group-hover:scale-110'}`}>{tab.icon}</span>
                          <span className="font-medium">{tab.label}</span>
                        </button>
                      </li>
                    ))}
                  </ul>
                </div>
                
                <div className="p-4 border-t border-blue-800 text-xs text-blue-400 text-center">
                  Comprehensive Review: Anxiolytics & Sedative-Hypnotics
                </div>
              </nav>

              {/* Main Content Area */}
              <main className="flex-1 p-4 md:p-8 overflow-y-auto w-full max-w-5xl mx-auto">
                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-10 min-h-[80vh]">
                  {activeTab === 'classification' && <AnxClassificationView />}
                  {activeTab === 'receptor' && <AnxReceptorView />}
                  {activeTab === 'barbiturates' && <AnxBarbituratesView />}
                  {activeTab === 'bzds' && <AnxBenzodiazepinesView />}
                  {activeTab === 'alternatives' && <AnxAlternativesView />}
                  {activeTab === 'quiz' && <AnxQuizView />}
                  {activeTab === 'essays' && <AnxEssaysView />}
                  {activeTab === 'glossary' && <AnxGlossaryView />}
                </div>
              </main>
            </div>
          );
        }

        function AnxClassificationView() {
          return (
            <div className="space-y-8 animate-in fade-in duration-500">
              <div className="border-b border-slate-200 pb-4">
                <h2 className="text-3xl font-bold text-slate-800 flex items-center gap-3">
                  <List className="text-blue-600 text-3xl" />
                  I. Classification of Sedative-Hypnotic Drugs
                </h2>
                <p className="text-slate-600 mt-2 text-lg">
                  Primarily utilized for the treatment of anxiety and insomnia. Classified into three major categories based on mechanism of action.
                </p>
              </div>

              <div>
                <h3 className="text-xl font-bold text-slate-800 mb-4 bg-blue-50 p-2 rounded-md inline-block">Primary Mechanisms of Action</h3>
                <div className="overflow-x-auto">
                  <table className="w-full border-collapse text-left">
                    <thead>
                      <tr className="bg-slate-100 border-b-2 border-slate-300">
                        <th className="p-4 font-bold text-slate-700">Category</th>
                        <th className="p-4 font-bold text-slate-700">Drug Class / Examples</th>
                        <th className="p-4 font-bold text-slate-700">Specific Mechanism</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-200">
                      <tr className="hover:bg-slate-50 transition-colors">
                        <td className="p-4 font-semibold text-blue-700">I. Facilitating GABA Action</td>
                        <td className="p-4">Barbiturates, Benzodiazepines (BZDs), Z-hypnotics (e.g., Zolpidem), Alcohol</td>
                        <td className="p-4">Potentiate the inhibitory neurotransmitter GABA at the GABA<sub>A</sub> receptor.</td>
                      </tr>
                      <tr className="hover:bg-slate-50 transition-colors">
                        <td className="p-4 font-semibold text-blue-700">II. 5-HT₁A Agonists</td>
                        <td className="p-4">Buspirone</td>
                        <td className="p-4">Partial agonist at the 5-HT₁A serotonin receptor.</td>
                      </tr>
                      <tr className="hover:bg-slate-50 transition-colors">
                        <td className="p-4 font-semibold text-blue-700">III. Melatonin Agonists</td>
                        <td className="p-4">Ramelteon</td>
                        <td className="p-4">Agonist at MT₁ and MT₂ receptors.</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>

              <div className="bg-slate-100 rounded-xl p-6 border border-slate-200">
                <h3 className="text-lg font-bold text-slate-800 mb-4 border-b border-slate-300 pb-2">Supplementary Drugs with Sedative-Hypnotic Effects</h3>
                <ul className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <li className="flex items-start gap-2">
                    <span className="w-2 h-2 rounded-full bg-blue-500 mt-2 shrink-0"></span>
                    <div>
                      <strong className="text-slate-800">Antidepressants:</strong> Mirtazapine, Tricyclic Antidepressants (TCA) such as Amitriptyline.
                    </div>
                  </li>
                  <li className="flex items-start gap-2">
                    <span className="w-2 h-2 rounded-full bg-blue-500 mt-2 shrink-0"></span>
                    <div>
                      <strong className="text-slate-800">Antipsychotics:</strong> Quetiapine, Clozapine, Olanzapine.
                    </div>
                  </li>
                  <li className="flex items-start gap-2">
                    <span className="w-2 h-2 rounded-full bg-blue-500 mt-2 shrink-0"></span>
                    <div>
                      <strong className="text-slate-800">Antihistamines:</strong> Diphenhydramine.
                    </div>
                  </li>
                  <li className="flex items-start gap-2">
                    <span className="w-2 h-2 rounded-full bg-blue-500 mt-2 shrink-0"></span>
                    <div>
                      <strong className="text-slate-800">Beta-Blockers:</strong> Propranolol (used to reduce tachycardia and tremors associated with anxiety).
                    </div>
                  </li>
                </ul>
              </div>
            </div>
          );
        }

        function AnxReceptorView() {
          return (
            <div className="space-y-8 animate-in fade-in duration-500">
              <div className="border-b border-slate-200 pb-4">
                <h2 className="text-3xl font-bold text-slate-800 flex items-center gap-3">
                  <Activity className="text-indigo-600 text-3xl" />
                  II. The GABA<sub>A</sub> Receptor-Chloride Ion Channel Complex
                </h2>
                <p className="text-slate-600 mt-2 text-lg">
                  The primary target for many sedative-hypnotics. Structure is critical for distinguishing CNS interactions.
                </p>
              </div>

              <div className="grid md:grid-cols-2 gap-6">
                <div className="bg-indigo-50 rounded-xl p-6 border border-indigo-100 shadow-sm">
                  <h3 className="text-xl font-bold text-indigo-900 mb-4">Receptor Structure</h3>
                  <ul className="space-y-3 text-slate-700">
                    <li><strong>Composition:</strong> A pentameric structure formed by three types of subunits: two alpha (α), two beta (β), and one gamma (γ).</li>
                    <li><strong>GABA Binding Site:</strong> Located at the interface between the α and β subunits.</li>
                    <li><strong>BZD Binding Site:</strong> Located on the γ subunit or an area on the α subunit regulated by γ.</li>
                    <li><strong>Barbiturate Binding Site:</strong> Located near the chloride (Cl⁻) channel, distinct from the BZD site.</li>
                  </ul>
                </div>

                <div className="bg-emerald-50 rounded-xl p-6 border border-emerald-100 shadow-sm">
                  <h3 className="text-xl font-bold text-emerald-900 mb-4">Subunit Functionality</h3>
                  <p className="text-slate-700 mb-3 italic">The specific alpha subunit determines the clinical effect:</p>
                  <div className="space-y-4">
                    <div className="bg-white p-3 rounded border border-emerald-200 flex items-center gap-3">
                      <div className="bg-emerald-500 text-white w-10 h-10 rounded-full flex items-center justify-center font-bold text-lg">α₁</div>
                      <div>Associated with <strong className="text-emerald-800">sedation and hypnosis</strong>.</div>
                    </div>
                    <div className="bg-white p-3 rounded border border-emerald-200 flex items-center gap-3">
                      <div className="bg-emerald-500 text-white w-10 h-10 rounded-full flex items-center justify-center font-bold text-lg">α₂</div>
                      <div>Associated with <strong className="text-emerald-800">anxiolytic and muscle relaxation</strong> actions.</div>
                    </div>
                  </div>
                </div>
              </div>

              <div className="bg-slate-800 text-white rounded-xl p-6 shadow-md mt-6">
                <h3 className="text-xl font-bold mb-4 border-b border-slate-600 pb-2 text-blue-300">Mechanisms of Inhibition</h3>
                <div className="grid md:grid-cols-2 gap-6">
                  <div>
                    <h4 className="text-lg font-bold text-white flex items-center gap-2 mb-2">
                      <Zap className="text-yellow-400" /> GABA<sub>A</sub> Receptors
                    </h4>
                    <p className="text-slate-300 text-sm leading-relaxed">
                      Mediate <strong>postsynaptic neuronal inhibition</strong>. When GABA binds, it opens the Cl⁻ channel, leading to an influx of chloride ions. This causes hyperpolarization, which inhibits neuronal firing.
                    </p>
                  </div>
                  <div>
                    <h4 className="text-lg font-bold text-white flex items-center gap-2 mb-2">
                      <Activity className="text-green-400" /> GABA<sub>B</sub> Receptors
                    </h4>
                    <p className="text-slate-300 text-sm leading-relaxed">
                      <strong>Metabotropic (G-protein linked)</strong> receptors. Provide presynaptic inhibition by inhibiting Ca²⁺ influx and postsynaptic inhibition by increasing K⁺ efflux, both leading to hyperpolarization.
                    </p>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        function AnxBarbituratesView() {
          return (
            <div className="space-y-8 animate-in fade-in duration-500">
              <div className="border-b border-slate-200 pb-4">
                <h2 className="text-3xl font-bold text-slate-800 flex items-center gap-3">
                  <Zap className="text-red-500 text-3xl" />
                  III. Barbiturates: Pharmacology and Risks
                </h2>
                <p className="text-slate-600 mt-2 text-lg">
                  Powerful CNS depressants largely replaced by Benzodiazepines due to high toxicity and lack of safety.
                </p>
              </div>

              <div className="bg-red-50 border-l-4 border-red-500 p-5 rounded-r-xl">
                <h3 className="text-xl font-bold text-red-900 mb-2">Mechanism and Effects</h3>
                <p className="text-slate-800">
                  Barbiturates increase the <strong>duration</strong> of GABA receptor opening, and at high concentrations, possess <strong>direct GABA-mimetic effects</strong>. They also inhibit glutamate receptors (AMPA-R) and can block sodium (Na⁺) channels.
                </p>
              </div>

              <h3 className="text-2xl font-bold text-slate-800 mt-8 mb-4">Clinical Disadvantages</h3>
              <div className="grid md:grid-cols-2 gap-4">
                {[
                  { title: "Narrow Therapeutic Index", desc: "Small margin between a therapeutic dose and a toxic dose." },

        function AntiDepClassificationView() {

              <div className="grid md:grid-cols-2 gap-6">

                  <ul className="space-y-2 text-slate-700">
                    <li>Affects ~17% of the population.</li>
                    <li>Genetically determined biochemical disorder.</li>
                    <li>Characterized by an inability to cope with the normal stresses of life.</li>
                  </ul>
                </div>

                <div className="bg-purple-50 rounded-xl p-6 border border-purple-200">
                  <h3 className="text-xl font-bold text-purple-900 mb-2">Bipolar Disorder</h3>
                  <p className="text-purple-800 text-sm font-semibold mb-3">Manic Depressive Disorder</p>
                  <ul className="space-y-2 text-slate-700">
                    <li>Affects ~2% of the population.</li>
                    <li>Alternating episodes of depression and mania.</li>
                    <li><strong>Manic symptoms:</strong> decreased need for sleep, grandiosity, euphoria, talkativeness, psychomotor agitation, potential psychotic symptoms.</li>
                  </ul>

              </div>

              <div className="bg-slate-100 p-6 rounded-xl border border-slate-200">
                <h3 className="text-lg font-bold text-slate-800 mb-3 flex items-center gap-2">
                  <AlertTriangle className="text-amber-500" /> Key Symptoms of Depression

                <div className="flex flex-wrap gap-2">
                  {["Sadness", "Anhedonia (inability to feel pleasure)", "Fatigue", "Loss of libido", "Sleep disturbances", "Appetite disturbances", "Guilt", "Worthlessness", "Suicidal ideation", "Psychotic symptoms (severe cases)"].map(sym => (
                     <span key={sym} className="bg-white px-3 py-1.5 rounded-full border border-slate-300 text-sm font-medium text-slate-700 shadow-sm">{sym}</span>

              <div>
                <h3 className="text-2xl font-bold text-slate-800 mb-4 border-b pb-2">Biochemical Theories</h3>
                
                <div className="bg-blue-50 border-l-4 border-blue-500 p-5 rounded-r-xl mb-4">
                  <h4 className="text-xl font-bold text-blue-900 mb-2">Monoamine Theory</h4>
                  <p className="text-slate-800">

                <div className="bg-white border border-slate-200 p-5 rounded-xl">
                  <h4 className="font-bold text-slate-800 mb-3">Other Contributing Theories:</h4>
                  <ul className="space-y-3 text-slate-700">
                    <li className="flex items-start gap-2">
                      <CheckCircle className="text-emerald-500 shrink-0 mt-0.5" />
                      <span>Decreased Brain-Derived Neurotrophic Factor (BDNF).</span>
                    </li>
                    <li className="flex items-start gap-2">
                      <CheckCircle className="text-emerald-500 shrink-0 mt-0.5" />
                      <span>Abnormalities in the hypothalamic-pituitary-adrenal (HPA) axis (e.g., elevated cortisol).</span>
                    </li>
                    <li className="flex items-start gap-2">
                      <CheckCircle className="text-emerald-500 shrink-0 mt-0.5" />

            { name: "NDRI (Atypical)", mechanism: "Dopamine (DA) and NE reuptake inhibition.", examples: "Bupropion" },
            { name: "α₂ Blockers (Atypical)", mechanism: "Block presynaptic α₂ receptors to increase NA & 5-HT release.", examples: "Mirtazapine" },
            { name: "MAOIs", mechanism: "Inhibit metabolism of biogenic amines by MAO enzymes.", examples: "Phenelzine, Moclobemide (RIMA)" },

              </div>

              <div className="bg-slate-800 text-white rounded-xl p-6 shadow-md">

                  <div className="bg-slate-700/50 p-4 rounded-lg border border-slate-600">
                    <h4 className="text-lg font-bold text-blue-400 mb-2">2. Delayed</h4>

                    <h4 className="text-lg font-bold text-emerald-400 mb-2">3. Long-term</h4>
                    <div className="text-xs text-slate-400 mb-2 uppercase tracking-wide">Maintenance</div>

                  </div>
                </div>
              </div>

              <div>
                <h3 className="text-xl font-bold text-slate-800 mb-4">Major Drug Classes</h3>
                <div className="overflow-x-auto shadow-sm rounded-lg border border-slate-200">
                  <table className="w-full text-left bg-white">
                    <thead className="bg-slate-50">
                      <tr>
                        <th className="p-4 font-bold text-slate-700 border-b w-1/4">Class</th>

                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>

        }

        function AntiDepClinicalView() {
          return (
            <div className="space-y-8 animate-in fade-in duration-500">
              <div className="border-b border-slate-200 pb-4">
                <h2 className="text-3xl font-bold text-slate-800 flex items-center gap-3">

                    <HeartPulse /> TCAs (Tricyclics)

                  <ul className="space-y-2 text-slate-700 text-sm">
                    <li>Notable for autonomic blockade:
                      <ul className="list-disc list-inside ml-4 mt-1 space-y-1 text-rose-800">

                <div className="bg-amber-50 rounded-xl p-5 border border-amber-200">

                  </h3>
                  <ul className="space-y-2 text-slate-700 text-sm">

                <div className="bg-purple-50 rounded-xl p-5 border border-purple-200">
                  <h3 className="text-lg font-bold text-purple-900 mb-3 flex items-center gap-2">

                  </h3>
                  <ul className="space-y-2 text-slate-700 text-sm">
                    <li><strong>Bupropion:</strong> Used for smoking cessation. Lacks sexual side effects, but increases seizure risk.</li>

                </div>
                <div className="mt-4 bg-white p-3 rounded border border-slate-300 text-sm text-slate-700 font-medium flex flex-wrap gap-4">
                  <span className="flex items-center gap-1"><Clock className="text-blue-500" /> Effect is delayed 2-4 weeks.</span>
                  <span className="flex items-center gap-1"><CheckCircle className="text-emerald-500" /> Continue 6 months post-remission.</span>
                  <span className="flex items-center gap-1"><AlertTriangle className="text-amber-500" /> Withdraw gradually (over 4 weeks).</span>
                </div>
              </div>
            </div>
          );
        }

        function AntiDepTrapsView() {
          const traps = [
            {
              title: "The 4-Week Efficacy Paradox",
              context: "Biochemical effect (blocking reuptake) happens in hours, but clinical effect (mood elevation) takes 2-4 weeks.",
              pathway: "↑ Synaptic amines → gradual down-regulation of β and 5-HT₂ receptors → ↑ Brain Derived Neurotrophic Factor (BDNF) → clinical improvement.",
              trap: "If a scenario features a patient complaining the drug 'isn't working' after 1 week, the correct action is to wait and continue therapy, not increase the dose or switch drugs.",
              color: "emerald"
            },
            {
              title: "TCA Toxicity: The '3 Receptor' Rule",
              context: "TCAs non-selectively block 3 distinct autonomic targets: M (Muscarinic) Blockade (Dry mouth, blurred vision, tachycardia, urine retention), H₁ (Histamine) Blockade (Severe sedation and massive weight gain), and α₁ (Adrenergic) Blockade (Postural hypotension and reflex tachycardia).",
              trap: "The actual cause of death in TCA overdose is blockade of cardiac sodium channels → prolonged QT interval and fatal arrhythmias.",
              color: "rose"
            },
            {
              title: "Bupropion vs. SSRIs: Sexual Function",
              context: "SSRIs cause high rates of sexual dysfunction due to excess serotonin. Bupropion is an NDRI (acts solely on Dopamine and Norepinephrine, completely ignoring serotonin).",
              trap: "Bupropion is the perfect switch for a patient with SSRI-induced sexual dysfunction, but carries an absolute contraindication for patients with a seizure history (↑ convulsion risk).",
              color: "blue"
            },
            {
              title: "Mirtazapine's Paradoxical Profile",
              context: "Blocks presynaptic α₂ receptors → removes negative feedback 'brakes' → massive NE and 5-HT release. Blocks 5-HT₃ receptors → potent antiemetic.",
              trap: "Because it heavily blocks H₁ receptors, it causes intense sedation and weight gain. Ideal for depressed patients with insomnia and severe weight loss, but contraindicated for obese/lethargic patients.",
              color: "purple"
            },
            {
              title: "The Cheese Reaction Mechanism",
              context: "Non-selective MAOIs (Tranylcypromine) irreversibly destroy gut MAO. Tyramine (from aged cheese/wine) survives the gut → enters circulation → displaces massive amounts of NE from nerve terminals.",
              trap: "Moclobemide (RIMA) avoids this. It is a reversible inhibitor, meaning dietary tyramine safely outcompetes the drug, allowing gut MAO to break the tyramine down.",
              color: "amber"
            },
            {
              title: "The Serotonin Syndrome Combination",
              context: "Combining an MAOI with 5-HT elevating drugs (SSRIs, TCAs, or even Tramadol/Pethidine) leads to toxic serotonin accumulation. Symptoms: Tachycardia, hyperthermia, muscle rigidity, convulsions, coma.",
              trap: "You MUST enforce a 'Washout Period' of at least 2 weeks between stopping an MAOI and starting an SSRI. If the patient was on Fluoxetine, the washout must be 5 weeks due to its extremely long half-life.",
              color: "red"
            }
          ];

          return (
            <div className="space-y-8 animate-in fade-in duration-500">
              <div className="border-b border-slate-200 pb-4">
                <h2 className="text-3xl font-bold text-slate-800 flex items-center gap-3">
                  <AlertTriangle className="text-amber-500 text-3xl" />
                  Quick Exam Revision: The Trickiest Parts
                </h2>
                <p className="text-slate-600 mt-2 text-lg">
                  High-yield paradoxes, clinical traps, and highly-tested nuances.
                </p>
              </div>

              <div className="grid md:grid-cols-2 gap-6">
                {traps.map((item, idx) => (
                  <div key={idx} className={`bg-white rounded-xl overflow-hidden border border-slate-200 shadow-sm flex flex-col`}>
                    <div className={`bg-${item.color}-50 border-b border-${item.color}-100 p-4`}>
                      <h3 className={`text-xl font-bold text-${item.color}-900`}>{item.title}</h3>
                    </div>
                    <div className="p-4 flex-1 flex flex-col gap-3">
                      <p className="text-slate-700 text-sm leading-relaxed">{item.context}</p>
                      {item.pathway && (
                        <div className="bg-slate-50 p-2 rounded text-xs text-slate-600 border border-slate-200 font-mono">
                          {item.pathway}
                        </div>
                      )}
                      <div className="mt-auto pt-3">
                        <div className={`bg-${item.color}-100/50 border-l-4 border-${item.color}-500 p-3 rounded-r`}>
                          <strong className={`text-${item.color}-800 block text-sm uppercase tracking-wider mb-1 flex items-center gap-1`}>
                            <Zap className="text-xs" /> Exam Trap
                          </strong>
                          <p className={`text-${item.color}-900 text-sm font-medium`}>{item.trap}</p>
                        </div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>

              <div className="bg-slate-800 text-white p-6 rounded-xl shadow-md">
                <h3 className="text-xl font-bold mb-4 border-b border-slate-600 pb-2 text-emerald-300">Non-Psychiatric Uses of Antidepressants</h3>
                <p className="text-slate-300 mb-4 text-sm italic">The exam loves to test these drugs outside of major depressive disorder.</p>
                <div className="grid md:grid-cols-2 gap-4">
                  <div className="bg-slate-700/50 p-4 rounded-lg border border-slate-600">
                    <h4 className="font-bold text-blue-400 mb-1">Nocturnal Enuresis (bedwetting)</h4>
                    <p className="text-slate-200 text-sm"><strong className="text-white">Imipramine:</strong> Its anticholinergic effect violently contracts the internal urethral sphincter.</p>
                  </div>
                  <div className="bg-slate-700/50 p-4 rounded-lg border border-slate-600">
                    <h4 className="font-bold text-purple-400 mb-1">Neuropathic Pain & Migraines</h4>
                    <p className="text-slate-200 text-sm"><strong className="text-white">Amitriptyline:</strong> Often used at doses lower than those needed for depression.</p>
                  </div>
                  <div className="bg-slate-700/50 p-4 rounded-lg border border-slate-600">
                    <h4 className="font-bold text-orange-400 mb-1">Smoking Cessation</h4>
                    <p className="text-slate-200 text-sm"><strong className="text-white">Bupropion:</strong> ↑ dopamine in the reward pathway significantly reduces cravings.</p>

                    <h4 className="font-bold text-teal-400 mb-1">SNRI Specifics</h4>
                    <ul className="text-slate-200 text-sm space-y-1">
                      <li><strong className="text-white">Duloxetine:</strong> Stress Urinary Incontinence (SUI) & neuropathic pain.</li>
                      <li><strong className="text-white">Venlafaxine:</strong> Uniquely causes dose-dependent hypertension.</li>
                    </ul>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        function AntiDepRapidFireView() {
          const generalRules = [

        function EpilepsyMechanismsView() {
          return (
            <div className="space-y-8 animate-in fade-in duration-500">

                  2. Antiepileptic Drugs (AEDs): Mechanisms
                </h2>

                </p>
              </div>

              <div className="grid md:grid-cols-2 gap-6">
                
                {/* Na+ Channels */}
                <div className="bg-white border border-slate-200 p-5 rounded-xl shadow-sm hover:border-blue-300 transition-colors">

                  </div>
                  <p className="text-sm text-slate-600 mb-3 italic">Inhibits repetitive firing of neurons.</p>
                  <p className="text-sm font-medium text-slate-800">
                    <strong className="text-blue-700">Drugs:</strong> <span className="bg-yellow-100 px-1 rounded font-bold">Phenytoin</span>, <span className="bg-yellow-100 px-1 rounded font-bold">Carbamazepine</span>, <span className="bg-yellow-100 px-1 rounded font-bold">Valproate</span>, Topiramate, <span className="bg-yellow-100 px-1 rounded font-bold">Lamotrigine</span>, Lacosamide, Zonisamide, Rufinamide.

                </div>

                  <p className="text-sm font-medium text-slate-800 mb-2">

                  </p>
                  <div className="bg-rose-50 border border-rose-200 p-2 rounded text-xs text-rose-800 font-semibold">

                </div>

                  <p className="text-sm font-medium text-slate-800">
                    <strong className="text-orange-700">Drugs:</strong> <span className="bg-yellow-100 px-1 rounded font-bold">Lamotrigine</span>, Gabapentin, Pregabalin.
                  </p>
                </div>

                {/* SV2A & NMDA */}
                <div className="bg-white border border-slate-200 p-5 rounded-xl shadow-sm hover:border-purple-300 transition-colors flex flex-col gap-4">

                  </div>
                </div>

              </div>

              {/* GABA Module */}
              <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-6 shadow-sm">
                <h3 className="text-xl font-bold text-emerald-900 mb-4 flex items-center gap-2 border-b border-emerald-200 pb-2">

                      <li><strong className="bg-yellow-100 px-1 rounded">Valproate:</strong> Increases turnover.</li>
                      <li><strong>Tiagabin:</strong> Inhibits uptake.</li>
                      <li><strong>Vigabatrin:</strong> Inhibits degradation via transaminase.</li>
                    </ul>
                  </div>
                </div>
              </div>

            </div>
          );

                    <div key={idx} className="bg-white border border-slate-200 p-4 rounded-lg shadow-sm hover:shadow-md transition-shadow hover:border-purple-300">
                      <strong className="text-purple-800 block mb-1 text-lg">{item.hook}</strong>
                      <p className="text-slate-600 text-sm">{item.details}</p>
                    </div>
                  ))}
                </div>
              </div>

              <div className="grid md:grid-cols-2 gap-8 pt-4 border-t border-slate-200">
                
                {/* Valproate Mnemonic */}
                <div className="bg-rose-50 rounded-xl p-6 border border-rose-200 shadow-sm">
                  <h3 className="text-xl font-bold text-rose-900 mb-4 flex items-center gap-2">
                    <Brain /> Valproate: "The V-Heavy"
                  </h3>
                  <div className="bg-white p-4 rounded-lg shadow-sm border-l-4 border-rose-500 space-y-2">
                    <div className="flex items-start gap-2 text-sm text-slate-700">
                      <strong className="text-rose-700 text-lg leading-none">V</strong>
                      <span className="mt-0.5">omit (GIT upset)</span>
                    </div>
                    <div className="flex items-start gap-2 text-sm text-slate-700">
                      <strong className="text-rose-700 text-lg leading-none">V</strong>
                      <span className="mt-0.5">ery fat (Weight gain/appetite increase)</span>
                    </div>
                    <div className="flex items-start gap-2 text-sm text-slate-700">
                      <strong className="text-rose-700 text-lg leading-none">V</strong>
                      <span className="mt-0.5">alopecia (Hair loss)</span>
                    </div>
                    <div className="flex items-start gap-2 text-sm text-slate-700">
                      <strong className="text-rose-700 text-lg leading-none">V</strong>
                      <span className="mt-0.5">ery dangerous for liver (Hepatotoxicity)</span>
                    </div>
                    <div className="flex items-start gap-2 text-sm text-slate-700">
                      <strong className="text-rose-700 text-lg leading-none">V</strong>
                      <span className="mt-0.5">ertebrae defects (Spina bifida)</span>
                    </div>
                  </div>
                </div>

                {/* Phenytoin Mnemonic */}
                <div className="bg-blue-50 rounded-xl p-6 border border-blue-200 shadow-sm">
                  <h3 className="text-xl font-bold text-blue-900 mb-4 flex items-center gap-2">
                    <Brain /> Phenytoin's "4H" Cosmetic Hook
                  </h3>
                  <div className="bg-white p-4 rounded-lg shadow-sm border-l-4 border-blue-500 space-y-2">
                    <div className="flex items-start gap-2 text-sm text-slate-700">
                      <strong className="text-blue-700 text-lg leading-none">H</strong>
                      <span className="mt-0.5">yperplasia (Gingival)</span>
                    </div>
                    <div className="flex items-start gap-2 text-sm text-slate-700">
                      <strong className="text-blue-700 text-lg leading-none">H</strong>
                      <span className="mt-0.5">irsutism (Excess hair)</span>
                    </div>
                    <div className="flex items-start gap-2 text-sm text-slate-700">
                      <strong className="text-blue-700 text-lg leading-none">H</strong>
                      <span className="mt-0.5">ardened face (Coarse features)</span>
                    </div>
                    <div className="flex items-start gap-2 text-sm text-slate-700">
                      <strong className="text-blue-700 text-lg leading-none">H</strong>
                      <span className="mt-0.5">ole in the palate (Teratogenicity)</span>
                    </div>
                  </div>
                </div>

              </div>

              {/* Key Terms */}
              <div>
                <h3 className="text-2xl font-bold text-slate-800 mb-4 bg-slate-100 p-2 rounded-md inline-block">Key Terms Definitions</h3>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  {terms.map((t, idx) => (
                    <div key={idx} className="border border-slate-200 p-4 rounded-lg bg-white hover:border-purple-300 transition-colors">
                      <h4 className="font-bold text-purple-800 mb-1">{t.term}</h4>
                      <p className="text-slate-600 text-sm">{t.def}</p>
                    </div>
                  ))}
                </div>
              </div>

            </div>
          );
        }

        // --- Render the Application ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
