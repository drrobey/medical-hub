                                  {[
                                    { arch: '1st Arch', def: 'CN V (Mastication).' },
                                    { arch: '2nd Arch', def: 'CN VII (Facial expression).' },
                                    { arch: '3rd Arch', def: 'CN IX (Stylopharyngeus).' },
                                    { arch: '4th & 6th Arches', def: 'CN X (Palate, Pharynx, Larynx).' }
                                  ].map((item, idx) => (
                                    <div key={idx} className="border border-slate-200 p-3 rounded-lg bg-white flex items-center gap-4">
                                      <span className="font-bold text-red-800 whitespace-nowrap">{item.arch}</span>
                                      <span className="text-slate-600 text-sm">{item.def}</span>
                                    </div>
                                  ))}
                                </div>
                              </div>
                            </div>

                            <div>
                              <h3 className="text-xl font-bold text-slate-800 mb-4 bg-slate-100 p-2 rounded-md inline-flex items-center gap-2">
                                <i className="fa-solid fa-list text-slate-600"></i> Key Entities
                              </h3>
                              <div className="flex flex-col gap-3">
                                {[
                                  { term: 'Facial Colliculus', def: 'An elevation in the floor of the 4th ventricle formed by CN VII fibers looping around the CN VI nucleus.' },
                                  { term: 'Hypoglossal Trigone', def: 'The area in the floor of the 4th ventricle overlying the hypoglossal nucleus.' },
                                  { term: 'Edinger Westphal Nucleus', def: 'The "Golden Buzzword" for parasympathetic control of the pupil and lens.' },
                                  { term: 'Nucleus Ambiguus', def: 'The "Golden Buzzword" for swallowing and vocalization (muscles of the palate, pharynx, larynx).' }
                                ].map((item, idx) => (
                                  <div key={idx} className="border border-slate-200 p-3 rounded-lg bg-white hover:border-red-300 transition-colors">
                                    <h4 className="font-bold text-red-800 mb-1">{item.term}</h4>
                                    <p className="text-slate-600 text-sm">{item.def}</p>
                                  </div>
                                ))}
                              </div>
                            </div>

                          </div>
                        </>
                      )}

                      {topic === 'the_scalp' && (
                        <>
                          <div>
                            <h3 className="text-xl font-bold text-slate-800 mb-4 bg-slate-100 p-2 rounded-md inline-flex items-center gap-2">
                              <i className="fa-solid fa-bolt text-red-600"></i> Golden Buzzwords
                            </h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                              {[
                                { term: '"Dangerous Layer"', def: 'Loose areolar tissue (Layer 4) — allows spread of blood/pus to cranial cavity via emissary veins.' },
                                { term: '"Valveless Veins"', def: 'Emissary veins — can spread infection in either direction between scalp and dural sinuses.' },
                                { term: '"Helmet-like"', def: 'Epicranial Aponeurosis (Galea Aponeurotica) — covers the skull vault.' },
                                { term: '"Bone-shaped hematoma"', def: 'Bleeding beneath the pericranium — limited by sutural ligaments, mirrors the skull bone shape.' },
                                { term: '"Profuse bleeding"', def: 'Dense connective tissue septa hold vessels open, preventing retraction when cut.' },
                                { term: '"Supra-orbital margin"', def: 'The anterior boundary of the scalp at eyebrow level.' },
                              ].map((item, idx) => (
                                <div key={idx} className="bg-white border border-slate-200 p-4 rounded-lg shadow-sm hover:border-red-300 hover:shadow-md transition-all">
                                  <strong className="text-red-800 block mb-1 text-lg">{item.term}</strong>
                                  <p className="text-slate-600 text-sm">{item.def}</p>
                                </div>
                              ))}
                            </div>
                          </div>

                          <div className="grid md:grid-cols-2 gap-8 pt-4 border-t border-slate-200">
                            <div className="bg-red-50 rounded-xl p-6 border border-red-200 shadow-sm">
                              <h3 className="text-xl font-bold text-red-900 mb-4 flex items-center gap-2">
                                <i className="fa-solid fa-brain"></i> The SCALP Mnemonic
                              </h3>
                              <div className="space-y-2">
                                {[
                                  { l: "S", t: "Skin" },
                                  { l: "C", t: "Connective Tissue (Dense)" },
                                  { l: "A", t: "Aponeurosis (Galea)" },
                                  { l: "L", t: "Loose Areolar Tissue ← DANGEROUS" },
                                  { l: "P", t: "Pericranium" },
                                ].map((row, i) => (
                                  <div key={i} className="bg-white p-3 rounded shadow-sm border-l-4 border-red-500 flex items-center gap-3">
                                    <strong className="text-red-700 text-xl w-6">{row.l}</strong>
                                    <span className="text-slate-700 text-sm">{row.t}</span>
                                  </div>
                                ))}
                              </div>
                            </div>

                            <div>
                              <h3 className="text-xl font-bold text-slate-800 mb-4 bg-slate-100 p-2 rounded-md inline-flex items-center gap-2">
                                <i className="fa-solid fa-list text-slate-600"></i> Key Terms and Hooks
                              </h3>
                              <div className="flex flex-col gap-3">
                                {[
                                  { term: "Adherent Layers", def: "First 3 layers (S, C, A) are bound together and move as a single unit." },
                                  { term: "Septa", def: "Fibrous partitions in dense connective tissue that hold arteries open → profuse bleeding." },
                                  { term: "Highest Nuchal Line", def: "Posterior bony attachment for occipital bellies and pericranium." },
                                  { term: "Vertex", def: "Highest point of the scalp — landmark for nerve and arterial distribution." },
                                  { term: "Sebaceous Cysts", def: "Common in scalp due to high density of sebaceous glands in the skin layer." },
                                  { term: "Parotid Nodes", def: "Drain the pre-auricular (anterior) region of the scalp." },
                                  { term: "Mastoid/Occipital Nodes", def: "Drain the post-auricular (posterior) region of the scalp." },
                                ].map((item, idx) => (
                                  <div key={idx} className="border border-slate-200 p-3 rounded-lg bg-white hover:border-red-300 transition-colors">
                                    <h4 className="font-bold text-red-800 mb-1">{item.term}</h4>
                                    <p className="text-slate-600 text-sm">{item.def}</p>
                                  </div>
                                ))}
                              </div>
                            </div>
                          </div>
                        </>
                      )}

                      {topic === 'the_face' && (
                        <>
                          <div>
                            <h3 className="text-xl font-bold text-slate-800 mb-4 bg-slate-100 p-2 rounded-md inline-flex items-center gap-2">
                              <i className="fa-solid fa-bolt text-red-600"></i> Golden Buzzwords
                            </h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                              {[
                                { term: '"2nd pharyngeal arch"', def: 'The universal developmental origin for all facial muscles.' },
                                { term: '"Tortuous artery"', def: 'The hallmark of the facial artery, adapted for mandibular movement.' },
                                { term: '"8 segments"', def: 'The specific quantitative structural composition of the orbicularis oris.' },
                                { term: '"3 emissary veins"', def: 'The specific connection between the pterygoid plexus and cavernous sinus.' },
                              ].map((item, idx) => (
                                <div key={idx} className="bg-white border border-slate-200 p-4 rounded-lg shadow-sm hover:border-red-300 hover:shadow-md transition-all">
                                  <strong className="text-red-800 block mb-1 text-lg">{item.term}</strong>
                                  <p className="text-slate-600 text-sm">{item.def}</p>
                                </div>
                              ))}
                            </div>
                          </div>

                          <div className="grid md:grid-cols-2 gap-8 pt-4 border-t border-slate-200">
                            <div className="bg-red-50 rounded-xl p-6 border border-red-200 shadow-sm space-y-6">
                              
                              <div>
                                <h3 className="text-xl font-bold text-red-900 mb-3 flex items-center gap-2">
                                  <i className="fa-solid fa-brain"></i> Facial N. Branches Mnemonic
                                </h3>
                                <p className="text-slate-700 font-bold mb-3 italic">"Ten Zebras Bit My Cat"</p>
                                <div className="space-y-2">
                                  {[
                                    { l: "Ten", t: "Temporal" },
                                    { l: "Zebras", t: "Zygomatic" },
                                    { l: "Bit", t: "Buccal" },
                                    { l: "My", t: "Mandibular" },
                                    { l: "Cat", t: "Cervical" },
                                  ].map((row, i) => (
                                    <div key={i} className="bg-white p-2 rounded shadow-sm border-l-4 border-red-500 flex items-center gap-3">
                                      <strong className="text-red-700 w-12 text-right text-sm">{row.l}</strong>
                                      <span className="text-slate-700 text-sm font-semibold">{row.t}</span>
                                    </div>
                                  ))}
                                </div>
                              </div>

                              <div>
                                <h3 className="text-xl font-bold text-red-900 mb-2 flex items-center gap-2">
                                  <i className="fa-solid fa-eye"></i> Orbicularis Oculi Functions
                                </h3>
                                <ul className="text-slate-700 text-sm bg-white p-4 rounded shadow-sm border border-red-100 space-y-2">
                                  <li><strong>Palpebral</strong> = Peeping/Blinking (Gentle)</li>
                                  <li><strong>Orbital</strong> = Ouch! (Tight closure for protection)</li>
                                </ul>
                              </div>

                              <div>
                                <h3 className="text-xl font-bold text-red-900 mb-2 flex items-center gap-2">
                                  <i className="fa-solid fa-shield-halved"></i> The Sensory "Exceptions"
                                </h3>
                                <p className="text-slate-700 text-sm bg-white p-4 rounded shadow-sm border border-red-100">
                                  <strong>Great Auricular = Gives Angle:</strong> While the Trigeminal nerve (V) dominates the face, the Great Auricular (C2,3) "guards the angle." It is the only sensory nerve supplying the angle of the mandible, unlike the rest of the face supplied by CN V.
                                </p>
                              </div>

                            </div>

                            <div>
                              <h3 className="text-xl font-bold text-slate-800 mb-4 bg-slate-100 p-2 rounded-md inline-flex items-center gap-2">
                                <i className="fa-solid fa-book-medical text-slate-600"></i> Medical Glossary
                              </h3>
                              <div className="flex flex-col gap-3">
                                {[
                                  { term: "Angular artery", def: "The terminal part of the facial artery at the medial angle of the eye." },
                                  { term: "Buccopharyngeal fascia", def: "The deep fascia covering the buccinator muscle and the pharynx." },
                                  { term: "Pes Anserinus", def: "The \"goose’s foot\" branching pattern of the facial nerve within the parotid gland." },
                                  { term: "Pterygomandibular raphe", def: "A fibrous band connecting the pterygoid hamulus to the mylohyoid line of the mandible; serves as an origin for the buccinator." },
                                  { term: "Cavernous Sinus Thrombosis", def: "A dangerous potential complication of facial infections spreading through venous pathways." }
                                ].map((item, idx) => (
                                  <div key={idx} className="border border-slate-200 p-3 rounded-lg bg-white hover:border-red-300 transition-colors">
                                    <h4 className="font-bold text-red-800 mb-1">{item.term}</h4>
                                    <p className="text-slate-600 text-sm">{item.def}</p>
                                  </div>
                                ))}
                              </div>
                            </div>
                          </div>
                        </>
                      )}

                      {topic === 'cranial_cavity' && (
                        <>
                          {/* Cranial Cavity Glossary */}
                          <div>
                            <h3 className="text-xl font-bold text-slate-800 mb-4 bg-slate-100 p-2 rounded-md inline-flex items-center gap-2">
                              <i className="fa-solid fa-bolt text-red-600"></i> Golden Buzzwords
                            </h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                              {[
                                { term: '"Sickle-shaped"', def: 'Think Falx cerebri or Falx cerebelli.' },
                                { term: '"Tent-shaped"', def: 'Think Tentorium cerebelli.' },
                                { term: '"Dangerous area of the face"', def: 'Link to Cavernous Sinus Thrombosis.' },
                                { term: '"Pulsating exophthalmos"', def: 'Link to Carotid-Cavernous Fistula.' },
                                { term: '"RBCs in CSF"', def: 'Think Subdural Hemorrhage.' }
                              ].map((item, idx) => (
                                <div key={idx} className="bg-white border border-slate-200 p-4 rounded-lg shadow-sm hover:border-red-300 hover:shadow-md transition-all">
                                  <strong className="text-red-800 block mb-1 text-lg">{item.term}</strong>
                                  <p className="text-slate-600 text-sm">{item.def}</p>
                                </div>
                              ))}
                            </div>
                          </div>

                          <div className="grid md:grid-cols-2 gap-8 pt-4 border-t border-slate-200">
                            
                            <div className="space-y-8">
                              <div className="bg-red-50 rounded-xl p-6 border border-red-200 shadow-sm">
                                <h3 className="text-xl font-bold text-red-900 mb-4 flex items-center gap-2">
                                  <i className="fa-solid fa-brain"></i> Mnemonics for Exits
                                </h3>
                                <div className="space-y-4">
                                  {[
                                    { title: 'Superior Orbital Fissure', desc: 'Live Free To See Naked Antelopes (Lacrimal, Frontal, Trochlear, Sup. Ophthalmic Vein, Nasociliary, Abducent). Clinical basic: III, IV, V1, VI.' },
                                    { title: 'Trigeminal Exits (Standing Room Only)', desc: 'V1 = Superior Orbital Fissure, V2 = Foramen Rotundum, V3 = Foramen Ovale.' }
                                  ].map((item, idx) => (
                                    <div key={idx} className="bg-white p-4 rounded-lg shadow-sm border-l-4 border-red-500">
                                      <div className="font-bold text-red-900 text-lg mb-1">{item.title}</div>
                                      <p className="text-slate-700 text-sm">{item.desc}</p>
                                    </div>
                                  ))}
                                </div>
                              </div>
                            </div>

                            <div>
                              <h3 className="text-xl font-bold text-slate-800 mb-4 bg-slate-100 p-2 rounded-md inline-flex items-center gap-2">
                                <i className="fa-solid fa-list text-slate-600"></i> Key Terms and "Hooks"
                              </h3>
                              <div className="flex flex-col gap-3">
                                {[
                                  { term: 'Endosteum', def: 'The role played by the outer layer of the dura mater in relation to the skull bones.' },
                                  { term: 'Reduplicate', def: 'The action of the inner dural layer folding back on itself to create septa.' },
                                  { term: 'Valveless', def: 'A key characteristic of both dural sinuses and emissary veins, allowing two-way blood flow.' },
                                  { term: 'Pterion', def: 'The H-shaped junction of bones; the "weak spot" of the skull covering the middle meningeal artery.' },
                                  { term: 'Lucid Interval', def: 'Often associated with extradural hematomas (implied by the clinical course of arterial bleeding).' },
                                  { term: 'Infundibulum', def: 'The stalk connecting the pituitary gland to the brain, passing through the diaphragma sellae.' }
                                ].map((item, idx) => (
                                  <div key={idx} className="border border-slate-200 p-3 rounded-lg bg-white hover:border-red-300 transition-colors">
                                    <h4 className="font-bold text-red-800 mb-1">{item.term}</h4>
                                    <p className="text-slate-600 text-sm">{item.def}</p>
                                  </div>
                                ))}
                              </div>
                            </div>

                          </div>
                        </>
                      )}

                    </div>
                  )}

                </div>
              </main>
            </div>
          );
        }

        // --- Scalp & Face Sub-Dashboard ---
        function ScalpFaceDashboard({ onSelectTopic, onBack }) {
          return (
            <div className="min-h-screen bg-slate-100 font-sans text-slate-800 p-6 md:p-12">
              <div className="max-w-6xl mx-auto space-y-8 animate-in">

                <button onClick={onBack} className="group flex items-center gap-2 text-slate-500 hover:text-red-600 font-bold transition-all">
                  <i className="fa-solid fa-arrow-left group-hover:-translate-x-1 transition-transform"></i>
                  <span className="text-sm uppercase tracking-wider">Back to Dashboard</span>
                </button>

                <header className="flex items-center justify-between pb-6 border-b border-slate-200">
                  <div className="flex items-center gap-4">
                    <div className="bg-red-600 p-3 rounded-xl shadow-lg w-12 h-12 flex items-center justify-center text-white text-xl">
                      <i className="fa-solid fa-face-smile"></i>
                    </div>
                    <div>
                      <h1 className="text-3xl md:text-4xl font-bold text-slate-900 tracking-tight">Scalp &amp; Face</h1>
                      <p className="text-slate-500 font-medium mt-1">Select a topic to begin your review</p>
                    </div>
                  </div>
                </header>

                <main>
                  <h2 className="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                    <i className="fa-solid fa-book-open text-red-600"></i>
                    Topics in this Module
                  </h2>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-2xl">

                    <div onClick={() => onSelectTopic('the_scalp')}
                      className="relative overflow-hidden rounded-2xl border-2 p-6 transition-all duration-300 ease-out flex flex-col h-full transform cursor-pointer hover:shadow-2xl hover:-translate-y-2 hover:scale-[1.02] hover:border-red-500 group bg-red-50 border-red-200">
                      <div className="bg-white w-16 h-16 rounded-2xl shadow-sm flex items-center justify-center mb-6 shrink-0 transition-transform duration-300 group-hover:scale-110 group-hover:rotate-3">
                        <i className="fa-solid fa-head-side text-2xl text-red-500"></i>
                      </div>
                      <h3 className="text-xl font-bold mb-2 text-slate-900">The Scalp</h3>
                      <p className="text-slate-600 mb-8 line-clamp-2 flex-1">Five layers (SCALP mnemonic), vascularization, innervation, the dangerous layer, and clinical anatomy.</p>
                      <button className="w-full py-3 px-4 bg-white/50 hover:bg-white text-slate-800 border border-slate-300 font-semibold rounded-xl transition-all duration-200 transform hover:scale-105 active:scale-95 flex items-center justify-center gap-2 mt-auto shadow-sm">Open Review</button>
                    </div>

                    <div onClick={() => onSelectTopic('the_face')}
                      className="relative overflow-hidden rounded-2xl border-2 p-6 transition-all duration-300 ease-out flex flex-col h-full transform cursor-pointer hover:shadow-2xl hover:-translate-y-2 hover:scale-[1.02] hover:border-red-500 group bg-red-50 border-red-200">
                      <div className="bg-white w-16 h-16 rounded-2xl shadow-sm flex items-center justify-center mb-6 shrink-0 transition-transform duration-300 group-hover:scale-110 group-hover:rotate-3">
                        <i className="fa-solid fa-face-grin text-2xl text-red-500"></i>
                      </div>
                      <h3 className="text-xl font-bold mb-2 text-slate-900">The Face</h3>
                      <p className="text-slate-600 mb-8 line-clamp-2 flex-1">Muscles of facial expression, sensory and motor nerve supply, arterial supply, and lymphatic drainage.</p>
                      <button className="w-full py-3 px-4 bg-white/50 hover:bg-white text-slate-800 border border-slate-300 font-semibold rounded-xl transition-all duration-200 transform hover:scale-105 active:scale-95 flex items-center justify-center gap-2 mt-auto shadow-sm">Open Review</button>
                    </div>

                  </div>
                </main>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
