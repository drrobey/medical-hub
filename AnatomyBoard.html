<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroAnatomy Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Custom Page Transition Animations */
        @keyframes slideInRight {
            0% { transform: translateX(60px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideInLeft {
            0% { transform: translateX(-60px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }
        .slide-forward { animation: slideInRight 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .slide-backward { animation: slideInLeft 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* Tab Content & Section Enter Animation */
        @keyframes fadeSlideUp {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="bg-slate-50 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Main App Component ---
        function App() {
          const [currentView, setCurrentView] = useState('dashboard');
          const [direction, setDirection] = useState('forward');

          const navigateTo = (view) => {
            setDirection(view === 'dashboard' ? 'backward' : 'forward');
            setCurrentView(view);
          };

          // Routes back to the CNS Module in the Master Portal
          const backToPortal = () => {
              window.location.href = 'index.html#cns';
          };

          return (
            <>
              <div key={currentView} className={direction === 'forward' ? 'slide-forward' : 'slide-backward'}>
                {currentView === 'dashboard' ? (
                  <Dashboard onSelectGuide={() => navigateTo('module1')} onBackToPortal={backToPortal} />
                ) : (
                  <AnatomyTopicGuide onBack={() => navigateTo('dashboard')} />
                )}
              </div>
              
              <div className="fixed bottom-2 right-3 text-right text-[10px] md:text-xs text-slate-400/50 font-medium pointer-events-none z-50 select-none">
                <div>Dr.Zeyad Robey</div>
                <div>Ain Shams University</div>
              </div>
            </>
          );
        }

        // --- Dashboard Component ---
        function Dashboard({ onSelectGuide, onBackToPortal }) {
          return (
            <div className="min-h-screen bg-slate-100 font-sans text-slate-800 p-6 md:p-12">
              <div className="max-w-6xl mx-auto space-y-8 animate-in">
                
                <button 
                  onClick={onBackToPortal}
                  className="group flex items-center gap-2 text-slate-500 hover:text-red-600 font-bold transition-all"
                >
                  <i className="fa-solid fa-house group-hover:-translate-y-1 transition-transform"></i> 
                  <span className="text-sm uppercase tracking-wider">Back to CNS Module</span>
                </button>

                <header className="flex items-center justify-between pb-6 border-b border-slate-200">
                  <div className="flex items-center gap-4">
                    <div className="bg-red-600 p-3 rounded-xl shadow-lg w-12 h-12 flex items-center justify-center text-white text-xl">
                      <i className="fa-solid fa-book-bookmark"></i>
                    </div>
                    <div>
                      <h1 className="text-3xl md:text-4xl font-bold text-slate-900 tracking-tight">NeuroAnatomy Hub</h1>
                      <p className="text-slate-500 font-medium mt-1">Anatomy Subject Dashboard</p>
                    </div>
                  </div>
                </header>

                <main>
                  <h2 className="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                    <i className="fa-solid fa-book-open text-red-600"></i>
                    Available Study Modules
                  </h2>
                  
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {/* Placeholder Module Card */}
                    <div 
                      onClick={onSelectGuide}
                      className="relative overflow-hidden rounded-2xl border-2 p-6 transition-all duration-300 ease-out flex flex-col h-full transform cursor-pointer hover:shadow-2xl hover:-translate-y-2 hover:scale-[1.02] hover:border-red-500 group bg-red-50 border-red-200"
                    >
                      <div className="bg-white w-16 h-16 rounded-2xl shadow-sm flex items-center justify-center mb-6 shrink-0 transition-transform duration-300 group-hover:scale-110 group-hover:rotate-3">
                        <i className="fa-solid fa-brain text-2xl text-red-500"></i>
                      </div>
                      <h3 className="text-xl font-bold mb-2 text-slate-900">Cerebellum</h3>
                      <p className="text-slate-600 mb-8 line-clamp-2 flex-1">
                        Anatomical location, functional divisions, cerebellar peduncles, and vascularization.
                      </p>
                      <button className="w-full py-3 px-4 bg-white/50 hover:bg-white text-slate-800 border border-slate-300 font-semibold rounded-xl transition-all duration-200 transform hover:scale-105 active:scale-95 flex items-center justify-center gap-2 mt-auto shadow-sm">
                         Open Review
                      </button>
                    </div>
                  </div>
                </main>
              </div>
            </div>
          );
        }

        // --- Study Guide Component (The Mobile-Responsive UI) ---
        function AnatomyTopicGuide({ onBack }) {
          const [activeTab, setActiveTab] = useState('short_essay');
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
          const [openShortIndex, setOpenShortIndex] = useState(null);
          const [openLongIndex, setOpenLongIndex] = useState(0);

          // The 3 required tabs
          const tabs = [
            { id: 'short_essay', label: 'Short Essay', icon: <i className="fa-solid fa-file-lines flex items-center justify-center"></i> },
            { id: 'long_essay', label: 'Long Essay', icon: <i className="fa-solid fa-book-open flex items-center justify-center"></i> },
            { id: 'glossary', label: 'Glossary & Mnemonics', icon: <i className="fa-solid fa-bookmark flex items-center justify-center"></i> },
          ];

          return (
            <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row font-sans text-slate-800">
              
              {/* MOBILE HEADER (Hidden on Desktop) */}
              <div className="md:hidden bg-red-900 text-white p-4 flex justify-between items-center shadow-md z-20">
                <div className="flex items-center gap-3">
                  <button onClick={onBack} className="p-1 hover:bg-red-800 rounded transition-all duration-200 active:scale-90 w-8 h-8 flex items-center justify-center group">
                    <i className="fa-solid fa-arrow-left transition-transform duration-300 group-hover:-translate-x-1"></i>
                  </button>
                  <div className="flex items-center gap-2 font-bold text-lg">
                    <i className="fa-solid fa-brain text-red-300"></i>
                    <span>Cerebellum Review</span>
                  </div>
                </div>
                <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="w-8 h-8 flex items-center justify-center transition-transform duration-300 active:scale-90">
                  <div className={`transition-transform duration-300 ${isMobileMenuOpen ? 'rotate-90 scale-110' : 'rotate-0'}`}>
                    {isMobileMenuOpen ? <i className="fa-solid fa-xmark"></i> : <i className="fa-solid fa-bars"></i>}
                  </div>
                </button>
              </div>

              {/* SIDEBAR NAVIGATION */}
              <nav className={`
                ${isMobileMenuOpen ? 'flex' : 'hidden'} 
                md:flex flex-col w-full md:w-72 bg-red-900 text-white shadow-xl
                fixed md:sticky top-0 h-screen overflow-y-auto z-10 transition-all duration-300
              `}>
                <div className="p-4 border-b border-red-800 flex items-center justify-between">
                  <button 
                    onClick={onBack}
                    className="flex items-center gap-2 text-red-300 hover:text-white hover:bg-red-800 px-3 py-2 rounded-lg transition-all duration-200 transform hover:-translate-x-1 active:scale-95 text-sm font-semibold w-full group"
                  >
                    <i className="fa-solid fa-arrow-left transition-transform duration-300 group-hover:-translate-x-1"></i> Back to Dashboard
                  </button>
                </div>
                
                <div className="hidden md:flex items-center gap-3 p-6 border-b border-red-800">
                  <i className="fa-solid fa-brain text-2xl text-red-300"></i>
                  <div>
                    <h1 className="font-bold text-xl leading-tight">Cerebellum</h1>
                    <span className="text-red-300 text-xs uppercase tracking-wider font-semibold">Study Guide</span>
                  </div>
                </div>
                
                <div className="p-4 flex-1">
                  <p className="text-red-400 text-xs font-bold mb-4 uppercase tracking-wider px-2">Study Navigation</p>
                  <ul className="space-y-1">
                    {tabs.map((tab) => (
                      <li key={tab.id}>
                        <button
                          onClick={() => {
                            setActiveTab(tab.id);
                            setIsMobileMenuOpen(false); // Closes menu automatically on mobile
                          }}
                          className={`w-full flex items-center gap-3 px-3 py-3 rounded-lg transition-all duration-200 transform hover:translate-x-2 active:scale-95 text-left group
                            ${activeTab === tab.id 
                              ? 'bg-red-600 text-white shadow-md' 
                              : 'text-red-200 hover:bg-red-800 hover:text-white'
                            }`}
                        >
                          <span className={`w-5 h-5 flex items-center justify-center transition-transform duration-300 ${activeTab === tab.id ? 'scale-110' : 'group-hover:scale-110'}`}>{tab.icon}</span>
                          <span className="font-medium">{tab.label}</span>
                        </button>
                      </li>
                    ))}
                  </ul>
                </div>
                
                <div className="p-4 border-t border-red-800 text-xs text-red-400 text-center">
                  Topic: Cerebellum
                </div>
              </nav>

              {/* MAIN CONTENT AREA */}
              <main className="flex-1 p-4 md:p-8 overflow-y-auto w-full max-w-5xl mx-auto">
                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-10 min-h-[80vh]">
                  
                  {activeTab === 'short_essay' && (
                    <div className="space-y-6 animate-in">
                      <div className="border-b border-slate-200 pb-4">
                        <h2 className="text-3xl font-bold text-slate-800 flex items-center gap-3">
                          <i className="fa-solid fa-file-lines text-red-600"></i> Short Essay
                        </h2>
                        <p className="text-slate-600 mt-2">Targeted, high-yield written responses.</p>
                      </div>
                      
                      <div className="space-y-3">
                        {[
                          { q: "Where is the cerebellum located anatomically in relation to the cerebrum and the brainstem?", a: "The cerebellum lies in the posterior cranial fossa. It is located inferior to the cerebrum (separated by the tentorium cerebelli) and posterior to the pons and medulla, separated from the brainstem by the fourth ventricle." },
                          { q: "Describe the structural significance of the horizontal fissure.", a: "The horizontal fissure is a deep groove located along the margin of the cerebellum. Its primary purpose is to separate the superior surface of the cerebellum from the inferior surface." },
                          { q: "Which structures are housed in the anterior and posterior cerebellar notches?", a: "The anterior notch lodges the pons and the medulla. The posterior notch lodges the falx cerebelli." },
                          { q: "Identify the three anatomical lobes and the fissures that delineate them.", a: "The three lobes are the Anterior, Posterior, and Flocculonodular. The Fissura prima separates the anterior and posterior lobes, while the posterolateral fissure separates the posterior lobe from the flocculonodular lobe." },
                          { q: "What is the functional role of the Archicerebellum and what are its primary connections?", a: "The Archicerebellum is concerned with equilibrium. Its connections are primarily vestibular, and it is formed by the two flocculi and the nodule." },
                          { q: "Name the specific deep nuclei associated with the Paleocerebellum.", a: "The Paleocerebellum is associated with the fastigial nucleus (vermal part) as well as the globose and emboliform nuclei (paravermal parts)." },
                          { q: "Identify the three primary arteries supplying the cerebellum and their parent vessels.", a: "The Superior Cerebellar Artery (SCA) and Anterior Inferior Cerebellar Artery (AICA) both branch from the basilar artery. The Posterior Inferior Cerebellar Artery (PICA) branches from the vertebral artery." },
                          { q: "Compare the primary fiber types found in the Inferior vs. Superior Cerebellar Peduncles.", a: "The Inferior Cerebellar Peduncle (ICP) is formed mostly of afferent fibers (bringing information in). Conversely, the Superior Cerebellar Peduncle (SCP) is formed mostly of efferent fibers (sending information out)." },
                          { q: "What is the \"vallecula\" and what structure does it contain?", a: "The vallecula is a deep groove present on the inferior surface of the cerebellum. It lies between the two cerebellar hemispheres and contains the inferior vermis." },
                          { q: "Describe the pathway and destination of fibers traveling through the Middle Cerebellar Peduncle.", a: "The Middle Cerebellar Peduncle (MCP) contains cortico-ponto-cerebellar fibers. It is the largest peduncle and serves as the bridge connecting the cerebellum to the pons." }
                        ].map((item, idx) => (
                          <div key={idx} className="border border-slate-200 rounded-xl overflow-hidden shadow-sm hover:border-red-300 transition-all duration-300">
                            <button
                              onClick={() => setOpenShortIndex(openShortIndex === idx ? null : idx)}
                              className="w-full text-left p-4 bg-white hover:bg-slate-50 flex justify-between items-center focus:outline-none"
                            >
                              <span className="font-semibold text-slate-800 pr-4">Q{idx + 1}: {item.q}</span>
                              <i className={`fa-solid fa-chevron-down transition-transform duration-300 ${openShortIndex === idx ? 'rotate-180 text-red-500' : 'text-slate-400'}`}></i>
                            </button>
                            
                            <div className={`grid transition-all duration-300 ease-in-out ${openShortIndex === idx ? 'grid-rows-[1fr] opacity-100' : 'grid-rows-[0fr] opacity-0'}`}>
                              <div className="overflow-hidden">
                                <div className="p-4 bg-red-50 border-t border-red-100 text-slate-700">
                                  <strong className="text-red-800 block mb-1">Answer:</strong>
                                  {item.a}
                                </div>
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {activeTab === 'long_essay' && (
                    <div className="space-y-6 animate-in">
                      <div className="border-b border-slate-200 pb-4">
                        <h2 className="text-3xl font-bold text-slate-800 flex items-center gap-3">
                          <i className="fa-solid fa-book-open text-red-600"></i> Long Essay
                        </h2>
                        <p className="text-slate-600 mt-2">Comprehensive, multi-part anatomical discussions.</p>
                      </div>
                      
                      <div className="flex flex-col gap-4">
                        {[
                          { title: "Compare and contrast the functional divisions of the cerebellum.", answer: "The cerebellum is divided into three functional zones: the Archicerebellum, Paleocerebellum, and Neocerebellum. The Archicerebellum is the most primitive part, consisting of the flocculonodular lobe; it connects to the vestibular system and is strictly responsible for maintaining equilibrium. The Paleocerebellum comprises the vermis and paravermal regions of the hemispheres. It functions in the coordination of movement and proprioception by receiving spinal (spinocerebellar) input and a \"copy\" of the motor plan from the motor cortex. It utilizes the fastigial, globose, and emboliform nuclei to regulate trunk and distal limb muscles. Finally, the Neocerebellum consists of the lateral hemispheres and is the most phylogenetically recent. It connects to the cerebral cortex via the dentate nucleus and the cortico-ponto-cerebellar pathway, focusing on the planning and programming of complex movements." },
                          { title: "Detail the connectivity of the Cerebellar Peduncles and their role in motor control.", answer: "The three pairs of peduncles act as the communication highways of the cerebellum. The Inferior Cerebellar Peduncle (ICP) primarily handles sensory input (afferents) from the medulla and spinal cord, such as the posterior spinocerebellar tract, to provide the cerebellum with real-time data on body position. The Middle Cerebellar Peduncle (MCP) is the largest and exclusively carries cortico-ponto-cerebellar fibers, conveying intended motor commands from the cerebrum to the cerebellum. The Superior Cerebellar Peduncle (SCP) is the main output (efferent) pathway to the midbrain. Through fibers like the dentato-thalamic tract, the cerebellum sends corrected motor instructions back to the cerebral cortex via the thalamus, or to the red nucleus (cerebello-rubral), allowing for the refinement of motor activity." },
                          { title: "Discuss the vascularization of the cerebellum and the consequences of localized venous drainage.", answer: "The cerebellum receives its arterial blood from three sources: the SCA and AICA (from the basilar artery) and the PICA (from the vertebral artery). The SCA serves the superior surface, while the AICA and PICA serve the inferior surface. Venous drainage is complex, involving both superior and inferior cerebellar veins. The superior veins drain into the straight and transverse sinuses, as well as the great cerebral vein. The inferior veins drain into a wider array of sinuses, including the straight, sigmoid, occipital, and inferior petrosal sinuses. This extensive venous network ensures that blood is efficiently returned to the systemic circulation, but it also means that vascular issues in several different dural sinuses could potentially impact cerebellar drainage." }
                        ].map((essay, idx) => (
                          <div key={idx} className={`border rounded-xl overflow-hidden transition-all duration-300 ${openLongIndex === idx ? 'border-red-300 shadow-md ring-1 ring-red-100' : 'border-slate-200 hover:border-red-200 hover:shadow-md'}`}>
                            <button 
                              className={`w-full text-left p-5 flex justify-between items-start gap-4 transition-colors duration-200 active:bg-red-100/50 ${openLongIndex === idx ? 'bg-red-50' : 'bg-white hover:bg-slate-50'}`}
                              onClick={() => setOpenLongIndex(openLongIndex === idx ? null : idx)}
                            >
                              <h3 className={`font-bold text-lg leading-snug transition-colors duration-300 ${openLongIndex === idx ? 'text-red-900' : 'text-slate-700'}`}>
                                Essay {idx + 1}: {essay.title}
                              </h3>
                              <i className={`fa-solid fa-chevron-down mt-1 shrink-0 transition-transform duration-300 ${openLongIndex === idx ? 'rotate-180 text-red-600' : 'text-slate-400'}`}></i>
                            </button>
                            
                            <div className={`grid transition-all duration-300 ease-in-out ${openLongIndex === idx ? 'grid-rows-[1fr] opacity-100' : 'grid-rows-[0fr] opacity-0'}`}>
                              <div className="overflow-hidden">
                                <div className="p-6 bg-white border-t border-red-100 text-slate-700 leading-relaxed text-lg shadow-inner whitespace-pre-wrap">
                                  {essay.answer}
                                </div>
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {activeTab === 'glossary' && (
                    <div className="space-y-8 animate-in">
                      <div className="border-b border-slate-200 pb-4">
                        <h2 className="text-3xl font-bold text-slate-800 flex items-center gap-3">
                          <i className="fa-solid fa-bookmark text-red-600"></i> Glossary & Mnemonics
                        </h2>
                        <p className="text-slate-600 mt-2">Key terms, buzzwords, and memory hooks for the Cerebellum.</p>
                      </div>

                      {/* Golden Buzzwords */}
                      <div>
                        <h3 className="text-xl font-bold text-slate-800 mb-4 bg-slate-100 p-2 rounded-md inline-flex items-center gap-2">
                          <i className="fa-solid fa-bolt text-red-600"></i> Golden Buzzwords
                        </h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                          {[
                            { term: '"Motor Copy"', def: 'The Paleocerebellum receives a duplicate of the motor plan from the cortex.' },
                            { term: '"Planning and Programming"', def: 'The hallmark function of the Neocerebellum.' },
                            { term: '"Equilibrium"', def: 'The hallmark function of the Archicerebellum.' },
                            { term: '"Largest Peduncle"', def: 'Refers to the Middle Cerebellar Peduncle (MCP).' }
                          ].map((item, idx) => (
                            <div key={idx} className="bg-white border border-slate-200 p-4 rounded-lg shadow-sm hover:border-red-300 hover:shadow-md transition-all">
                              <strong className="text-red-800 block mb-1 text-lg">{item.term}</strong>
                              <p className="text-slate-600 text-sm">{item.def}</p>
                            </div>
                          ))}
                        </div>
                      </div>

                      <div className="grid md:grid-cols-2 gap-8 pt-4 border-t border-slate-200">
                        {/* Mnemonics */}
                        <div className="bg-red-50 rounded-xl p-6 border border-red-200 shadow-sm">
                          <h3 className="text-xl font-bold text-red-900 mb-4 flex items-center gap-2">
                            <i className="fa-solid fa-brain"></i> High-Yield Mnemonics
                          </h3>
                          <div className="space-y-4">
                            {[
                              { title: 'Arteries (S-A-P)', desc: 'Superior, Anterior Inferior, Posterior Inferior (SCA, AICA, PICA).' },
                              { title: 'Peduncle Connections (M-P-M)', desc: 'Medulla (Inferior), Pons (Middle), Midbrain (Superior).' },
                              { title: 'Functional Order (A-P-N)', desc: 'Archi (Oldest), Paleo (Middle), Neo (Newest).' },
                              { title: 'Deep Nuclei (Don\'t Eat Greasy Foods)', desc: 'Dentate, Emboliform, Globose, Fastigial (ordered lateral to medial).' }
                            ].map((item, idx) => (
                              <div key={idx} className="bg-white p-4 rounded-lg shadow-sm border-l-4 border-red-500">
                                <div className="font-bold text-red-900 text-lg mb-1">{item.title}</div>
                                <p className="text-slate-700 text-sm">{item.desc}</p>
                              </div>
                            ))}
                          </div>
                        </div>

                        {/* Key Terms */}
                        <div>
                          <h3 className="text-xl font-bold text-slate-800 mb-4 bg-slate-100 p-2 rounded-md inline-flex items-center gap-2">
                            <i className="fa-solid fa-list text-slate-600"></i> Key Terms and "Hooks"
                          </h3>
                          <div className="flex flex-col gap-3">
                            {[
                              { term: 'Dentate Nucleus', def: 'The deep nucleus associated with the Neocerebellum and the planning of movement.' },
                              { term: 'Fastigial Nucleus', def: 'The deep nucleus associated with the vermal part of the Paleocerebellum and trunk muscles.' },
                              { term: 'Fissura Prima', def: 'The "First Fissure"; the primary landmark on the superior surface.' },
                              { term: 'Paravermal Part', def: 'The portion of the cerebellar hemisphere immediately adjacent to the vermis; connected to distal limb muscles.' },
                              { term: 'Tentorium Cerebelli', def: 'The "tent" of dura mater that roofs over the cerebellum.' },
                              { term: 'VLN (Ventral Lateral Nucleus)', def: 'The specific part of the thalamus that receives cerebellar outputs via the SCP.' }
                            ].map((item, idx) => (
                              <div key={idx} className="border border-slate-200 p-3 rounded-lg bg-white hover:border-red-300 transition-colors">
                                <h4 className="font-bold text-red-800 mb-1">{item.term}</h4>
                                <p className="text-slate-600 text-sm">{item.def}</p>
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    </div>
                  )}

                </div>
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
