                                <i className="fa-solid fa-list text-slate-600"></i> Key Terms and "Hooks"
                              </h3>
                              <div className="flex flex-col gap-3">
                                {[
                                  { term: 'Dentate Nucleus', def: 'The deep nucleus associated with the Neocerebellum and the planning of movement.' },
                                  { term: 'Fastigial Nucleus', def: 'The deep nucleus associated with the vermal part of the Paleocerebellum and trunk muscles.' },
                                  { term: 'Fissura Prima', def: 'The "First Fissure"; the primary landmark on the superior surface.' },
                                  { term: 'Paravermal Part', def: 'The portion of the cerebellar hemisphere immediately adjacent to the vermis; connected to distal limb muscles.' },
                                  { term: 'Tentorium Cerebelli', def: 'The "tent" of dura mater that roofs over the cerebellum.' },
                                  { term: 'VLN (Ventral Lateral Nucleus)', def: 'The specific part of the thalamus that receives cerebellar outputs via the SCP.' }
                                ].map((item, idx) => (
                                  <div key={idx} className="border border-slate-200 p-3 rounded-lg bg-white hover:border-red-300 transition-colors">
                                    <h4 className="font-bold text-red-800 mb-1">{item.term}</h4>
                                    <p className="text-slate-600 text-sm">{item.def}</p>
                                  </div>
                                ))}
                              </div>
                            </div>
                          </div>
                        </>
                      )}

                      {topic === 'cranial_nerves' && (
                        <>
                          {/* Cranial Nerves Glossary */}
                          <div>
                            <h3 className="text-xl font-bold text-slate-800 mb-4 bg-slate-100 p-2 rounded-md inline-flex items-center gap-2">
                              <i className="fa-solid fa-sitemap text-red-600"></i> Functional Column Key (Buzzwords)
                            </h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                              {[
                                { term: 'GSE', full: 'General Somatic Efferent', def: 'Motor to skeletal muscles (eye, tongue).' },
                                { term: 'GVE', full: 'General Visceral Efferent', def: 'Parasympathetic motor to glands/smooth muscle.' },
                                { term: 'SVE', full: 'Special Visceral Efferent', def: 'Motor to muscles of pharyngeal arches.' },
                                { term: 'GSA', full: 'General Somatic Afferent', def: 'General sensation (touch, pain, temp).' },
                                { term: 'SVA', full: 'Special Visceral Afferent', def: 'Special senses (taste).' },
                                { term: 'GVA', full: 'General Visceral Afferent', def: 'Sensation from internal organs/viscera.' },
                                { term: 'SSA', full: 'Special Somatic Afferent', def: 'Special senses (hearing, balance).' }
                              ].map((item, idx) => (
                                <div key={idx} className="bg-white border border-slate-200 p-4 rounded-lg shadow-sm hover:border-red-300 hover:shadow-md transition-all">
                                  <div className="flex items-center justify-between mb-1">
                                    <strong className="text-red-800 text-lg">{item.term}</strong>
                                    <span className="text-xs font-bold text-slate-400 uppercase tracking-wide">{item.full}</span>
                                  </div>
                                  <p className="text-slate-600 text-sm">{item.def}</p>
                                </div>
                              ))}
                            </div>
                          </div>

                          <div className="grid md:grid-cols-2 gap-8 pt-4 border-t border-slate-200">
                            
                            <div className="space-y-8">
                              <div className="bg-red-50 rounded-xl p-6 border border-red-200 shadow-sm">
                                <h3 className="text-xl font-bold text-red-900 mb-4 flex items-center gap-2">
                                  <i className="fa-solid fa-brain"></i> Mnemonics for Shared Nuclei
                                </h3>
                                <div className="space-y-4">
                                  {[
                                    { title: '"The Solo Seven, Nine, and Ten"', desc: 'Nucleus Solitarius is shared by CN VII, IX, and X (SVA/GVA - Taste/Visceral).' },
                                    { title: '"Ambi-swallow 9, 10, 11"', desc: 'Nucleus Ambiguus is shared by CN IX, X, and XI (SVE - Motor to throat/palate).' },
                                    { title: '"The Sensory Spine 5, 7, 9, 10"', desc: 'Spinal Nucleus of Trigeminal is shared by CN V, VII, IX, and X (GSA - General sensation).' }
                                  ].map((item, idx) => (
                                    <div key={idx} className="bg-white p-4 rounded-lg shadow-sm border-l-4 border-red-500">
                                      <div className="font-bold text-red-900 text-lg mb-1">{item.title}</div>
                                      <p className="text-slate-700 text-sm">{item.desc}</p>
                                    </div>
                                  ))}
                                </div>
                              </div>

                              <div>
                                <h3 className="text-xl font-bold text-slate-800 mb-4 bg-slate-100 p-2 rounded-md inline-flex items-center gap-2">
                                  <i className="fa-solid fa-bone text-slate-600"></i> Pharyngeal Arch Associations
                                </h3>
                                <div className="flex flex-col gap-3">
                                  {[
                                    { arch: '1st Arch', def: 'CN V (Mastication).' },
                                    { arch: '2nd Arch', def: 'CN VII (Facial expression).' },
                                    { arch: '3rd Arch', def: 'CN IX (Stylopharyngeus).' },
                                    { arch: '4th & 6th Arches', def: 'CN X (Palate, Pharynx, Larynx).' }
                                  ].map((item, idx) => (
                                    <div key={idx} className="border border-slate-200 p-3 rounded-lg bg-white flex items-center gap-4">
                                      <span className="font-bold text-red-800 whitespace-nowrap">{item.arch}</span>
                                      <span className="text-slate-600 text-sm">{item.def}</span>
                                    </div>
                                  ))}
                                </div>
                              </div>
                            </div>

                            <div>
                              <h3 className="text-xl font-bold text-slate-800 mb-4 bg-slate-100 p-2 rounded-md inline-flex items-center gap-2">
                                <i className="fa-solid fa-list text-slate-600"></i> Key Entities
                              </h3>
                              <div className="flex flex-col gap-3">
                                {[
                                  { term: 'Facial Colliculus', def: 'An elevation in the floor of the 4th ventricle formed by CN VII fibers looping around the CN VI nucleus.' },
                                  { term: 'Hypoglossal Trigone', def: 'The area in the floor of the 4th ventricle overlying the hypoglossal nucleus.' },
                                  { term: 'Edinger Westphal Nucleus', def: 'The "Golden Buzzword" for parasympathetic control of the pupil and lens.' },
                                  { term: 'Nucleus Ambiguus', def: 'The "Golden Buzzword" for swallowing and vocalization (muscles of the palate, pharynx, larynx).' }
                                ].map((item, idx) => (
                                  <div key={idx} className="border border-slate-200 p-3 rounded-lg bg-white hover:border-red-300 transition-colors">
                                    <h4 className="font-bold text-red-800 mb-1">{item.term}</h4>
                                    <p className="text-slate-600 text-sm">{item.def}</p>
                                  </div>
                                ))}
                              </div>
                            </div>

                          </div>
                        </>
                      )}

                      {topic === 'cranial_cavity' && (
                        <>
                          {/* Cranial Cavity Glossary */}
                          <div>
                            <h3 className="text-xl font-bold text-slate-800 mb-4 bg-slate-100 p-2 rounded-md inline-flex items-center gap-2">
                              <i className="fa-solid fa-bolt text-red-600"></i> Golden Buzzwords
                            </h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                              {[
                                { term: '"Sickle-shaped"', def: 'Think Falx cerebri or Falx cerebelli.' },
                                { term: '"Tent-shaped"', def: 'Think Tentorium cerebelli.' },
                                { term: '"Dangerous area of the face"', def: 'Link to Cavernous Sinus Thrombosis.' },
                                { term: '"Pulsating exophthalmos"', def: 'Link to Carotid-Cavernous Fistula.' },
                                { term: '"RBCs in CSF"', def: 'Think Subdural Hemorrhage.' }
                              ].map((item, idx) => (
                                <div key={idx} className="bg-white border border-slate-200 p-4 rounded-lg shadow-sm hover:border-red-300 hover:shadow-md transition-all">
                                  <strong className="text-red-800 block mb-1 text-lg">{item.term}</strong>
                                  <p className="text-slate-600 text-sm">{item.def}</p>
                                </div>
                              ))}
                            </div>
                          </div>

                          <div className="grid md:grid-cols-2 gap-8 pt-4 border-t border-slate-200">
                            
                            <div className="space-y-8">
                              <div className="bg-red-50 rounded-xl p-6 border border-red-200 shadow-sm">
                                <h3 className="text-xl font-bold text-red-900 mb-4 flex items-center gap-2">
                                  <i className="fa-solid fa-brain"></i> Mnemonics for Exits
                                </h3>
                                <div className="space-y-4">
                                  {[
                                    { title: 'Superior Orbital Fissure', desc: 'Live Free To See Naked Antelopes (Lacrimal, Frontal, Trochlear, Sup. Ophthalmic Vein, Nasociliary, Abducent). Clinical basic: III, IV, V1, VI.' },
                                    { title: 'Trigeminal Exits (Standing Room Only)', desc: 'V1 = Superior Orbital Fissure, V2 = Foramen Rotundum, V3 = Foramen Ovale.' }
                                  ].map((item, idx) => (
                                    <div key={idx} className="bg-white p-4 rounded-lg shadow-sm border-l-4 border-red-500">
                                      <div className="font-bold text-red-900 text-lg mb-1">{item.title}</div>
                                      <p className="text-slate-700 text-sm">{item.desc}</p>
                                    </div>
                                  ))}
                                </div>
                              </div>
                            </div>

                            <div>
                              <h3 className="text-xl font-bold text-slate-800 mb-4 bg-slate-100 p-2 rounded-md inline-flex items-center gap-2">
                                <i className="fa-solid fa-list text-slate-600"></i> Key Terms and "Hooks"
                              </h3>
                              <div className="flex flex-col gap-3">
                                {[
                                  { term: 'Endosteum', def: 'The role played by the outer layer of the dura mater in relation to the skull bones.' },
                                  { term: 'Reduplicate', def: 'The action of the inner dural layer folding back on itself to create septa.' },
                                  { term: 'Valveless', def: 'A key characteristic of both dural sinuses and emissary veins, allowing two-way blood flow.' },
                                  { term: 'Pterion', def: 'The H-shaped junction of bones; the "weak spot" of the skull covering the middle meningeal artery.' },
                                  { term: 'Lucid Interval', def: 'Often associated with extradural hematomas (implied by the clinical course of arterial bleeding).' },
                                  { term: 'Infundibulum', def: 'The stalk connecting the pituitary gland to the brain, passing through the diaphragma sellae.' }
                                ].map((item, idx) => (
                                  <div key={idx} className="border border-slate-200 p-3 rounded-lg bg-white hover:border-red-300 transition-colors">
                                    <h4 className="font-bold text-red-800 mb-1">{item.term}</h4>
                                    <p className="text-slate-600 text-sm">{item.def}</p>
                                  </div>
                                ))}
                              </div>
                            </div>

                          </div>
                        </>
                      )}

                    </div>
                  )}

                </div>
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
