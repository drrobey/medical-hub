<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroAnatomy Hub</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load React, ReactDOM, and Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Load Icons (FontAwesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Custom Page Transition Animations */
        @keyframes slideInRight { 0% { transform: translateX(60px); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
        @keyframes slideInLeft { 0% { transform: translateX(-60px); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
        .slide-forward { animation: slideInRight 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .slide-backward { animation: slideInLeft 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* Tab Content & Section Enter Animation */
        @keyframes fadeSlideUp { 0% { opacity: 0; transform: translateY(15px); } 100% { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="bg-slate-50 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Main App Component ---
        function App() {
          const [currentView, setCurrentView] = useState('dashboard');
          const [direction, setDirection] = useState('forward');

          const navigateTo = (view) => {
            setDirection(view === 'dashboard' ? 'backward' : 'forward');
            setCurrentView(view);
          };

          // Routes back to the CNS Module in the Master Portal
          const backToPortal = () => {
              window.location.href = 'index.html#cns';
          };

          return (
            <>
              <div key={currentView} className={direction === 'forward' ? 'slide-forward' : 'slide-backward'}>
                {currentView === 'dashboard' ? (
                  <Dashboard onSelectGuide={(topicId) => navigateTo(topicId)} onBackToPortal={backToPortal} />
                ) : currentView === 'scalp_face' ? (
                  <ScalpFaceDashboard onSelectTopic={(t) => navigateTo(t)} onBack={() => navigateTo('dashboard')} />
                ) : (
                  <AnatomyTopicGuide topic={currentView} onBack={() => {
                    if (currentView === 'the_scalp' || currentView === 'the_face') {
                      navigateTo('scalp_face');
                    } else {
                      navigateTo('dashboard');
                    }
                  }} />
                )}
              </div>
              
              <div className="fixed bottom-2 right-3 text-right text-[10px] md:text-xs text-slate-400/50 font-medium pointer-events-none z-50 select-none">
                <div>Dr.Zeyad Robey</div>
                <div>Ain Shams University</div>
              </div>
            </>
          );
        }

        // --- Dashboard Component ---
        function Dashboard({ onSelectGuide, onBackToPortal }) {
          return (
            <div className="min-h-screen bg-slate-100 font-sans text-slate-800 p-6 md:p-12">
              <div className="max-w-6xl mx-auto space-y-8 animate-in">
                
                <button 
                  onClick={onBackToPortal}
                  className="group flex items-center gap-2 text-slate-500 hover:text-red-600 font-bold transition-all"
                >
                  <i className="fa-solid fa-house group-hover:-translate-y-1 transition-transform"></i> 
                  <span className="text-sm uppercase tracking-wider">Back to CNS Module</span>
                </button>

                <header className="flex items-center justify-between pb-6 border-b border-slate-200">
                  <div className="flex items-center gap-4">
                    <div className="bg-red-600 p-3 rounded-xl shadow-lg w-12 h-12 flex items-center justify-center text-white text-xl">
                      <i className="fa-solid fa-book-bookmark"></i>
                    </div>
                    <div>
                      <h1 className="text-3xl md:text-4xl font-bold text-slate-900 tracking-tight">NeuroAnatomy Hub</h1>
                      <p className="text-slate-500 font-medium mt-1">Anatomy Subject Dashboard</p>
                    </div>
                  </div>
                </header>

                <main>
                  <h2 className="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                    <i className="fa-solid fa-book-open text-red-600"></i>
                    Available Study Modules
                  </h2>
                  
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    
                    {/* Cerebellum Module Card */}
                    <div 
                      onClick={() => onSelectGuide('cerebellum')}
                      className="relative overflow-hidden rounded-2xl border-2 p-6 transition-all duration-300 ease-out flex flex-col h-full transform cursor-pointer hover:shadow-2xl hover:-translate-y-2 hover:scale-[1.02] hover:border-red-500 group bg-red-50 border-red-200"
                    >
                      <div className="bg-white w-16 h-16 rounded-2xl shadow-sm flex items-center justify-center mb-6 shrink-0 transition-transform duration-300 group-hover:scale-110 group-hover:rotate-3">
                        <i className="fa-solid fa-brain text-2xl text-red-500"></i>
                      </div>
                      <h3 className="text-xl font-bold mb-2 text-slate-900">Cerebellum</h3>
                      <p className="text-slate-600 mb-8 line-clamp-2 flex-1">
                        Anatomical location, functional divisions, cerebellar peduncles, and vascularization.
                      </p>
                      <button className="w-full py-3 px-4 bg-white/50 hover:bg-white text-slate-800 border border-slate-300 font-semibold rounded-xl transition-all duration-200 transform hover:scale-105 active:scale-95 flex items-center justify-center gap-2 mt-auto shadow-sm">
                         Open Review
                      </button>
                    </div>

                    {/* Cranial Nerves Module Card */}
                    <div 
                      onClick={() => onSelectGuide('cranial_nerves')}
                      className="relative overflow-hidden rounded-2xl border-2 p-6 transition-all duration-300 ease-out flex flex-col h-full transform cursor-pointer hover:shadow-2xl hover:-translate-y-2 hover:scale-[1.02] hover:border-red-500 group bg-red-50 border-red-200"
                    >
                      <div className="bg-white w-16 h-16 rounded-2xl shadow-sm flex items-center justify-center mb-6 shrink-0 transition-transform duration-300 group-hover:scale-110 group-hover:rotate-3">
                        <i className="fa-solid fa-network-wired text-2xl text-red-500"></i>
                      </div>
                      <h3 className="text-xl font-bold mb-2 text-slate-900">Columns of Cranial Nerve Nuclei</h3>
                      <p className="text-slate-600 mb-8 line-clamp-2 flex-1">
                        Sensory/motor pathways, Edinger Westphal, Nucleus Ambiguus, and pharyngeal arches.
                      </p>
                      <button className="w-full py-3 px-4 bg-white/50 hover:bg-white text-slate-800 border border-slate-300 font-semibold rounded-xl transition-all duration-200 transform hover:scale-105 active:scale-95 flex items-center justify-center gap-2 mt-auto shadow-sm">
                         Open Review
                      </button>
                    </div>

                    {/* Cranial Cavity Module Card */}
                    <div 
                      onClick={() => onSelectGuide('cranial_cavity')}
                      className="relative overflow-hidden rounded-2xl border-2 p-6 transition-all duration-300 ease-out flex flex-col h-full transform cursor-pointer hover:shadow-2xl hover:-translate-y-2 hover:scale-[1.02] hover:border-red-500 group bg-red-50 border-red-200"
                    >
                      <div className="bg-white w-16 h-16 rounded-2xl shadow-sm flex items-center justify-center mb-6 shrink-0 transition-transform duration-300 group-hover:scale-110 group-hover:rotate-3">
                        <i className="fa-solid fa-skull text-2xl text-red-500"></i>
                      </div>
                      <h3 className="text-xl font-bold mb-2 text-slate-900">Cranial Cavity 1 & 2</h3>
                      <p className="text-slate-600 mb-8 line-clamp-2 flex-1">
                        Dural folds, venous sinuses, vascular supply, cranial nerve exit points, and clinical anatomy.
                      </p>
                      <button className="w-full py-3 px-4 bg-white/50 hover:bg-white text-slate-800 border border-slate-300 font-semibold rounded-xl transition-all duration-200 transform hover:scale-105 active:scale-95 flex items-center justify-center gap-2 mt-auto shadow-sm">
                         Open Review
                      </button>
                    </div>

                    {/* Scalp & Face Module Card */}
                    <div 
                      onClick={() => onSelectGuide('scalp_face')}
                      className="relative overflow-hidden rounded-2xl border-2 p-6 transition-all duration-300 ease-out flex flex-col h-full transform cursor-pointer hover:shadow-2xl hover:-translate-y-2 hover:scale-[1.02] hover:border-red-500 group bg-red-50 border-red-200"
                    >
                      <div className="bg-white w-16 h-16 rounded-2xl shadow-sm flex items-center justify-center mb-6 shrink-0 transition-transform duration-300 group-hover:scale-110 group-hover:rotate-3">
                        <i className="fa-solid fa-face-smile text-2xl text-red-500"></i>
                      </div>
                      <h3 className="text-xl font-bold mb-2 text-slate-900">Scalp &amp; Face</h3>
                      <p className="text-slate-600 mb-8 line-clamp-2 flex-1">
                        Layers of the scalp, facial muscles, vascularization, innervation, and lymphatic drainage.
                      </p>
                      <button className="w-full py-3 px-4 bg-white/50 hover:bg-white text-slate-800 border border-slate-300 font-semibold rounded-xl transition-all duration-200 transform hover:scale-105 active:scale-95 flex items-center justify-center gap-2 mt-auto shadow-sm">
                         Open Review
                      </button>
                    </div>

                    {/* NEW: Temporal & Infratemporal Fossa Module Card */}
                    <div 
                      onClick={() => onSelectGuide('temporal_fossa')}
                      className="relative overflow-hidden rounded-2xl border-2 p-6 transition-all duration-300 ease-out flex flex-col h-full transform cursor-pointer hover:shadow-2xl hover:-translate-y-2 hover:scale-[1.02] hover:border-red-500 group bg-red-50 border-red-200"
                    >
                      <div className="bg-white w-16 h-16 rounded-2xl shadow-sm flex items-center justify-center mb-6 shrink-0 transition-transform duration-300 group-hover:scale-110 group-hover:rotate-3">
                        <i className="fa-solid fa-tooth text-2xl text-red-500"></i>
                      </div>
                      <h3 className="text-xl font-bold mb-2 text-slate-900">Temporal & Infratemporal Fossa</h3>
                      <p className="text-slate-600 mb-8 line-clamp-2 flex-1">
                        Muscles of mastication, TMJ anatomy, ligaments, and mandibular movements.
                      </p>
                      <button className="w-full py-3 px-4 bg-white/50 hover:bg-white text-slate-800 border border-slate-300 font-semibold rounded-xl transition-all duration-200 transform hover:scale-105 active:scale-95 flex items-center justify-center gap-2 mt-auto shadow-sm">
                         Open Review
                      </button>
                    </div>

                  </div>
                </main>
              </div>
            </div>
          );
        }

        // --- Content Databases ---
        const contentDB = {
          cerebellum: {
            title: "Cerebellum",
            shortEssays: [
              { q: "Where is the cerebellum located anatomically in relation to the cerebrum and the brainstem?", a: "The cerebellum lies in the posterior cranial fossa. It is located inferior to the cerebrum (separated by the tentorium cerebelli) and posterior to the pons and medulla, separated from the brainstem by the fourth ventricle." },
              { q: "Describe the structural significance of the horizontal fissure.", a: "The horizontal fissure is a deep groove located along the margin of the cerebellum. Its primary purpose is to separate the superior surface of the cerebellum from the inferior surface." },
              { q: "Which structures are housed in the anterior and posterior cerebellar notches?", a: "The anterior notch lodges the pons and the medulla. The posterior notch lodges the falx cerebelli." },
              { q: "Identify the three anatomical lobes and the fissures that delineate them.", a: "The three lobes are the Anterior, Posterior, and Flocculonodular. The Fissura prima separates the anterior and posterior lobes, while the posterolateral fissure separates the posterior lobe from the flocculonodular lobe." },
              { q: "What is the functional role of the Archicerebellum and what are its primary connections?", a: "The Archicerebellum is concerned with equilibrium. Its connections are primarily vestibular, and it is formed by the two flocculi and the nodule." },
              { q: "Name the specific deep nuclei associated with the Paleocerebellum.", a: "The Paleocerebellum is associated with the fastigial nucleus (vermal part) as well as the globose and emboliform nuclei (paravermal parts)." },
              { q: "Identify the three primary arteries supplying the cerebellum and their parent vessels.", a: "The Superior Cerebellar Artery (SCA) and Anterior Inferior Cerebellar Artery (AICA) both branch from the basilar artery. The Posterior Inferior Cerebellar Artery (PICA) branches from the vertebral artery." },
              { q: "Compare the primary fiber types found in the Inferior vs. Superior Cerebellar Peduncles.", a: "The Inferior Cerebellar Peduncle (ICP) is formed mostly of afferent fibers (bringing information in). Conversely, the Superior Cerebellar Peduncle (SCP) is formed mostly of efferent fibers (sending information out)." },
              { q: "What is the \"vallecula\" and what structure does it contain?", a: "The vallecula is a deep groove present on the inferior surface of the cerebellum. It lies between the two cerebellar hemispheres and contains the inferior vermis." },
              { q: "Describe the pathway and destination of fibers traveling through the Middle Cerebellar Peduncle.", a: "The Middle Cerebellar Peduncle (MCP) contains cortico-ponto-cerebellar fibers. It is the largest peduncle and serves as the bridge connecting the cerebellum to the pons." }
            ],
            longEssays: [
              { title: "Compare and contrast the functional divisions of the cerebellum.", answer: "The cerebellum is divided into three functional zones: the Archicerebellum, Paleocerebellum, and Neocerebellum. The Archicerebellum is the most primitive part, consisting of the flocculonodular lobe; it connects to the vestibular system and is strictly responsible for maintaining equilibrium. The Paleocerebellum comprises the vermis and paravermal regions of the hemispheres. It functions in the coordination of movement and proprioception by receiving spinal (spinocerebellar) input and a \"copy\" of the motor plan from the motor cortex. It utilizes the fastigial, globose, and emboliform nuclei to regulate trunk and distal limb muscles. Finally, the Neocerebellum consists of the lateral hemispheres and is the most phylogenetically recent. It connects to the cerebral cortex via the dentate nucleus and the cortico-ponto-cerebellar pathway, focusing on the planning and programming of complex movements." },
              { title: "Detail the connectivity of the Cerebellar Peduncles and their role in motor control.", answer: "The three pairs of peduncles act as the communication highways of the cerebellum. The Inferior Cerebellar Peduncle (ICP) primarily handles sensory input (afferents) from the medulla and spinal cord, such as the posterior spinocerebellar tract, to provide the cerebellum with real-time data on body position. The Middle Cerebellar Peduncle (MCP) is the largest and exclusively carries cortico-ponto-cerebellar fibers, conveying intended motor commands from the cerebrum to the cerebellum. The Superior Cerebellar Peduncle (SCP) is the main output (efferent) pathway to the midbrain. Through fibers like the dentato-thalamic tract, the cerebellum sends corrected motor instructions back to the cerebral cortex via the thalamus, or to the red nucleus (cerebello-rubral), allowing for the refinement of motor activity." },
              { title: "Discuss the vascularization of the cerebellum and the consequences of localized venous drainage.", answer: "The cerebellum receives its arterial blood from three sources: the SCA and AICA (from the basilar artery) and the PICA (from the vertebral artery). The SCA serves the superior surface, while the AICA and PICA serve the inferior surface. Venous drainage is complex, involving both superior and inferior cerebellar veins. The superior veins drain into the straight and transverse sinuses, as well as the great cerebral vein. The inferior veins drain into a wider array of sinuses, including the straight, sigmoid, occipital, and inferior petrosal sinuses. This extensive venous network ensures that blood is efficiently returned to the systemic circulation, but it also means that vascular issues in several different dural sinuses could potentially impact cerebellar drainage." }
            ]
          },
          cranial_nerves: {
            title: "Columns of Cranial Nerve Nuclei",
            shortEssays: [
              { q: "Which cranial nerves are classified as purely sensory, and what are their primary roles?", a: "The purely sensory nerves are the Olfactory (I), Optic (II), and Vestibulocochlear (VIII). CN VIII specifically contains cochlear nuclei for hearing and vestibular nuclei for balance, located at the ponto-medullary junction." },
              { q: "Describe the location and function of the Edinger Westphal Nucleus.", a: "This is the parasympathetic nucleus (GVE) of the Oculomotor nerve located in the midbrain. Its fibers relay in the ciliary ganglion to supply the ciliary muscle and the sphincter pupillae for ocular control." },
              { q: "Explain the unique anatomical course of the Trochlear nerve (CN IV) fibers.", a: "The fibers of the Trochlear nerve arise from a nucleus in the midbrain at the level of the inferior colliculus. Uniquely, these fibers cross and emerge from the dorsal surface of the midbrain to supply the opposite superior oblique muscle." },
              { q: "How many nuclei are associated with the Trigeminal nerve, and what are their specific sensory functions?", a: "CN V has three sensory nuclei (GSA): the Main sensory nucleus for crude touch, the Spinal nucleus for pain and temperature, and the Mesencephalic nucleus for proprioception. It also has one motor nucleus (SVE) for the muscles of mastication." },
              { q: "What pharyngeal arch derivatives are supplied by the motor nucleus of the Facial nerve (CN VII)?", a: "The motor nucleus (SVE) of CN VII supplies muscles developed from the 2nd pharyngeal arch. These include the muscles of facial expression, platysma, posterior belly of digastric, stylohyoid, and stapedius." },
              { q: "Identify the specific salivary glands supplied by CN VII and CN IX and their respective parasympathetic nuclei.", a: "CN VII originates from the Superior salivatory nucleus (GVE) to supply the submandibular and sublingual glands. CN IX originates from the Inferior salivatory nucleus (GVE) to supply the parotid gland via the otic ganglion." },
              { q: "What is the functional significance of the Nucleus Ambiguus, and which nerves share it?", a: "The Nucleus Ambiguus is a motor nucleus (SVE) shared by CN IX, X, and XI. It supplies the muscles of the palate, pharynx, and larynx, which are derived from the 3rd, 4th, and 6th pharyngeal arches." },
              { q: "Describe the dual origin of the Accessory nerve (CN XI).", a: "CN XI consists of a spinal part originating from the upper five cervical segments of the spinal cord and a cranial part originating from the lower Nucleus Ambiguus. The spinal part supplies the sternomastoid and trapezius, while the cranial part joins the vagus nerve." },
              { q: "Which muscles are supplied by the Hypoglossal nerve (CN XII), and what is the one exception?", a: "The Hypoglossal nerve (CN XII) supplies all the intrinsic and extrinsic muscles of the tongue. The only exception is the palatoglossus muscle, which is supplied by the vagus/accessory complex." },
              { q: "Explain the clinical difference between upper and lower motor neuron lesions regarding the Facial nerve.", a: "In an upper motor neuron lesion (UMNL), the upper face is spared because its motor nucleus receives bilateral cortico-nuclear fibers, while the lower face is affected because it receives only contralateral fibers. A lower motor neuron lesion would affect both the upper and lower face." }
            ],
            longEssays: [
              { title: "Cortico-nuclear Innervation and Clinical Implications of UMNLs", answer: "The standard organization of the motor nuclei of cranial nerves is the receipt of bilateral cortico-nuclear tract innervation. This provides a redundancy that protects function in the event of unilateral cortical damage. However, there are two critical exceptions to this rule: the portion of the facial nucleus that innervates the lower face and the portion of the hypoglossal nucleus that innervates the genioglossus muscle. These specific regions receive only contralateral cortico-nuclear fibers.\n\nIn the case of the Facial nerve (VII), the motor nucleus is divided into dorsal and ventral parts. The dorsal part, supplying the upper face, receives bilateral input, meaning an UMNL on one side will not paralyze the forehead or eye-closing muscles. Conversely, the ventral part, supplying the lower face, receives only contralateral input. Therefore, an UMNL results in paralysis of the muscles of the lower face on the side opposite the lesion. Similarly, for the Hypoglossal nerve (XII), the portion of the nucleus innervating the genioglossus muscle receives only contralateral fibers. An UMNL would therefore lead to weakness or deviation of the tongue toward the side opposite the lesion. These exceptions make these two nerves uniquely liable to observable deficits during UMNL clinical presentations." },
              { title: "Functional Organization of the Mixed Cranial Nerves", answer: "Mixed cranial nerves are defined by their complex roles, necessitating four distinct nuclei to handle different functional modalities: General Somatic Afferent (GSA), Special Visceral Afferent (SVA), General Visceral Efferent (GVE), and Special Visceral Efferent (SVE).\n\nFor the Glossopharyngeal (IX) and Vagus (X) nerves, sharing central nuclei is a key organizational feature. Both nerves utilize the Nucleus Ambiguus (SVE) to provide motor innervation to the muscles of the 3rd arch (IX - stylopharyngeus) and the 4th/6th arches (X - palate, pharynx, larynx). They also share the Nucleus Solitarius for visceral functions; for CN IX, it processes taste from the posterior tongue (SVA), and for CN X, it processes taste from the epiglottis and general visceral sensations (GVA) from the thoracic and abdominal organs. Finally, both contribute to the Spinal Nucleus of the Trigeminal (GSA) to relay general sensations from the oropharynx, ear, and respiratory tract. This sharing of nuclei ensures that specific types of information (like taste or visceral motor control) are processed in specialized, consolidated brainstem centers regardless of which peripheral nerve carries the signal." }
            ]
          },
          the_scalp: {
            title: "The Scalp",
            shortEssays: [
              { q: "Define the anatomical extent of the scalp.", a: "The scalp extends anteriorly to the supra-orbital margin and posteriorly to the external occipital protuberance and the highest nuchal lines. Laterally, it is bounded by the superior temporal lines." },
              { q: "Why is the second layer of the scalp particularly prone to profuse bleeding when injured?", a: "The dense connective tissue contains blood vessels whose walls are adhered to fibrous septa. These septa prevent the vessels from contracting or retracting when cut, leading to significant blood loss even from small wounds." },
              { q: "Describe the structure and attachments of the Epicranial Aponeurosis.", a: "Also known as the Galea Aponeurotica, it is a strong fibrous sheet that covers the skull vault like a helmet. It receives the insertion of the frontal bellies of the occipito-frontalis anteriorly and the occipital bellies posteriorly." },
              { q: "Explain why the fourth layer of the scalp is clinically referred to as the 'dangerous layer.'", a: "The loose areolar tissue (fourth layer) allows for the easy spread of blood or pus beneath the aponeurosis. Because it contains emissary veins that connect to intracranial venous sinuses, infections in this layer can spread from the scalp to the cranial cavity." },
              { q: "How does a hematoma in the pericranium differ in appearance from fluid collection in the loose areolar tissue?", a: "Fluid in the loose areolar tissue can spread across the vault but is limited by muscle attachments (e.g., stopping at the eyelids). In contrast, a hemorrhage beneath the pericranium (the fifth layer) results in a hematoma that takes the specific shape of the underlying skull bone because the pericranium is continuous with the sutural ligaments." },
              { q: "Compare the actions of the frontal and occipital bellies of the occipito-frontalis muscle.", a: "The frontal bellies pull the scalp forward and raise the eyebrows to produce transverse forehead wrinkles. The occipital bellies act to pull the scalp backwards." },
              { q: "Identify the two major arterial sources that provide blood supply to the scalp.", a: "The scalp is supplied by branches of both the External Carotid Artery (ECA) and the Internal Carotid Artery (ICA). ICA branches include the supratrochlear and supraorbital arteries, while ECA branches include the superficial temporal, posterior auricular, and occipital arteries." },
              { q: "What are emissary veins, and what is their clinical significance regarding infection?", a: "These are valveless veins that pass through skull foramina to connect extracranial veins with intracranial venous sinuses. They help reduce intracranial pressure but also serve as potential routes for the spread of infection into the brain." },
              { q: "Detail the sensory nerve supply of the scalp located in front of the auricle (ear).", a: "The area in front of the ear is supplied by four sensory branches of the trigeminal nerve. These include the supratrochlear and supraorbital nerves (from the ophthalmic nerve), the zygomaticotemporal nerve (from the maxillary nerve), and the auriculotemporal nerve (from the mandibular nerve)." },
              { q: "Where does lymph from the pre-auricular and post-auricular regions of the scalp drain?", a: "The pre-auricular region of the scalp drains into the parotid lymph nodes. The post-auricular region drains into the mastoid and occipital lymph nodes." }
            ],
            longEssays: [
              { title: "Explain the anatomical basis for the 'Black Eye' phenomenon resulting from a scalp injury.", answer: "The occurrence of a 'black eye' following a scalp injury is rooted in the anatomy of the fourth layer of the scalp, the loose areolar tissue. This layer is characterized by its lack of tension, which allows for the free mobility of the top three layers of the scalp over the skull. Clinically, this space allows for the easy spread of blood or inflammatory fluids (pus).\n\nWhile the loose areolar tissue is attached posteriorly to the occipital bone and laterally to the superior temporal line, it has no bony attachment anteriorly. Instead, it is continuous with the subcutaneous tissue of the eyelids because the frontal bellies of the occipito-frontalis muscle insert into the skin of the eyebrows rather than the bone. Consequently, if blood accumulates in the fourth layer due to trauma, it can gravitate forward and enter the eyelids, resulting in the discoloration known as a 'black eye.'" },
              { title: "Compare and contrast the frontal and occipital bellies of the occipito-frontalis muscle in terms of origin, nerve supply, and physical characteristics.", answer: "The occipito-frontalis is the primary muscle of the scalp, consisting of two frontal bellies and two occipital bellies connected by the epicranial aponeurosis. They differ significantly in several ways:\n\nOrigin: The frontal bellies arise from the skin of the eyebrows and are wider and partly united in the midline. The occipital bellies are narrower, separated by an extension of the aponeurosis, and arise from the lateral two-thirds of the highest nuchal line.\n\nInsertion: Both bellies insert into the epicranial aponeurosis.\n\nNerve Supply: Although both are supplied by the facial nerve, they receive different branches. The frontal belly is supplied by the temporal branch of the facial nerve, whereas the occipital belly is supplied by the posterior auricular branch.\n\nPhysicality: The frontal bellies have no bony attachments, whereas the occipital bellies are attached to the bone at the highest nuchal line. This difference explains why fluid can move past the frontal bellies to the eyes but is blocked posteriorly by the occipital attachments." }
            ]
          },
          the_face: {
            title: "The Face",
            shortEssays: [
              { q: "What is the embryological origin of the muscles of facial expression?", a: "The muscles of facial expression develop from the mesoderm of the 2nd pharyngeal arch. Because of this common origin, they are all innervated by the facial nerve (CN VII)." },
              { q: "Define the \"Modiolus\" and describe its location.", a: "The modiolus is a fibromuscular palpable mass where various facial muscle fibers converge or diverge. It is located just lateral to the angle of the mouth." },
              { q: "Why is the facial artery described as \"tortuous\"?", a: "The facial artery is tortuous to permit the free movement of the mandible, lips, and cheeks. This anatomical feature prevents the vessel from being overstretched during wide mouth opening or facial expressions." },
              { q: "Which specific part of the orbicularis oculi is responsible for the flow of tears?", a: "The lacrimal part of the orbicularis oculi is responsible for this function. It arises from the lacrimal crest and dilates the lacrimal sac, assisting in the suction and flow of tears." },
              { q: "What is the sensory innervation of the skin over the chin?", a: "The skin of the chin is supplied by the mental nerve. This nerve is a branch of the mandibular division (V3) of the trigeminal nerve." },
              { q: "List the five terminal motor branches of the facial nerve.", a: "The five terminal branches are the Temporal, Zygomatic, Buccal, Mandibular, and Cervical branches. These branches emerge from the anterior border of the parotid gland to supply specific muscle groups." },
              { q: "Which nerve supplies the skin over the angle of the mandible?", a: "The skin over the angle of the mandible is supplied by the great auricular nerve. This nerve originates from the cervical plexus (C2, 3) rather than the trigeminal nerve." },
              { q: "Describe the boundaries of the \"Dangerous area of the face.\"", a: "The dangerous area is a triangular region of facial skin. Its boundaries include the upper lip, the nose, and the medial angles of the eyes." },
              { q: "What are the two parts of the Orbicularis oris muscle?", a: "The orbicularis oris consists of a large pars peripheralis and a small pars marginalis. The muscle is formed of 8 segments total, with two parts in each of the four quadrants." },
              { q: "Where does the facial nerve form the \"Pes Anserinus\"?", a: "The facial nerve forms the Pes Anserinus (the \"goose's foot\") within the parotid gland. This is the site where the nerve divides into its five terminal motor branches." },
              { q: "What are the three specific boundaries that define the face?", a: "The face is bounded superiorly by the hair line, which makes the forehead common to both the scalp and the face. Inferiorly, it is bounded by the lower border of the mandible, and sideways it extends from one auricle to the other." },
              { q: "Describe the formation and drainage of the common facial vein.", a: "The common facial vein is formed by the union of the anterior facial vein and the anterior division of the retromandibular vein. Once formed, it drains its contents directly into the internal jugular vein (IJV)." },
              { q: "Explain the clinical significance of the \"Dangerous Area of the Face.\"", a: "This triangular area around the nose and upper lip is dangerous because its venous drainage connects to the cavernous sinus. Infections in this region can travel through these veins, leading to a life-threatening cavernous sinus thrombosis." },
              { q: "Which specific area of the face is NOT supplied by the trigeminal nerve, and what supplies it instead?", a: "The skin over the angle of the mandible and the capsule of the parotid gland are the exceptions to trigeminal innervation. These specific areas are instead supplied by the great auricular nerve, which arises from the cervical plexus (C2 and C3)." },
              { q: "How does the facial nerve exit the skull, and what are its first two branches before it enters the parotid gland?", a: "The facial nerve (CN VII) exits the cranial cavity through the stylomastoid foramen. Before entering the parotid gland, it gives off the posterior auricular branch and a muscular branch to the digastric and stylohyoid muscles." },
              { q: "Identify the three parts of the orbicularis oculi and their distinct functions.", a: "The orbital part closes the eyelids tightly for protection, while the palpebral part handles gentle blinking to spread tears. The lacrimal part is responsible for dilating the lacrimal sac to facilitate the flow of tears." },
              { q: "What are the origins and the primary action of the buccinator muscle?", a: "The buccinator originates from the alveolar margins of the maxilla and mandible near the molars and the pterygomandibular raphe. Its primary action is compressing the cheeks against the teeth to assist in blowing, whistling, and mastication." },
              { q: "Describe the lymphatic drainage of the central lower lip and chin.", a: "The central portion of the lower lip and the chin follow a specific lymphatic pathway. These areas drain into the submental lymph nodes, which are distinct from the submandibular or parotid nodes." }
            ],
            longEssays: [
              { title: "Functional Anatomy of the Buccinator", answer: "The buccinator originates from the alveolar margins of the maxilla and mandible (opposite the molars) and the pterygomandibular raphe. Its fibers insert into the lips by converging at the modiolus. A unique anatomical feature is the decussation of its middle fibers: the upper middle fibers insert into the lower lip, and the lower middle fibers insert into the upper lip. Mechanically, the muscle compresses the cheeks against the teeth to prevent food from accumulating in the vestibule of the mouth during mastication. Additionally, it provides the tension required for activities such as whistling, blowing, and suckling." },
              { title: "Integration of Facial Nerve Anatomy and Clinical Practice", answer: "After exiting the skull through the stylomastoid foramen, the facial nerve (CN VII) provides motor branches to the occipito-frontalis, digastric, and stylohyoid muscles. It then enters the parotid gland, where it forms the Pes Anserinus plexus and divides into five terminal branches: temporal, zygomatic, buccal, mandibular, and cervical. These branches radiate outward across the face to supply the muscles of facial expression, such as the orbicularis oculi and buccinator. Because these branches radiate horizontally from the parotid region, surgical incisions on the face should be made transverse and parallel to these nerve branches. This technique minimizes the risk of accidentally cutting the nerves, which would result in paralysis of the associated facial muscles." },
              { title: "The Dual Blood Supply of the Face and its Anastomoses", answer: "The face receives a robust blood supply from both the ECA and ICA. The ECA provides the facial artery, which is the chief supply, and the superficial temporal artery, which gives off the transverse facial artery. The ICA contributes via its branches, the supratrochlear and supra-orbital arteries, which supply the forehead. A critical point of communication occurs at the medial angle of the eye. Here, the angular artery (the terminal branch of the facial artery/ECA) anastomoses with the dorsal nasal artery (a branch of the ophthalmic artery/ICA). This anastomosis is a vital physiological link between the internal and external carotid systems." }
            ]
          },
          cranial_cavity: {
            title: "Cranial Cavity 1 & 2",
            shortEssays: [
              { q: "Describe the structure and primary function of the dural folds.", a: "Dural folds are partition-like processes formed by the reduplication of the inner meningeal layer of the dura mater. Their primary function is to stabilize the brain within the cranial cavity during movements of the head." },
              { q: "What are the two layers of the cranial dura mater, and when do they separate?", a: "The two layers are the outer endosteal layer and the inner meningeal layer. They remain fused except where the inner layer forms folds or when they separate to enclose a venous dural sinus." },
              { q: "Explain the significance of the pterion in clinical practice.", a: "The pterion is the thinnest part of the skull, located 4 cm above the zygomatic arch. It is clinically significant because the middle meningeal artery lies deep to it, making it a common site for fractures leading to extradural hematomas." },
              { q: "How does the drainage of the cavernous sinus differ between the superior and inferior petrosal sinuses?", a: "The cavernous sinus drains into the transverse sinus via the superior petrosal sinus. Alternatively, it drains directly into the internal jugular vein (IJV) via the inferior petrosal sinus." },
              { q: "What is the \"tentorial notch,\" and what structure passes through it?", a: "The tentorial notch is a U-shaped opening in the free border of the tentorium cerebelli. It is designed to allow the passage of the midbrain between the cranial compartments." },
              { q: "Identify the contents found within the center of the cavernous sinus.", a: "The center of the cavernous sinus contains the Internal Carotid Artery (ICA) surrounded by its sympathetic plexus. The abducent nerve (CN VI) also runs through the center, inferolateral to the artery." },
              { q: "What is the clinical significance of emissary veins?", a: "Emissary veins are valveless vessels that connect dural sinuses with extracranial veins. They serve to equalize venous pressure but are dangerous as they can spread infection from external sources into the cranial cavity." },
              { q: "Distinguish between the origin of extradural and subdural hemorrhages.", a: "Extradural hemorrhage is typically arterial, often caused by injury to the middle meningeal vessels. Subdural hemorrhage is more common and usually venous in origin, often identified by RBCs in the CSF." },
              { q: "Which cranial nerves pass through the jugular foramen?", a: "The nerves that exit the cranium through the jugular foramen are the Glossopharyngeal (IX), Vagus (X), and Accessory (XI) nerves." },
              { q: "Describe the attachment points of the Diaphragma sellae.", a: "This is a small rounded dural fold that roofs the hypophyseal (pituitary) fossa. It is attached to the four clinoid processes and has a central opening for the infundibulum." },
              { q: "Where does the middle meningeal artery originate and how does it enter the skull?", a: "The middle meningeal artery originates from the first part of the maxillary artery within the infratemporal fossa. It enters the cranial cavity by passing through the foramen spinosum." },
              { q: "Describe the location and nature of the trigeminal ganglion.", a: "Also known as the semilunar ganglion, it is the sensory ganglion of the fifth cranial nerve (CN V). It is located in the trigeminal impression on the anterior surface of the apex of the petrous temporal bone." },
              { q: "Which cranial nerves are associated with the internal acoustic meatus?", a: "The seventh cranial nerve (facial nerve) and the eighth cranial nerve (vestibulocochlear nerve) both pass through the internal acoustic meatus." },
              { q: "Identify the shape and specific site of the falx cerebelli.", a: "This is a small, sickle-shaped dural fold. It is positioned vertically in the posterior cranial fossa, situated specifically between the two cerebellar hemispheres." },
              { q: "What is the clinical significance of the \"dangerous area of the face\" in relation to the cavernous sinus?", a: "Infection from this area can spread to the cavernous sinus via the facial and superior ophthalmic veins. This can lead to cavernous sinus thrombosis, affecting cranial nerves III, IV, and VI." },
              { q: "Describe the path and termination of the superior sagittal sinus.", a: "It begins anteriorly at the crista galli and runs along the upper attached margin of the falx cerebri. It ends opposite the internal occipital protuberance, usually turning to the right to continue as the right transverse sinus." },
              { q: "Which cranial nerve is composed of a large sensory root and a small motor root, and how do these roots exit the skull?", a: "The Trigeminal Nerve (CN V) consists of a large sensory root (forming the trigeminal ganglion) and a small motor root. The ophthalmic and maxillary divisions pass through the cavernous sinus, while the mandibular division (carrying the motor root) passes through the foramen ovale." },
              { q: "Identify the branches of the cerebral part of the internal carotid artery (ICA).", a: "The cerebral part of the internal carotid artery gives off the ophthalmic artery, the posterior communicating artery, the anterior choroidal artery, and its terminal branches: the anterior and middle cerebral arteries." },
              { q: "Describe the intracranial course of the olfactory nerve (CN I).", a: "This nerve consists of 15–20 filaments on each side. These filaments pierce the cribriform plate of the ethmoid bone to terminate in the olfactory bulb." },
              { q: "What is a carotid-cavernous sinus fistula, and what are its physical manifestations?", a: "This is an abnormal arterio-venous communication resulting from head injury or a ruptured aneurysm of the ICA into the cavernous sinus. It typically leads to unilateral pulsating exophthalmos." }
            ],
            longEssays: [
              { title: "Discuss the Anatomy, Relations, and Clinical Importance of the Cavernous Sinus.", answer: "The cavernous sinus is a large, endothelial-lined venous space located in the middle cranial fossa on either side of the sphenoid bone. It extends from the superior orbital fissure anteriorly to the apex of the petrous temporal bone posteriorly. Medially, it is related to the pituitary gland and sphenoidal air sinus, while laterally it is bordered by the temporal lobe.\n\nThe sinus is unique due to the structures passing through it. The internal carotid artery and abducent nerve (CN VI) pass through its center, while the oculomotor (III), trochlear (IV), ophthalmic (V1), and maxillary (V2) nerves are embedded in its lateral wall. It receives tributaries from the orbit, brain, and meninges.\n\nClinically, the cavernous sinus is highly significant. Infections from the \"dangerous area of the face\" can spread via the facial and ophthalmic veins to cause cavernous sinus thrombosis, affecting the nerves passing through it. Furthermore, a head injury can cause a carotid-cavernous fistula, where arterial blood from the ICA forced into the sinus leads to pulsating exophthalmos." },
              { title: "Describe the Middle Meningeal Artery: Origin, Course, and Applied Anatomy.", answer: "The middle meningeal artery originates from the first part of the maxillary artery within the infratemporal fossa. It enters the cranial cavity through the foramen spinosum. Once inside the middle cranial fossa, it runs an extradural course between the two layers of the dura mater, grooving the squamous temporal bone. It eventually divides into a frontal (anterior) and a parietal (posterior) branch.\n\nThe artery's course is closely related to the pterion on the surface of the skull. Because the pterion is the thinnest part of the cranium, a blow to this area often fractures the bone and tears the underlying middle meningeal artery. This results in an extradural hemorrhage. The accumulating blood (hematoma) presses on the motor area of the brain, potentially causing contralateral hemiplegia. Surgical intervention via a burr-hole at the pterion is often required for decompression." },
              { title: "The Intracranial Course and Branching of the Internal Carotid Artery (ICA)", answer: "The internal carotid artery (ICA) begins in the neck as a terminal branch of the common carotid artery and is divided into four distinct intracranial parts:\n\nCervical Part: This segment resides within the carotid sheath and notably provides no branches.\n\nPetrous Part: The artery enters the skull through the carotid canal in the petrous temporal bone. It gives rise to the corticotympanic branches (to the middle ear) and the pterygoid branches (to the pterygoid canal).\n\nCavernous Part: The ICA passes forward through the cavernous sinus, positioned inferolateral to the abducent nerve. Its branches include those to the trigeminal ganglion, hypophyseal branches to the pituitary gland, and a meningeal branch to the dura of the anterior cranial fossa.\n\nCerebral Part: The artery emerges through the roof of the cavernous sinus, medial to the anterior clinoid process. It terminates by dividing into the anterior and middle cerebral arteries. Before this, it gives off the ophthalmic, posterior communicating, and anterior choroidal arteries." },
              { title: "The Falx Cerebri: Anatomy, Attachments, and Associated Venous Sinuses", answer: "The falx cerebri is a large, sickle-shaped dural fold situated vertically along the median fissure between the two cerebral hemispheres. Its anatomical structure is defined by its borders and attachments:\n\nApex (Anterior): Attached to the crista galli and the frontal crest.\n\nBase (Posterior): Attached to the upper surface of the tentorium cerebelli.\n\nUpper Border: Attached to the lips of the sagittal sulcus. This border is convex and encloses the superior sagittal sinus.\n\nLower Border: This border is free and concave, running along the corpus callosum. It encloses the inferior sagittal sinus.\n\nJunction of Base: At the line where the falx cerebri meets the tentorium cerebelli, it encloses the straight sinus." }
            ]
          },
          // NEW: Temporal Fossa content injected directly from the study guide
          temporal_fossa: {
            title: "Temporal & Infratemporal Fossa",
            shortEssays: [
              { q: "What is the common embryological origin and general innervation shared by the muscles of mastication?", a: "The muscles of mastication develop from the mesoderm of the first pharyngeal arch. Because of this shared origin, all four muscles are supplied by branches of the mandibular nerve (V3)." },
              { q: "Describe the dual action of the Temporalis muscle based on its fiber orientation.", a: "The anterior vertical fibers of the temporalis act as a strong elevator of the mandible. Conversely, its posterior horizontal fibers are responsible for retracting the mandible, making it the only muscle capable of this movement." },
              { q: "Where does the Lateral Pterygoid muscle insert, and why is this insertion unique?", a: "The lateral pterygoid inserts into the fovea in front of the neck of the mandible, as well as the capsule and articular disc of the TMJ. This allows the muscle to pull the disc forward during movements like depression and protrusion." },
              { q: "How does the structure of the Articular Disc facilitate the movement of the TMJ?", a: "The disc is made of fibrocartilage and features a concavo-convex upper surface to fit the articular tubercle and mandibular fossa. Its lower surface is concave to accommodate the head of the mandible, effectively dividing the joint into upper and lower compartments." },
              { q: "What is the functional significance of the Lateral (Temporo-mandibular) ligament?", a: "This ligament is attached above the tubercle of the zygomatic arch and below to the neck of the mandible. Its primary role is to limit posterior movement of the mandible, which protects the external auditory meatus and prevents backward dislocation." },
              { q: "Which muscles are responsible for the protrusion of the mandible?", a: "Protrusion is achieved through the coordinated action of the lateral pterygoid and medial pterygoid muscles. Additionally, the superficial oblique fibers of the masseter assist in pulling the mandible forward." },
              { q: "Identify the origin points of the two heads of the Medial Pterygoid muscle.", a: "The superficial head originates from the tuberosity of the maxilla. The larger deep head arises from the medial surface of the lateral pterygoid plate." },
              { q: "What anatomical structures provide the blood supply to the TMJ?", a: "The blood supply to the temporomandibular joint is derived from two main vessels: the superficial temporal artery and the maxillary artery." },
              { q: "Describe the mechanics involved in the depression of the mandible.", a: "Depression is primarily initiated by the lateral pterygoid, which pulls the mandibular head and disc forward. This action is assisted by the digastric, geniohyoid, and mylohyoid muscles, along with the natural effect of gravity." },
              { q: "What is the Spheno-mandibular ligament, and where is it located relative to the joint?", a: "The spheno-mandibular ligament is an embryological remnant of the first pharyngeal arch. It is located medial to the joint, extending from the spine of the sphenoid to the lingula of the mandibular foramen." }
            ],
            longEssays: [
              { title: "Comprehensive Analysis of the Muscles of Mastication", answer: "The four muscles of mastication—temporalis, masseter, medial pterygoid, and lateral pterygoid—are a functional group derived from the first pharyngeal arch and innervated by the mandibular nerve (V3). Geographically, the temporalis occupies the temporal fossa, the masseter overlies the ramus of the mandible, and the two pterygoids are located within the infratemporal fossa.\n\nElevation of the mandible, an essential action for closing the mouth and biting, is performed by the temporalis, masseter, and medial pterygoid. The masseter is particularly noted as an \"antigravity muscle.\" While most of these muscles close the jaw, the lateral pterygoid is unique because its primary function is depression (opening the mouth) by pulling the mandibular head and articular disc forward.\n\nSpecialized movements include retraction and protrusion. The temporalis is the sole retractor of the mandible via its posterior horizontal fibers. Protrusion is a collaborative effort between the lateral and medial pterygoids and the superficial masseter. Finally, side-to-side chewing movements are produced by the alternating contraction of the medial and lateral pterygoids on opposite sides, which pushes the chin toward the opposing side." },
              { title: "Anatomy and Functional Mechanics of the TMJ", answer: "The TMJ is a synovial-condylar joint that facilitates the complex movements required for speech and mastication. It involves the articulation of the mandibular head with the mandibular fossa and articular tubercle of the temporal bone. Unlike most synovial joints, these surfaces are covered with fibrocartilage. A key structural feature is the fibrocartilaginous articular disc, which divides the joint into two distinct compartments and is shaped to fit the specific contours of the temporal and mandibular bones.\n\nJoint stability is maintained by three primary ligaments. The Lateral (Temporo-mandibular) ligament is the most clinically significant for stability, as it attaches to the zygomatic arch and the mandibular neck to prevent posterior dislocation, thereby protecting the external auditory meatus. The Spheno-mandibular ligament, a remnant of the first pharyngeal arch, lies medially and connects the sphenoid spine to the mandibular lingula. The Stylo-mandibular ligament, a condensation of cervical fascia, extends from the styloid process to the mandibular angle.\n\nClinically, the joint is most susceptible to anterior dislocation. The nerve supply (auriculotemporal and masseteric) and blood supply (maxillary and superficial temporal arteries) ensure the joint remains functional and nourished." }
            ]
          }
        };

        // --- Study Guide Component (The Mobile-Responsive UI) ---

                    {isMobileMenuOpen ? <i className="fa-solid fa-xmark"></i> : <i className="fa-solid fa-bars"></i>}

                </button>
              </div>

              {/* SIDEBAR NAVIGATION */}

                ${isMobileMenuOpen ? 'flex' : 'hidden'}

              `}>
                <div className="p-4 border-b border-red-800 flex items-center justify-between">
                  <button 
                    onClick={onBack}
                    className="flex items-center gap-2 text-red-300 hover:text-white hover:bg-red-800 px-3 py-2 rounded-lg transition-all duration-200 transform hover:-translate-x-1 active:scale-95 text-sm font-semibold w-full group"
                  >
                    <i className="fa-solid fa-arrow-left transition-transform duration-300 group-hover:-translate-x-1"></i> Back to Dashboard
                  </button>
                </div>
                
                <div className="hidden md:flex items-center gap-3 p-6 border-b border-red-800">
                  <i className="fa-solid fa-brain text-2xl text-red-300"></i>
                  <div>
                    <h1 className="font-bold text-xl leading-tight">NeuroAnatomy</h1>

                    {tabs.map((tab) => (
                      <li key={tab.id}>

              {/* MAIN CONTENT AREA */}

                  {activeTab === 'summary' && (

                      </div>

                      {topic === 'the_scalp' && (
                        <div className="space-y-8">
                          <div className="bg-red-50 border-l-4 border-red-500 p-5 rounded-r-xl">
                            <h3 className="text-xl font-bold text-red-900 mb-2">The SCALP Mnemonic — Five Layers</h3>
                            <p className="text-slate-700 text-sm mb-4">The five layers of the scalp from superficial to deep, remembered by the word <strong>SCALP</strong>:</p>
                            <div className="space-y-3">
                              {[
                                { letter: "S", name: "Skin", desc: "Thick, vascular, contains hair follicles, sebaceous glands, and sweat glands." },
                                { letter: "C", name: "Connective Tissue (Dense)", desc: "Contains vessels adhered to fibrous septa — causes profuse bleeding when cut." },
                                { letter: "A", name: "Aponeurosis (Epicranial / Galea)", desc: "Helmet-like fibrous sheet. Receives frontal and occipital bellies of occipito-frontalis." },
                                { letter: "L", name: "Loose Areolar Tissue", desc: "The 'DANGEROUS LAYER' — allows blood/pus to spread; contains emissary veins." },
                                { letter: "P", name: "Pericranium", desc: "Periosteum of skull bones. Bleeds beneath it form bone-shaped hematomas." },
                              ].map((layer, i) => (
                                <div key={i} className="flex items-start gap-4 bg-white p-4 rounded-xl border border-red-100 shadow-sm">

                                  <div>
                                    <strong className="text-slate-900 block">{layer.name}</strong>
                                    <p className="text-slate-600 text-sm">{layer.desc}</p>
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>

                          <div className="grid md:grid-cols-2 gap-6">
                            <div className="bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
                              <h4 className="font-bold text-slate-800 mb-3 flex items-center gap-2"><i className="fa-solid fa-droplet text-red-500"></i> Arterial Supply</h4>
                              <div className="space-y-2 text-sm">
                                <div className="bg-blue-50 p-3 rounded border border-blue-100">
                                  <strong className="text-blue-800 block">ICA Branches (Anterior):</strong>
                                  <p className="text-slate-700">Supratrochlear artery, Supraorbital artery</p>
                                </div>
                                <div className="bg-orange-50 p-3 rounded border border-orange-100">
                                  <strong className="text-orange-800 block">ECA Branches (Posterior/Lateral):</strong>
                                  <p className="text-slate-700">Superficial temporal, Posterior auricular, Occipital arteries</p>
                                </div>
                              </div>
